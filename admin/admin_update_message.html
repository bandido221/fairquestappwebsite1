<!-- admin_update_message.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Post Website Updates | FairQuest</title>
  <link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/fq_theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #f1df99;
      --gold-dark:   #8a6a1a;
      --parchment:   rgba(241, 223, 153, 0.93);
      --bg:          #0d0a04;
      --card-radius: 16px;
    }

    body {
      font-family: 'Domine', serif;
      background: var(--bg);
      color: var(--gold-light);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,60,10,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .topnav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13, 10, 4, 0.95);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
    }
    .topnav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .topnav-logo img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .topnav-logo span {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      font-family: 'Domine', serif;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .nav-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.55);
      color: var(--gold-light);
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }

    .card {
      background: var(--parchment) !important;
      border-radius: var(--card-radius);
      padding: 22px 20px;
      margin-bottom: 18px;
      box-shadow:
        0 2px 0 rgba(201,168,76,0.35),
        0 8px 28px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(201,168,76,0.4);
    }
    .card, .card * { color: #111 !important; }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #111 !important;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.12);
    }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #444 !important;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.9);
      font-family: 'Domine', serif;
      font-size: 14px;
      color: #111;
    }
    .form-group textarea {
      min-height: 130px;
      resize: vertical;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .btn {
      font-family: 'Domine', serif;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 16px;
      border-radius: 8px;
      border: 1.5px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.85);
      color: #111 !important;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #fff; transform: translateY(-1px); }
    .btn-primary { background: var(--gold); border-color: var(--gold-dark); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-danger { background: rgba(180,30,30,0.12); border-color: rgba(180,30,30,0.3); color: #7a0000 !important; }
    .btn-danger:hover { background: rgba(180,30,30,0.22); }

    .update-item {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .update-item:hover { background: rgba(255,255,255,0.95); }
    .update-item.selected {
      border-color: rgba(201,168,76,0.6);
      background: rgba(255,255,255,0.95);
    }
    .update-date {
      font-size: 11px;
      color: #666 !important;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .update-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      color: #111 !important;
      margin-bottom: 4px;
    }
    .update-preview {
      font-size: 13px;
      color: #444 !important;
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a class="topnav-logo" href="/index.html">
      <img src="/images/logo.png" alt="FairQuest" />
      <span>FairQuest</span>
    </a>
    <div class="topnav-right">
      <a href="/admin/admin_dashboard.html" class="nav-btn">⬅ Dashboard</a>
      <a href="/index.html" class="nav-btn">🏠 Home</a>
    </div>
  </nav>

  <div class="page">

    <div class="page-header">
      <h1>📢 Post Website Updates</h1>
    </div>

    <!-- COMPOSE CARD -->
    <div class="card">
      <div class="card-title" id="formTitle">✏️ New Update</div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="titleInput" placeholder="Enter a title for your update" />
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="messageInput" placeholder="Write your update or message to users here..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveMessage()">💾 Save / Update</button>
        <button class="btn btn-danger" id="deleteButton" onclick="deleteMessage()" style="display:none;">🗑️ Delete</button>
      </div>
    </div>

    <!-- PAST UPDATES CARD -->
    <div class="card">
      <div class="card-title">📜 Past Updates</div>
      <div id="updatesList">Loading updates...</div>
    </div>

  </div>

  <script>
    const supabase = window.supabase.createClient(
      'https://awtbjuiqgtdydsqzimul.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
    );

    let editingId = null;

    async function loadUpdates() {
  const { data, error } = await supabase
  .rpc('get_website_updates');

      const list = document.getElementById('updatesList');
      list.innerHTML = '';

      if (error || !data.length) {
        list.innerHTML = '<p>No updates found.</p>';
        return;
      }

      data.forEach(update => {
        const div = document.createElement('div');
        div.className = 'update-item';
        div.innerHTML = `
          <div class="update-date">${new Date(update.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
          <div class="update-title">${update.title || '(No title)'}</div>
          <div class="update-preview">${(update.message || '').replace(/\n/g, ' ')}</div>
        `;
        div.onclick = () => {
          document.querySelectorAll('.update-item').forEach(i => i.classList.remove('selected'));
          div.classList.add('selected');
          editUpdate(update.id, update.title, update.message);
        };
        list.appendChild(div);
      });
    }

    function editUpdate(id, title, message) {
      document.getElementById('titleInput').value = title || '';
      document.getElementById('messageInput').value = message;
      editingId = id;
      document.getElementById('deleteButton').style.display = 'inline-flex';
      document.getElementById('formTitle').textContent = '✏️ Editing Update';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveMessage() {
  const title = document.getElementById('titleInput').value.trim();
  const message = document.getElementById('messageInput').value.trim();

  if (!title || !message) {
    alert('⚠️ Title and message cannot be empty.');
    return;
  }

  if (editingId) {
 const { error } = await supabase.rpc('update_website_update', {
  p_id: editingId,
  p_title: title,
  p_message: message
});

    if (error) {
      alert('❌ Error updating message.');
    } else {
      alert('✅ Update saved.');
    }
  } else {
  const { error } = await supabase.rpc('insert_website_update', {
  p_title: title,
  p_message: message
});

    if (error) {
      console.error(error);
      alert('❌ Error saving message.');
    } else {
      alert('✅ Message posted.');
    }
  }

  editingId = null;
  document.getElementById('titleInput').value = '';
  document.getElementById('messageInput').value = '';
  document.getElementById('deleteButton').style.display = 'none';
  loadUpdates();
}



    async function deleteMessage() {
      if (!editingId) return;

      const confirmDelete = confirm('⚠️ Are you sure you want to delete this update?');
      if (!confirmDelete) return;

    const { error } = await supabase.rpc('delete_website_update', {
  p_id: editingId
});

      if (error) {
        alert('❌ Error deleting message.');
      } else {
        alert('✅ Message deleted.');
      }

      editingId = null;
      document.getElementById('titleInput').value = '';
      document.getElementById('messageInput').value = '';
      document.getElementById('deleteButton').style.display = 'none';
      document.getElementById('formTitle').textContent = '✏️ New Update';
      loadUpdates();
    }

    // Load updates when page loads
    loadUpdates();
  </script>

</body>
</html>
