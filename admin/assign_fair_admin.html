<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fair Admin Approval | FairQuest</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">

<!-- MATCH DASHBOARD: supabase-js v1 (NO @2) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #f1df99;
      --gold-dark:   #8a6a1a;
      --parchment:   rgba(241, 223, 153, 0.93);
      --bg:          #0d0a04;
      --card-radius: 16px;
    }

    body {
      font-family: 'Domine', serif;
      background: var(--bg);
      color: var(--gold-light);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,60,10,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .topnav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13, 10, 4, 0.95);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
    }
    .topnav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .topnav-logo img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .topnav-logo span {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      font-family: 'Domine', serif;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .nav-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.55);
      color: var(--gold-light);
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }
    .filter-btn {
      font-family: 'Domine', serif;
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: rgba(201,168,76,0.15);
      border-color: rgba(201,168,76,0.6);
      color: var(--gold-light);
    }

    .card {
      background: var(--parchment) !important;
      border-radius: var(--card-radius);
      padding: 22px 20px;
      margin-bottom: 16px;
      box-shadow:
        0 2px 0 rgba(201,168,76,0.35),
        0 8px 28px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(201,168,76,0.4);
      text-align: left;
    }
    .card, .card * { color: #111 !important; }

    .card h3 {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #111 !important;
    }

    .card p { font-size: 13px; color: #333 !important; margin-bottom: 5px; }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #111 !important;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.12);
    }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .pending  { background: rgba(230,180,0,0.25); color: #7a5c00 !important; border: 1px solid rgba(230,180,0,0.4); }
    .approved { background: rgba(46,125,50,0.2);  color: #1b5e20 !important; border: 1px solid rgba(46,125,50,0.4); }
    .newfair  { background: rgba(230,100,0,0.15); color: #7a3300 !important; border: 1px solid rgba(230,100,0,0.3); margin-left: 6px; }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #444 !important;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.9);
      font-family: 'Domine', serif;
      font-size: 14px;
      color: #111;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .btn {
      font-family: 'Domine', serif;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.85);
      color: #111 !important;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { background: #fff; transform: translateY(-1px); }
    .btn-approve { background: rgba(46,125,50,0.15); border-color: rgba(46,125,50,0.4); color: #1b5e20 !important; }
    .btn-approve:hover { background: rgba(46,125,50,0.25); }
    .btn-reject { background: rgba(180,30,30,0.12); border-color: rgba(180,30,30,0.3); color: #7a0000 !important; }
    .btn-reject:hover { background: rgba(180,30,30,0.22); }
    .btn-blue { background: rgba(26,86,160,0.15); border-color: rgba(26,86,160,0.3); color: #0a3a7a !important; }
    .btn-blue:hover { background: rgba(26,86,160,0.25); }

    #quickStatus { font-size: 13px; margin-top: 8px; color: #111 !important; }
</style>
</head>

<body>

  <nav class="topnav">
    <a class="topnav-logo" href="/index.html">
      <img src="/images/logo.png" alt="FairQuest" />
      <span>FairQuest</span>
    </a>
    <div class="topnav-right">
      <a href="/admin/admin_dashboard.html" class="nav-btn">⬅ Dashboard</a>
      <a href="/index.html" class="nav-btn">🏠 Home</a>
      <button class="nav-btn" onclick="logout()" style="border-color:rgba(180,30,30,0.4);color:#e07070;">🚪 Logout</button>
    </div>
  </nav>

  <div class="page">

    <div class="page-header">
      <h1>🏰 Fair Admin Approval</h1>
    </div>

    <!-- QUICK ASSIGN CARD -->
    <div class="card">
      <div class="card-title">⚡ Quick Assign Fair Admin</div>
      <p style="font-size:13px; color:#555 !important; margin-bottom:14px;">Use this when someone emails you directly and you need to assign them manually.</p>
      <div class="form-group">
        <label>User Email</label>
        <input type="email" id="quickEmail" placeholder="e.g. fairfieldirf@gmail.com" />
      </div>
      <div class="form-group">
        <label>Search Fair Name</label>
        <input type="text" id="quickFairName" placeholder="Type to search…" oninput="searchFairs()" />
      </div>
      <div class="form-group">
        <label>Select Fair</label>
        <select id="quickFairSelect">
          <option value="">— Select fair after searching —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="quickRole">
          <option value="owner">Owner</option>
          <option value="manager">Manager</option>
          <option value="it">IT</option>
          <option value="staff">Staff</option>
        </select>
      </div>
      <button class="btn btn-approve" onclick="quickAssign()">⚡ Assign as Fair Admin</button>
      <div id="quickStatus"></div>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="showPending(this)">📋 Pending Applications</button>
      <button class="filter-btn" onclick="showApproved(this)">✅ Approved Admins</button>
    </div>

    <div id="list">Loading…</div>

  </div>

<script>
  // IMPORTANT: use "var" so it never crashes if another script also used "const supabase"
  var supabase = window.supabase.createClient(
    'https://awtbjuiqgtdydsqzimul.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
  );

  var mode = 'pending';

  

  function showPending(btn){ 
    mode='pending'; 
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    load(); 
  }
  function showApproved(btn){ 
    mode='approved'; 
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    load(); 
  }

 async function requireAdminLogin(){
  const { data, error } = await supabase.auth.getSession();

  if (error || !data?.session?.user) {
    window.location.href = "/admin/admin_login.html";
    return false;
  }

  return true;
}

async function searchFairs() {
  const query = document.getElementById('quickFairName').value.trim();
  const sel   = document.getElementById('quickFairSelect');
  sel.innerHTML = '<option value="">— Select fair —</option>';
  if (query.length < 2) return;

  const { data, error } = await supabase
    .from('renaissance_fairs')
    .select('id, name, city, state')
    .ilike('name', `%${query}%`)
    .limit(10);

  if (error) { console.error(error); return; }
  (data||[]).forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = `${f.name} — ${f.city}, ${f.state}`;
    sel.appendChild(o);
  });
}

async function quickAssign() {
  const email  = document.getElementById('quickEmail').value.trim();
  const fairId = document.getElementById('quickFairSelect').value;
  const role   = document.getElementById('quickRole').value;
  const status = document.getElementById('quickStatus');

  if (!email || !fairId) { status.textContent = '⚠ Please enter an email and select a fair.'; return; }

  const { data: users, error: userErr } = await supabase
    .from('app_users')
    .select('id')
    .eq('email', email)
    .limit(1);

  if (userErr || !users?.length) {
    status.textContent = '❌ User not found. Make sure they have a FairQuest account.';
    return;
  }

  const userId = users[0].id;

  const { error } = await supabase.rpc('assign_fair_admin', {
    p_user_id: userId,
    p_fair_id: parseInt(fairId),
    p_admin_level: role
  });

  if (error) {
    console.error(error);
    status.textContent = '❌ Error assigning admin: ' + error.message;
    return;
  }

  status.textContent = '✅ Admin assigned successfully!';
  document.getElementById('quickEmail').value = '';
  document.getElementById('quickFairName').value = '';
  document.getElementById('quickFairSelect').innerHTML = '<option value="">— Select fair after searching —</option>';
}
  async function load(){
    var ok = await requireAdminLogin();
    if (!ok) return;

    var list = document.getElementById('list');
    list.innerHTML = 'Loading…';

    if(mode === 'pending'){
 var resp = await supabase
  .rpc('get_pending_fair_verifications');

      if(resp.error){
        console.error(resp.error);
        list.innerHTML = 'Error loading pending applications.';
        return;
      }
      renderPending(resp.data || []);
    } else {
   var resp2 = await supabase
  .rpc('get_fair_admins');

      if(resp2.error){
        console.error(resp2.error);
        list.innerHTML = 'Error loading approved admins.';
        return;
      }
      renderApproved(resp2.data || []);
    }
  }

  function renderPending(rows){
    var list = document.getElementById('list');
    list.innerHTML = '';

    if(!rows.length){
      list.innerHTML='<p style="text-align:center;">No pending applications.</p>';
      return;
    }

    rows.forEach(function(r){
      var div = document.createElement('div');
      div.className='card';
  const newFairBadge = (!r.fair_id) ? `<span class="badge newfair">NEW FAIR</span>` : ``;

div.innerHTML=`
  <span class="badge pending">PENDING</span>
  ${newFairBadge}
  <h3>${r.fair_name} (${r.fair_state})</h3>
        <p><b>Applicant:</b> ${r.contact_name}</p>
        <p><b>Email:</b> ${r.user_email}</p>
        <p><b>Role:</b> ${r.fair_role}</p>
<p><b>Notes:</b> ${r.fair_notes || '—'}</p>

${!r.fair_id ? `
<div style="margin-top:10px; padding:10px; background:#3b2a12; border-radius:6px;">
  <b>⚠ New Fair:</b> This fair does not exist in the system yet.<br>
  If it already exists, search and link it below. Otherwise use "Create Fair".
  <div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
    <input type="text" id="linkSearch_${r.id}" placeholder="Search existing fair name…"
      style="padding:8px; border-radius:6px; border:none; font-family:'Domine',serif; font-size:14px;"
      oninput="searchLinkFairs('${r.id}')" />
    <select id="linkSelect_${r.id}"
      style="padding:8px; border-radius:6px; border:none; font-family:'Domine',serif; font-size:14px;">
      <option value="">— Select fair —</option>
    </select>
    <button class="action approve" style="background:#1a6e8e;" onclick="linkExistingFair('${r.id}')">
      🔗 Link to Existing Fair
    </button>
    <div id="linkStatus_${r.id}" style="font-size:13px;"></div>
  </div>
</div>
` : ``}

<p><b>Submitted:</b> ${new Date(r.submitted_at).toLocaleString()}</p>

<div class="btn-row" id="actionBtns_${r.id}">
  ${r.fair_id ? `
  <button class="btn btn-approve" onclick="approve('${r.id}','${r.user_id}','${r.fair_id}','${escapeQuotes(r.fair_name)}')">
    ✅ Approve & Assign Admin
  </button>
  ` : `
  <button class="btn btn-blue" onclick="createFair('${r.id}','${escapeQuotes(r.fair_name)}','${escapeQuotes(r.fair_city)}','${escapeQuotes(r.fair_state)}')">
    🏰 Create Fair
  </button>
  `}
  <button class="btn btn-reject" onclick="rejectReq('${r.id}')">❌ Reject</button>
</div>
      `;
      list.appendChild(div);
    });
  }

  function renderApproved(rows){
    var list = document.getElementById('list');
    list.innerHTML='';

    if(!rows.length){
      list.innerHTML='<p style="text-align:center;">No approved admins.</p>';
      return;
    }

    rows.forEach(function(r){
      var div=document.createElement('div');
      div.className='card';
var fairName = r.fair_name || '(Unknown fair)';
var fairState = r.fair_state || '';
     div.innerHTML=`
        <span class="badge approved">APPROVED</span>
        <h3>${fairName} ${fairState ? `(${fairState})` : ''}</h3>
        <p><b>Admin Email:</b> ${r.email}</p>
        <p><b>Level:</b> ${r.admin_level || 'free'}</p>
        <p><b>Assigned:</b> ${new Date(r.created_at).toLocaleString()}</p>
      `;
      list.appendChild(div);
    });
  }

  function escapeQuotes(s){
    return String(s || '').replace(/'/g, "\\'");
  }
async function createFair(verificationId, fairName, fairCity, fairState){

  var ok = await requireAdminLogin();
  if (!ok) return;

  if(!confirm(`Create new fair "${fairName}" in ${fairCity}, ${fairState}?`)) return;

var insertFair = await supabase
  .rpc('create_renaissance_fair', {
    p_name: fairName,
    p_city: fairCity,
    p_state: fairState
  });

  if(insertFair.error){
    console.error(insertFair.error);
    alert('Error creating fair.');
    return;
  }

  var newFairId = insertFair.data;

 var updateVerification = await supabase.rpc(
  'update_verification_fair_id',
  {
    p_verification_id: verificationId,
    p_fair_id: newFairId
  }
);

  if(updateVerification.error){
    console.error(updateVerification.error);
    alert('Fair created but verification update failed.');
    return;
  }

  alert('Fair created successfully. You can now approve the request.');

  load();
}
async function approve(verificationId, userId, fairId, fairName){
  var ok = await requireAdminLogin();
  if (!ok) return;

  if(!confirm(`Approve and assign admin for ${fairName}?`)) return;

  var finalFairId = parseInt(fairId, 10);
  if(!finalFairId){
    alert('This request was submitted without selecting an existing fair from the list. Open the request and resubmit with a selected fair, or create the fair in renaissance_fairs first.');
    return;
  }

  var insertResp = await supabase.rpc(
  'assign_fair_admin',
  {
    p_user_id: userId,
    p_fair_id: finalFairId,
    p_admin_level: 'owner'
  }
);

  if(insertResp.error){
    console.error(insertResp.error);
    alert('Error assigning admin.');
    return;
  }

 var updateResp = await supabase.rpc(
  'approve_fair_verification',
  { p_verification_id: verificationId }
);

  if(updateResp.error){
    console.error(updateResp.error);
    alert('Error updating verification.');
    return;
  }

  load();
}

 async function rejectReq(id){
  var ok = await requireAdminLogin();
  if (!ok) return;

  var reason = prompt("Enter rejection reason to send to applicant:");

  if(!reason || !reason.trim()){
    alert("Rejection reason is required.");
    return;
  }

var r = await supabase.rpc(
  'reject_fair_verification',
  {
    p_verification_id: id,
    p_reason: reason
  }
);

  if(r.error){
    console.error(r.error);
    alert('Error rejecting application.');
    return;
  }

  alert("Application rejected.");

  load();
}

  async function logout(){
    await supabase.auth.signOut();
    window.location.href = "/admin/admin_login.html";
  }

  // start
  load();

  async function searchLinkFairs(verificationId) {
  const query = document.getElementById('linkSearch_' + verificationId).value.trim();
  const sel = document.getElementById('linkSelect_' + verificationId);
  sel.innerHTML = '<option value="">— Select fair —</option>';
  if (query.length < 2) return;

  const { data, error } = await supabase
    .from('renaissance_fairs')
    .select('id, name, city, state')
    .ilike('name', `%${query}%`)
    .limit(10);

  if (error) { console.error(error); return; }
  (data || []).forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = `${f.name} — ${f.city}, ${f.state}`;
    sel.appendChild(o);
  });
}

async function linkExistingFair(verificationId) {
  const fairId = document.getElementById('linkSelect_' + verificationId).value;
  const status = document.getElementById('linkStatus_' + verificationId);

  if (!fairId) { status.textContent = '⚠ Please select a fair first.'; return; }

  const { error } = await supabase.rpc('update_verification_fair_id', {
    p_verification_id: verificationId,
    p_fair_id: parseInt(fairId)
  });

  if (error) {
    console.error(error);
    status.textContent = '❌ Error: ' + error.message;
    return;
  }

  status.textContent = '✅ Linked! Reloading…';
  setTimeout(() => load(), 800);
}
</script>

</body>
</html>
