    .topnav-right {

    .nav-btn {

      color: var(--gold-light);
      letter-spacing: 0.04em;

 async function requireAdminLogin(){
  const { data, error } = await supabase.auth.getSession();

// --- State ---
var selectedFairId = null;
var selectedUserId = null;
var allUsers = [];

// --- Load all users once ---
async function loadAllUsers() {
  const { data, error } = await supabase.rpc('get_admin_user_list');
  if (!error) allUsers = data || [];
}

// --- Fair search ---
async function searchFairs() {
  const query = document.getElementById('quickFairName').value.trim();
  const resultsDiv = document.getElementById('fairResults');
  resultsDiv.innerHTML = '';
  if (query.length < 2) return;

  const { data, error } = await supabase
    .from('renaissance_fairs')
    .select('id, name, city, state')
    .ilike('name', `%${query}%`)
    .limit(10);

  if (error) { console.error(error); return; }
  if (!data.length) { resultsDiv.innerHTML = '<p style="font-size:12px;color:#555;">No fairs found.</p>'; return; }

  data.forEach(f => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:8px 12px; background:rgba(255,255,255,0.85); border:1px solid rgba(0,0,0,0.15); border-radius:6px; margin-bottom:4px; cursor:pointer; font-size:13px; color:#111;';
    item.textContent = `${f.name} — ${f.city}, ${f.state}`;
    item.onmouseover = () => item.style.background = '#fff';
    item.onmouseout = () => item.style.background = 'rgba(255,255,255,0.85)';
    item.onclick = () => selectFair(f.id, `${f.name} — ${f.city}, ${f.state}`);
    resultsDiv.appendChild(item);
  });
}

async function selectFair(id, label) {
  selectedFairId = id;
  document.getElementById('fairResults').innerHTML = '';
  document.getElementById('quickFairName').value = '';
  document.getElementById('quickFairName').style.display = 'none';

  const display = document.getElementById('selectedFairDisplay');
  display.style.display = 'flex';
  document.getElementById('selectedFairName').textContent = '🏰 ' + label;

  document.getElementById('assignSection').style.display = 'block';
  await loadFairAdmins(id);
}

function clearFair() {
  selectedFairId = null;
  document.getElementById('quickFairName').style.display = 'block';
  document.getElementById('quickFairName').value = '';
  document.getElementById('selectedFairDisplay').style.display = 'none';
  document.getElementById('fairResults').innerHTML = '';
  document.getElementById('fairAdminsCard').style.display = 'none';
  document.getElementById('assignSection').style.display = 'none';
  clearUser();
}

// --- Load current admins for fair ---
async function loadFairAdmins(fairId) {
  const card = document.getElementById('fairAdminsCard');
  const list = document.getElementById('fairAdminsList');
  list.innerHTML = 'Loading…';
  card.style.display = 'block';

  const { data, error } = await supabase.rpc('get_fair_admins', { p_fair_id: parseInt(fairId) });

  if (error) { list.innerHTML = '❌ Error loading admins.'; return; }
  if (!data.length) { list.innerHTML = '<p style="font-size:13px;color:#555;">No admins assigned yet.</p>'; return; }

  list.innerHTML = '';
  data.forEach(a => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:rgba(255,255,255,0.7); border-radius:6px; margin-bottom:6px; font-size:13px; color:#111;';
    row.innerHTML = `
      <span><b>${a.email}</b> <span style="color:#555; font-size:11px; text-transform:uppercase; margin-left:6px;">${a.admin_level}</span></span>
      <button class="btn btn-reject" style="padding:5px 10px; font-size:11px;" onclick="removeAdmin('${a.user_id}', '${a.email}')">🗑 Remove</button>
    `;
    list.appendChild(row);
  });
}

async function removeAdmin(userId, email) {
  if (!confirm(`Remove ${email} as admin for this fair?`)) return;
  const { error } = await supabase.rpc('remove_fair_admin', {
    p_user_id: userId,
    p_fair_id: parseInt(selectedFairId)
  });
  if (error) { alert('❌ Error removing admin: ' + error.message); return; }
  await loadFairAdmins(selectedFairId);
}

// --- User search ---
function filterUsers() {
  const query = document.getElementById('quickUserSearch').value.trim().toLowerCase();
  const resultsDiv = document.getElementById('userResults');
  resultsDiv.innerHTML = '';
  if (query.length < 2) return;

  const matches = allUsers.filter(u =>
    (u.email && u.email.toLowerCase().includes(query)) ||
    (u.username && u.username.toLowerCase().includes(query))
  ).slice(0, 8);

  if (!matches.length) { resultsDiv.innerHTML = '<p style="font-size:12px;color:#555;">No users found.</p>'; return; }

  matches.forEach(u => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:8px 12px; background:rgba(255,255,255,0.85); border:1px solid rgba(0,0,0,0.15); border-radius:6px; margin-bottom:4px; cursor:pointer; font-size:13px; color:#111;';
    item.textContent = `${u.email}${u.username ? ' (' + u.username + ')' : ''}`;
    item.onmouseover = () => item.style.background = '#fff';
    item.onmouseout = () => item.style.background = 'rgba(255,255,255,0.85)';
    item.onclick = () => selectUser(u.id, u.email, u.username);
    resultsDiv.appendChild(item);
  });
}

function selectUser(id, email, username) {
  selectedUserId = id;
  document.getElementById('userResults').innerHTML = '';
  document.getElementById('quickUserSearch').value = '';
  document.getElementById('quickUserSearch').style.display = 'none';

  const display = document.getElementById('selectedUserDisplay');
  display.style.display = 'flex';
  document.getElementById('selectedUserName').textContent = `👤 ${email}${username ? ' (' + username + ')' : ''}`;
}

function clearUser() {
  selectedUserId = null;
  document.getElementById('quickUserSearch').style.display = 'block';
  document.getElementById('quickUserSearch').value = '';
  document.getElementById('selectedUserDisplay').style.display = 'none';
  document.getElementById('userResults').innerHTML = '';
  document.getElementById('quickStatus').textContent = '';
}

// --- Assign ---
async function quickAssign() {
  const status = document.getElementById('quickStatus');
  const role = document.getElementById('quickRole').value;

  if (!selectedFairId) { status.textContent = '⚠ Please select a fair.'; return; }
  if (!selectedUserId) { status.textContent = '⚠ Please select a user.'; return; }

 const { error } = await supabase.rpc('assign_fair_admin', {
  p_user_id: selectedUserId,
  p_fair_id: parseInt(selectedFairId),
  p_admin_level: role
});

if (error) { status.textContent = '❌ Error: ' + error.message; return; }

const { error: flagError } = await supabase
  .from('renaissance_fairs')
  .update({ approved_for_admin: true })
  .eq('id', parseInt(selectedFairId));

if (flagError) { status.textContent = '⚠ Admin assigned but fair flag failed.'; return; }

status.textContent = '✅ Admin assigned successfully!';
  clearUser();
  await loadFairAdmins(selectedFairId);
}

  </button>
  ` : `
  <button class="btn btn-blue" onclick="createFair('${r.id}','${escapeQuotes(r.fair_name)}','${escapeQuotes(r.fair_city)}','${escapeQuotes(r.fair_state)}','${escapeQuotes(r.fair_website || '')}')">
    🏰 Create Fair
  </button>
  `}
  <button class="btn btn-reject" onclick="rejectReq('${r.id}')">❌ Reject</button>
</div>
      `;
      list.appendChild(div);
    });
  }

  function renderApproved(rows){
    var list = document.getElementById('list');
    list.innerHTML='';

    if(!rows.length){
      list.innerHTML='<p style="text-align:center;">No approved admins.</p>';
      return;
    }

    rows.forEach(function(r){
      var div=document.createElement('div');
      div.className='card';
var fairName = r.fair_name || '(Unknown fair)';
var fairState = r.fair_state || '';
     div.innerHTML=`
        <span class="badge approved">APPROVED</span>
        <h3>${fairName} ${fairState ? `(${fairState})` : ''}</h3>
        <p><b>Admin Email:</b> ${r.email}</p>
        <p><b>Level:</b> ${r.admin_level || 'free'}</p>
        <p><b>Assigned:</b> ${new Date(r.created_at).toLocaleString()}</p>
      `;
      list.appendChild(div);
    });
  }

  function escapeQuotes(s){
    return String(s || '').replace(/'/g, "\\'");
  }
async function createFair(verificationId, fairName, fairCity, fairState, fairWebsite){

  var ok = await requireAdminLogin();
  if (!ok) return;

  if(!confirm(`Create new fair "${fairName}" in ${fairCity}, ${fairState}?`)) return;

var insertFair = await supabase
  .rpc('create_renaissance_fair', {
    p_name: fairName,
    p_city: fairCity,
    p_state: fairState,
    p_website: fairWebsite || null
  });

  if(insertFair.error){
    console.error(insertFair.error);
    alert('Error creating fair.');
    return;
  }

  var newFairId = insertFair.data;

 var updateVerification = await supabase.rpc(
  'update_verification_fair_id',
  {
    p_verification_id: verificationId,
    p_fair_id: newFairId
  }
);

  if(updateVerification.error){
    console.error(updateVerification.error);
    alert('Fair created but verification update failed.');
    return;
  }

  alert('Fair created successfully. You can now approve the request.');

  load();
}
async function approve(verificationId, userId, fairId, fairName){
  var ok = await requireAdminLogin();
  if (!ok) return;

  if(!confirm(`Approve and assign admin for ${fairName}?`)) return;

  var finalFairId = parseInt(fairId, 10);
  if(!finalFairId){
    alert('This request was submitted without selecting an existing fair from the list. Open the request and resubmit with a selected fair, or create the fair in renaissance_fairs first.');
    return;
  }

 var insertResp = await supabase.rpc(
  'assign_fair_admin',
  {
    p_user_id: userId,
    p_fair_id: finalFairId,
    p_admin_level: 'owner'
  }
);

if(insertResp.error){
  console.error(insertResp.error);
  alert('Error assigning admin.');
  return;
}

var flagResp = await supabase
  .from('renaissance_fairs')
  .update({ approved_for_admin: true })
  .eq('id', finalFairId);

if(flagResp.error){
  console.error(flagResp.error);
  alert('Admin assigned but could not flag fair. Please update manually.');
  return;
}

 var updateResp = await supabase.rpc(
  'approve_fair_verification',
  { p_verification_id: verificationId }
);

  if(updateResp.error){
    console.error(updateResp.error);
    alert('Error updating verification.');
    return;
  }

  load();
}

 async function rejectReq(id){
  var ok = await requireAdminLogin();
  if (!ok) return;

  var reason = prompt("Enter rejection reason to send to applicant:");

  if(!reason || !reason.trim()){
    alert("Rejection reason is required.");
    return;
  }

var r = await supabase.rpc(
  'reject_fair_verification',
  {
    p_verification_id: id,
    p_reason: reason
  }
);

  if(r.error){
    console.error(r.error);
    alert('Error rejecting application.');
    return;
  }

  alert("Application rejected.");

  load();
}

  async function logout(){
    await supabase.auth.signOut();
    window.location.href = "/admin/admin_login.html";
  }

  // start
  load();
  loadAllUsers();

  async function searchLinkFairs(verificationId) {
  const query = document.getElementById('linkSearch_' + verificationId).value.trim();
  const sel = document.getElementById('linkSelect_' + verificationId);
  sel.innerHTML = '<option value="">— Select fair —</option>';
  if (query.length < 2) return;

  const { data, error } = await supabase
    .from('renaissance_fairs')
    .select('id, name, city, state')
    .ilike('name', `%${query}%`)
    .limit(10);

  if (error) { console.error(error); return; }
  (data || []).forEach(f => {
    const o = document.createElement('option');
    o.value = f.id;
    o.textContent = `${f.name} — ${f.city}, ${f.state}`;
    sel.appendChild(o);
  });
}

async function linkExistingFair(verificationId) {
  const fairId = document.getElementById('linkSelect_' + verificationId).value;
  const status = document.getElementById('linkStatus_' + verificationId);

  if (!fairId) { status.textContent = '⚠ Please select a fair first.'; return; }

  const { error } = await supabase.rpc('update_verification_fair_id', {
    p_verification_id: verificationId,
    p_fair_id: parseInt(fairId)
  });

  if (error) {
    console.error(error);
    status.textContent = '❌ Error: ' + error.message;
    return;
  }

  status.textContent = '✅ Linked! Reloading…';
  setTimeout(() => load(), 800);
}
