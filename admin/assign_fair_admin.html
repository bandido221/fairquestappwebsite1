<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fair Admin Approval | FairQuest</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">

<!-- MATCH DASHBOARD: supabase-js v1 (NO @2) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  background:#000;
  color:#f0e6d2;
  font-family:'Domine', serif;
  padding:30px;
}
h1 {
  font-family:'Cinzel', serif;
  text-align:center;
}
.controls {
  text-align:center;
  margin-bottom:20px;
}
.controls button {
  margin:5px;
  padding:10px 16px;
  border-radius:8px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
.primary { background:#c79a3b; color:#000; }
.secondary { background:#444; color:#fff; }

.card {
  background:#111;
  border-radius:12px;
  padding:20px;
  margin:20px auto;
  max-width:800px;
}
.card h3 {
  margin-top:0;
}
.badge {
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
}
.pending { background:#b58900; color:#000; }
.approved { background:#2ecc71; color:#000; }
.newfair { background:#e67e22; color:#000; margin-left:8px; }

button.action {
  margin-top:10px;
  margin-right:10px;
  padding:8px 14px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.approve { background:#27ae60; color:#fff; }
.reject { background:#c0392b; color:#fff; }
</style>
</head>

<body>

<h1>🏰 Fair Admin Approval</h1>

<div class="controls">
  <button class="secondary" onclick="goHome()">← Go to FairQuest Main Page</button>
  <button class="secondary" onclick="goBackToDashboard()">← Back to Admin Dashboard</button>
  <br><br>
  <button class="primary" onclick="showPending()">Pending Applications</button>
  <button class="secondary" onclick="showApproved()">Approved / Admins</button>
  <br><br>
  <button class="secondary" onclick="logout()">Logout</button>
</div>

<div id="list">Loading…</div>

<script>
  // IMPORTANT: use "var" so it never crashes if another script also used "const supabase"
  var supabase = window.supabase.createClient(
    'https://awtbjuiqgtdydsqzimul.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
  );

  var mode = 'pending';

  function goHome(){
    window.location.href = "https://www.fairquestapp.com";
  }

  function goBackToDashboard(){
    // adjust if your dashboard file path is different
    window.location.href = "/admin/admin_dashboard.html";
  }

  function showPending(){ mode='pending'; load(); }
  function showApproved(){ mode='approved'; load(); }

 async function requireAdminLogin(){
  const { data, error } = await supabase.auth.getSession();

  if (error || !data?.session?.user) {
    window.location.href = "/admin/admin_login.html";
    return false;
  }

  return true;
}


  async function load(){
    var ok = await requireAdminLogin();
    if (!ok) return;

    var list = document.getElementById('list');
    list.innerHTML = 'Loading…';

    if(mode === 'pending'){
 var resp = await supabase
  .rpc('get_pending_fair_verifications');

      if(resp.error){
        console.error(resp.error);
        list.innerHTML = 'Error loading pending applications.';
        return;
      }
      renderPending(resp.data || []);
    } else {
   var resp2 = await supabase
  .rpc('get_fair_admins');

      if(resp2.error){
        console.error(resp2.error);
        list.innerHTML = 'Error loading approved admins.';
        return;
      }
      renderApproved(resp2.data || []);
    }
  }

  function renderPending(rows){
    var list = document.getElementById('list');
    list.innerHTML = '';

    if(!rows.length){
      list.innerHTML='<p style="text-align:center;">No pending applications.</p>';
      return;
    }

    rows.forEach(function(r){
      var div = document.createElement('div');
      div.className='card';
  const newFairBadge = (!r.fair_id) ? `<span class="badge newfair">NEW FAIR</span>` : ``;

div.innerHTML=`
  <span class="badge pending">PENDING</span>
  ${newFairBadge}
  <h3>${r.fair_name} (${r.fair_state})</h3>
        <p><b>Applicant:</b> ${r.contact_name}</p>
        <p><b>Email:</b> ${r.user_email}</p>
        <p><b>Role:</b> ${r.fair_role}</p>
<p><b>Notes:</b> ${r.fair_notes || '—'}</p>

${!r.fair_id ? `
<div style="margin-top:10px; padding:10px; background:#3b2a12; border-radius:6px;">
<b>⚠ New Fair:</b> This fair does not exist in the system yet.<br>
Add it to the <b>renaissance_fairs</b> table before approving.
</div>
` : ``}

<p><b>Submitted:</b> ${new Date(r.submitted_at).toLocaleString()}</p>

${r.fair_id ? `
<button class="action approve" onclick="approve('${r.id}','${r.user_id}','${r.fair_id}','${escapeQuotes(r.fair_name)}')">
  Approve & Assign Admin
</button>
` : `
<button class="action approve" onclick="createFair('${r.id}','${escapeQuotes(r.fair_name)}','${escapeQuotes(r.fair_city)}','${escapeQuotes(r.fair_state)}')">
  Create Fair
</button>
`}
        <button class="action reject" onclick="rejectReq('${r.id}')">
          Reject
        </button>
      `;
      list.appendChild(div);
    });
  }

  function renderApproved(rows){
    var list = document.getElementById('list');
    list.innerHTML='';

    if(!rows.length){
      list.innerHTML='<p style="text-align:center;">No approved admins.</p>';
      return;
    }

    rows.forEach(function(r){
      var div=document.createElement('div');
      div.className='card';
var fairName = r.fair_name || '(Unknown fair)';
var fairState = r.fair_state || '';
     div.innerHTML=`
        <span class="badge approved">APPROVED</span>
        <h3>${fairName} ${fairState ? `(${fairState})` : ''}</h3>
        <p><b>Admin Email:</b> ${r.email}</p>
        <p><b>Level:</b> ${r.admin_level || 'free'}</p>
        <p><b>Assigned:</b> ${new Date(r.created_at).toLocaleString()}</p>
      `;
      list.appendChild(div);
    });
  }

  function escapeQuotes(s){
    return String(s || '').replace(/'/g, "\\'");
  }
async function createFair(verificationId, fairName, fairCity, fairState){

  var ok = await requireAdminLogin();
  if (!ok) return;

  if(!confirm(`Create new fair "${fairName}" in ${fairCity}, ${fairState}?`)) return;

var insertFair = await supabase
  .rpc('create_renaissance_fair', {
    p_name: fairName,
    p_city: fairCity,
    p_state: fairState
  });

  if(insertFair.error){
    console.error(insertFair.error);
    alert('Error creating fair.');
    return;
  }

  var newFairId = insertFair.data;

 var updateVerification = await supabase.rpc(
  'update_verification_fair_id',
  {
    p_verification_id: verificationId,
    p_fair_id: newFairId
  }
);

  if(updateVerification.error){
    console.error(updateVerification.error);
    alert('Fair created but verification update failed.');
    return;
  }

  alert('Fair created successfully. You can now approve the request.');

  load();
}
async function approve(verificationId, userId, fairId, fairName){
  var ok = await requireAdminLogin();
  if (!ok) return;

  if(!confirm(`Approve and assign admin for ${fairName}?`)) return;

  var finalFairId = parseInt(fairId, 10);
  if(!finalFairId){
    alert('This request was submitted without selecting an existing fair from the list. Open the request and resubmit with a selected fair, or create the fair in renaissance_fairs first.');
    return;
  }

  var insertResp = await supabase.rpc(
  'assign_fair_admin',
  {
    p_user_id: userId,
    p_fair_id: finalFairId
  }
);

  if(insertResp.error){
    console.error(insertResp.error);
    alert('Error assigning admin.');
    return;
  }

 var updateResp = await supabase.rpc(
  'approve_fair_verification',
  { p_verification_id: verificationId }
);

  if(updateResp.error){
    console.error(updateResp.error);
    alert('Error updating verification.');
    return;
  }

  load();
}

 async function rejectReq(id){
  var ok = await requireAdminLogin();
  if (!ok) return;

  var reason = prompt("Enter rejection reason to send to applicant:");

  if(!reason || !reason.trim()){
    alert("Rejection reason is required.");
    return;
  }

var r = await supabase.rpc(
  'reject_fair_verification',
  {
    p_verification_id: id,
    p_reason: reason
  }
);

  if(r.error){
    console.error(r.error);
    alert('Error rejecting application.');
    return;
  }

  alert("Application rejected.");

  load();
}

  async function logout(){
    await supabase.auth.signOut();
    window.location.href = "/admin/admin_login.html";
  }

  // start
  load();
</script>

</body>
</html>
