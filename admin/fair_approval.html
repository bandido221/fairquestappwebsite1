   function showToast(message, type = 'ok') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);

function formatApproveError(err, actionLabel = 'Approve') {
  if (!err) return `${actionLabel} failed: Unknown error.`;
  if (err instanceof TypeError) {
    return `${actionLabel} failed: Network error. Check your internet and try again.`;
  }

  const code = String(err.code || '');
  const status = String(err.status || '');
  const details = String(err.details || '');
  const message = String(err.message || '');

  if (code === '23505' || status === '409') {
    return `Cannot approve: a fair with that name already exists. Change the name or update the existing fair instead.`;
  }

  if (code === '42501' || message.toLowerCase().includes('permission denied')) {
    return `Cannot ${actionLabel.toLowerCase()}: permission denied. You may not have admin access (RLS).`;
  }

  if (code === '22P02') {
    return `Cannot ${actionLabel.toLowerCase()}: invalid value format. Check dates and required fields.`;
  }

  if (details) return `${actionLabel} failed: ${details}`;
  return `${actionLabel} failed: ${message || 'Unexpected error.'}`;
}

async function safeOp(actionLabel, fn) {
  try {
    return await fn();
  } catch (e) {
    showToast(formatApproveError(e, actionLabel), 'error');
    return null;
  }
}
    async function loadPendingFairs() {
      const { data, error } = await supabaseClient
        .rpc('get_pending_fair_submissions');
     
      const list = document.getElementById('fairList');
      if (error || !data) return list.innerHTML = '<p>Error loading fairs.</p>';

      list.innerHTML = '';
      data.forEach(fair => {
        const card = document.createElement('div');
        card.className = 'fair-card';
        card.id = `fair-${fair.id}`;
        const submittedAt = fair.submitted_at
          ? new Date(fair.submitted_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })
          : '—';

        card.innerHTML = `
          <div style="background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:13px;">
            <strong>📤 Submitted by:</strong> ${fair.submitted_by_email || 'Unknown'} ${fair.submitted_by_username ? `(${fair.submitted_by_username})` : ''}<br>
            <strong>🕒 Submitted at:</strong> ${submittedAt}
          </div>
          <label>Fair Name</label>
          <input value="${fair.name}" id="name-${fair.id}" />
          <label>Address</label>
          <input value="${fair.address}" id="address-${fair.id}" />
          <label>City</label>
          <input value="${fair.city}" id="city-${fair.id}" />
          <label>State</label>
          <input value="${fair.state}" id="state-${fair.id}" />
          <label>ZIP</label>
          <input value="${fair.zip || ''}" id="zip-${fair.id}" />
          <label>Start Date</label>
          <input value="${fair.start_date}" id="start-${fair.id}" type="date" />
          <label>End Date</label>
          <input value="${fair.end_date}" id="end-${fair.id}" type="date" />
          <label>Website</label>
          <input value="${fair.website || ''}" id="website-${fair.id}" />
          <label>Image URL</label>
          <input value="${fair.image_url || ''}" id="image-${fair.id}" />
         <div class="btn-row">
            <button class="btn btn-approve" onclick="approveFair(${fair.id})">✅ Approve</button>
            <button class="btn btn-reject" onclick="rejectFair(${fair.id})">❌ Reject</button>
            <button class="btn btn-delete" onclick="deletePendingFair(${fair.id})">🗑️ Delete</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

   async function approveFair(id) {
  await safeOp('Approve', async () => {
    const fields = ["name", "address", "city", "state", "zip", "start", "end", "website", "image"];
    const values = {};

    fields.forEach(f => {
      const el = document.getElementById(`${f}-${id}`);
      if (!el) return;

      const key = f
        .replace('start', 'start_date')
        .replace('end', 'end_date')
        .replace('image', 'image_url');

      values[key] = (el.value ?? '').trim();
    });

    if (!values.name) {
      showToast('Cannot approve: Fair name is required.', 'warn');
      return;
    }

  const { error: insertError } = await supabaseClient.rpc(
  'approve_new_fair',
  {
    p_submission_id: id,
    p_name: values.name,
    p_address: values.address,
    p_city: values.city,
    p_state: values.state,
    p_zip: values.zip,
    p_start_date: values.start_date,
    p_end_date: values.end_date,
    p_website: values.website,
    p_image_url: values.image_url
  }
);

if (insertError) {
  showToast(formatApproveError(insertError, 'Approve'), 'error');
  return;
}

    document.getElementById(`fair-${id}`)?.remove();
    showToast('👑 Fair approved!', 'ok');
  });
}

await supabaseClient.rpc(

    }
