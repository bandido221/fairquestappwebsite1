<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/fq_theme.css" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fair Review | Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HP222J86X0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-HP222J86X0');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #f1df99;
      --gold-dark:   #8a6a1a;
      --parchment:   rgba(241, 223, 153, 0.93);
      --bg:          #0d0a04;
      --card-radius: 16px;
    }

    body {
      font-family: 'Domine', serif;
      background: var(--bg);
      color: var(--gold-light);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,60,10,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .topnav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13, 10, 4, 0.95);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
    }
    .topnav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .topnav-logo img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .topnav-logo span {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      font-family: 'Domine', serif;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .nav-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.55);
      color: var(--gold-light);
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }

    .card {
      background: var(--parchment) !important;
      border-radius: var(--card-radius);
      padding: 22px 20px;
      margin-bottom: 16px;
      box-shadow:
        0 2px 0 rgba(201,168,76,0.35),
        0 8px 28px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(201,168,76,0.4);
      text-align: left;
    }
    .card, .card * { color: #111 !important; }

    .card p { font-size: 13px; color: #333 !important; margin-bottom: 6px; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
      padding: 12px;
      background: rgba(255,255,0,0.12);
      border: 1px solid rgba(200,180,0,0.3);
      border-radius: 8px;
    }
    .field label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #444 !important;
    }
    .field span {
      flex: 1;
      padding: 6px 10px;
      background: rgba(255,255,255,0.7);
      border-radius: 6px;
      font-size: 13px;
      color: #111 !important;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .btn {
      font-family: 'Domine', serif;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.85);
      color: #111 !important;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { background: #fff; transform: translateY(-1px); }
    .btn-approve { background: rgba(46,125,50,0.15); border-color: rgba(46,125,50,0.4); color: #1b5e20 !important; }
    .btn-approve:hover { background: rgba(46,125,50,0.25); }
    .btn-reject { background: rgba(180,30,30,0.12); border-color: rgba(180,30,30,0.3); color: #7a0000 !important; }
    .btn-reject:hover { background: rgba(180,30,30,0.22); }
  </style>
</head>
<body>

  <nav class="topnav">
    <a class="topnav-logo" href="/index.html">
      <img src="/images/logo.png" alt="FairQuest" />
      <span>FairQuest</span>
    </a>
    <div class="topnav-right">
      <a href="/admin/admin_dashboard.html" class="nav-btn">⬅ Dashboard</a>
      <a href="/index.html" class="nav-btn">🏠 Home</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>🛡️ Review Fair Updates</h1>
    </div>
    <div id="reviewContainer">Loading suggestions...</div>
  </div>

 <!-- Replace this section inside your <script> tag -->
<script>
  const supabase = window.supabase.createClient(
    'https://awtbjuiqgtdydsqzimul.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
  );

  async function loadSuggestions() {
const { data: suggestions, error } = await supabase
  .rpc('get_pending_fair_update_suggestions');

  if (error) {
    document.getElementById('reviewContainer').innerHTML = `<p>Error: ${error.message}</p>`;
    return;
  }

  // Group suggestions by fair_id
  const grouped = {};
  for (const s of suggestions) {
    if (!grouped[s.fair_id]) grouped[s.fair_id] = [];
    grouped[s.fair_id].push(s);
  }

  for (const fairId in grouped) {
    const latest = grouped[fairId][0]; // just show the latest suggestion
    const { data: fairResult } = await supabase
  .rpc('get_fair_by_id', { p_fair_id: fairId });

const fairData = fairResult?.[0];

    const card = document.createElement('div');
    card.className = 'card';

   
    card.innerHTML += `<p><strong>Submitted by:</strong> ${latest.user_id ? 'User' : 'Guest'}</p>`;
    card.innerHTML += `<p><strong>📍 Address:</strong> ${fairData.address}</p>`;
    card.innerHTML += `<p><strong>🏙️ City:</strong> ${fairData.city}</p>`;
    card.innerHTML += `<p><strong>🗺️ State:</strong> ${fairData.state}</p>`;
    card.innerHTML += `<p><strong>🌐 Website:</strong> ${fairData.website ? `<a href="${fairData.website}" target="_blank">${fairData.website}</a>` : 'N/A'}</p>`;
    card.innerHTML += `<p><strong>📷 Image:</strong><br><img src="${fairData.image_url || 'https://placehold.co/600x200?text=No+Image'}" style="width:100%; max-width:600px; border-radius:10px; margin-top:10px;" /></p>`;
    card.innerHTML += `<p><strong>📅 Weekends:</strong></p>`;

    const weekendFields = [
      ['start_date', 'end_date'],
      ...Array.from({length: 9}, (_, i) => [`week${i+2}_start_date`, `week${i+2}_end_date`])
    ];
    const ul = document.createElement('ul');
    weekendFields.forEach(([sKey, eKey]) => {
      if (fairData[sKey] && fairData[eKey]) {
        const li = document.createElement('li');
        li.textContent = `${fairData[sKey]} → ${fairData[eKey]}`;
        ul.appendChild(li);
      }
    });
    card.appendChild(ul);

    const fields = ['name', 'address', 'city', 'state', 'zip', 'website', 'image_url', 'start_date', 'end_date'];

    fields.forEach(field => {
      const liveVal = fairData?.[field] ?? '';
      const suggestedVal = latest?.[field] ?? '';

      if (!suggestedVal || suggestedVal === liveVal) return;

      const div = document.createElement('div');
      div.className = 'field';
      div.style.background = '#fff3b0';
      div.innerHTML = `
  <label>${field.replace('_', ' ').toUpperCase()}:</label>
  <div style="flex: 1; display: flex; flex-direction: column; gap: 6px;">
    <span><strong>Live:</strong> ${liveVal || '(blank)'}</span>
    <span><strong>Suggested:</strong> ${suggestedVal}</span>
    <div class="btn-row">
      <button class="btn btn-approve" onclick="approveField(${latest.id}, '${field}', \`${suggestedVal.replace(/`/g, "\\`")}\`)">✅ Approve</button>
      <button class="btn btn-reject" onclick="rejectField(${latest.id})">❌ Reject</button>
    </div>
  </div>
`;

      card.appendChild(div);
    });

    document.getElementById('reviewContainer').appendChild(card);
  }
}

async function rejectField(suggestionId) {
const { error } = await supabase
  .rpc('reject_fair_update_suggestion', { p_id: suggestionId });

  if (error) {
    alert('❌ ' + error.message);
    return;
  }

  alert('❌ Suggestion rejected.');
  location.reload();
}

async function approveField(suggestionId, field, value) {
  const { data, error } = await supabase.rpc('approve_fair_update_field', {
    input: {
      suggestion_id: suggestionId,
      field_name: field,
      new_value: value
    }
  });

  if (error) {
    alert('❌ ' + error.message);
    console.error(error);
    return;
  }
  alert(`✅ ${field} approved!`);
  location.reload();
}



  loadSuggestions();
</script>

</body>
</html>
