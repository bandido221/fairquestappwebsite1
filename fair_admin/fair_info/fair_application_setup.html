<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Setup | FairQuest</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/fq_theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Domine', serif;
      background: #000;
      color: #f0e6d2;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1, h2, h3 {
      font-family: 'Cinzel', serif;
      margin: 10px 0;
    }

    .card {
      position: relative;
      background: rgba(214, 197, 126, 0.88);
      padding: 26px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      margin: 18px auto;
      max-width: 980px;
      color: #3b1f1f;
      text-align: left;
    }

    .profile-logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 60px;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .btn {
      background-color: #4CAF50;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #45a049;
    }

    .btn-dark {
      background-color: #2f2f2f;
    }

    .btn-dark:hover {
      background-color: #222;
    }

    .hint {
      margin-top: 10px;
      opacity: 0.9;
    }

    .divider {
      margin: 18px 0;
      height: 1px;
      background: rgba(0,0,0,0.18);
    }

    .forms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .form-type-card {
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 18px;
    }

    .form-type-card h3 {
      margin-top: 0;
      color: #3b1f1f;
    }

    .meta-line {
      margin-top: 8px;
      font-size: 15px;
    }

    .meta-label {
      font-weight: 700;
    }

    .empty-box {
      margin-top: 10px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(0,0,0,0.06);
      border: 1px dashed rgba(0,0,0,0.20);
      text-align: center;
      font-weight: 700;
    }

    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(0,0,0,0.10);
      margin-top: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <h1 id="pageTitle">Application Setup</h1>

  <div id="loadingOverlay" style="
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  ">
    <div style="
      border: 6px solid #f3f3f3;
      border-top: 6px solid #bb9457;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    "></div>
  </div>

  <div class="card">
    <a href="/home.html">
      <img src="/images/logo.png" alt="FairQuest Logo" class="profile-logo" />
    </a>

    <h2 style="margin-top:0;">Application Forms</h2>

    <div class="btn-row">
      <button class="btn btn-dark" id="btnBack">⬅ Back to Applications</button>
      <button class="btn" id="btnCreateForm">Create New Form</button>
    </div>

    <div class="hint" id="statusMsg"></div>

    <div class="divider"></div>

    <div class="forms-grid" id="formsGrid"></div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://awtbjuiqgtdydsqzimul.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
    );

    function getFairIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const fairIdRaw = params.get('fair_id');
      const fairId = Number(fairIdRaw);
      return Number.isFinite(fairId) ? fairId : null;
    }

    function showLoader() {
      const el = document.getElementById('loadingOverlay');
      if (el) el.style.display = 'flex';
    }

    function hideLoader() {
      const el = document.getElementById('loadingOverlay');
      if (el) el.style.display = 'none';
    }

    function setMsg(text) {
      document.getElementById('statusMsg').textContent = text || '';
    }

    async function requireAccess(fairId) {
      const { data, error } = await supabaseClient
        .rpc('fair_man_app_require_access', { p_fair_id: fairId, p_perm: 'edit_forms' });

      if (error) throw error;
      return data;
    }

    async function loadFair(fairId) {
      const { data, error } = await supabaseClient
        .from('renaissance_fairs')
        .select('id, name')
        .eq('id', fairId)
        .single();

      if (error) throw error;
      return data;
    }

    async function listForms(fairId) {
      const { data, error } = await supabaseClient
        .rpc('fair_man_app_list_forms', { p_fair_id: fairId });

      if (error) throw error;
      return Array.isArray(data) ? data : [];
    }

    async function getActiveForms(fairId) {
      const { data, error } = await supabaseClient
        .rpc('fair_man_app_get_active_forms', { p_fair_id: fairId });

      if (error) throw error;
      return Array.isArray(data) ? data : [];
    }

    function getTypeLabel(formType) {
      if (formType === 'vendor') return 'Vendor Form';
      if (formType === 'food_vendor') return 'Food Vendor Form';
      if (formType === 'performer') return 'Performer Form';
      return formType || 'Form';
    }

    function pickActiveForm(forms, activeRows, type) {
      const activeRow = activeRows.find(r => r.form_type === type);
      if (!activeRow || !activeRow.active_form_id) return null;

      return forms.find(f => String(f.form_id) === String(activeRow.active_form_id)) || null;
    }

    function buildCard({ fairId, type, form }) {
      const card = document.createElement('div');
      card.className = 'form-type-card';

      const title = document.createElement('h3');
      title.textContent = getTypeLabel(type);
      card.appendChild(title);

      if (!form) {
        const empty = document.createElement('div');
        empty.className = 'empty-box';
        empty.textContent = `No application created for ${getTypeLabel(type)}.`;
        card.appendChild(empty);
        return card;
      }

      const nameLine = document.createElement('div');
      nameLine.className = 'meta-line';
      nameLine.innerHTML = `<span class="meta-label">Application:</span> ${form.title || 'Untitled Form'}`;
      card.appendChild(nameLine);

      const versionLine = document.createElement('div');
      versionLine.className = 'meta-line';
      versionLine.innerHTML = `<span class="meta-label">Version:</span> ${form.version || '—'}`;
      card.appendChild(versionLine);

      const activePill = document.createElement('div');
      activePill.className = 'pill';
      activePill.textContent = 'active';
      card.appendChild(activePill);

      const btnRow = document.createElement('div');
      btnRow.className = 'btn-row';

      const btnView = document.createElement('button');
      btnView.className = 'btn btn-dark';
      btnView.type = 'button';
      btnView.textContent = 'View Application';
      btnView.onclick = () => {
        window.location.href = `fair_form_preview.html?fair_id=${fairId}&form_id=${form.form_id}`;
      };

      const btnEdit = document.createElement('button');
      btnEdit.className = 'btn';
      btnEdit.type = 'button';
      btnEdit.textContent = 'Edit Application';
      btnEdit.onclick = () => {
        window.location.href = `fair_form_edit.html?fair_id=${fairId}&form_id=${form.form_id}`;
      };

      btnRow.appendChild(btnView);
      btnRow.appendChild(btnEdit);
      card.appendChild(btnRow);

      return card;
    }

    function renderCards(fairId, forms, activeRows) {
      const grid = document.getElementById('formsGrid');
      grid.innerHTML = '';

      const vendorForm = pickActiveForm(forms, activeRows, 'vendor');
      const foodForm = pickActiveForm(forms, activeRows, 'food_vendor');
      const performerForm = pickActiveForm(forms, activeRows, 'performer');

      grid.appendChild(buildCard({ fairId, type: 'vendor', form: vendorForm }));
      grid.appendChild(buildCard({ fairId, type: 'food_vendor', form: foodForm }));
      grid.appendChild(buildCard({ fairId, type: 'performer', form: performerForm }));
    }

    async function loadPage() {
      showLoader();
      setMsg('');

      const fairId = getFairIdFromUrl();
      if (!fairId) {
        setMsg('Missing fair_id in URL.');
        hideLoader();
        return;
      }

      const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
      if (userError || !user) {
        setMsg('Please log in first.');
        hideLoader();
        return;
      }

      document.getElementById('btnBack').onclick = () => {
        window.location.href = `fair_applications.html?fair_id=${fairId}`;
      };

      document.getElementById('btnCreateForm').onclick = () => {
        window.location.href = `fair_form_create.html?fair_id=${fairId}`;
      };

      try {
        await requireAccess(fairId);

        const fair = await loadFair(fairId);
        document.getElementById('pageTitle').textContent = `Application Setup — ${fair.name}`;

        const forms = await listForms(fairId);
        const activeRows = await getActiveForms(fairId);

        renderCards(fairId, forms, activeRows);

        if (!activeRows.length) {
          setMsg('No active applications created yet.');
        } else {
          setMsg('');
        }
      } catch (e) {
        console.error(e);
        setMsg('Error loading application setup. Check console.');
      } finally {
        hideLoader();
      }
    }

    loadPage();
  </script>
</body>
</html>
