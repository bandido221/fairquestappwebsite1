<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Favorite Fairs | FairQuest</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Domine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/fq_theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #f1df99;
      --gold-dark:   #8a6a1a;
      --parchment:   rgba(241, 223, 153, 0.93);
      --parchment-2: rgba(214, 197, 126, 0.90);
      --ink:         #1e1208;
      --ink-2:       #3b1f1f;
      --ink-3:       #5c3a1e;
      --bg:          #0d0a04;
      --card-radius: 16px;
    }

    body {
      font-family: 'Domine', serif;
      background: var(--bg);
      color: var(--gold-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,60,10,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOP NAV ── */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13, 10, 4, 0.95);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
    }
    .topnav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .topnav-logo img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
    }
    .topnav-logo span {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      color: var(--gold-light);
      letter-spacing: 0.05em;
    }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      font-family: 'Domine', serif;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid rgba(201,168,76,0.3);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .nav-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.55);
      color: var(--gold-light);
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }
    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(22px, 6vw, 34px);
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }
    .page-header .subtitle {
      font-size: 14px;
      color: var(--gold);
      margin-top: 6px;
      opacity: 0.85;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── GOLD CARD ── */
    .card {
      background: var(--parchment);
      border-radius: var(--card-radius);
      padding: 22px 20px;
      margin-bottom: 18px;
      box-shadow:
        0 2px 0 rgba(201,168,76,0.35),
        0 8px 28px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(201,168,76,0.4);
      animation: fadeUp 0.45s ease both;
    }
    .card, .card * { color: #111 !important; }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111 !important;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.12);
    }

    /* ── FAIR ITEM ── */
    .fair-item {
      display: flex;
      gap: 14px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .fair-item:last-child { margin-bottom: 0; }
    .fair-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    }
    .fair-item:active { transform: scale(0.99); }

    /* image thumbnail */
    .fair-thumb {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid rgba(201,168,76,0.4);
      background: rgba(0,0,0,0.08);
    }
    .fair-thumb-placeholder {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #c9a84c33, #8a6a1a33);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 2px solid rgba(201,168,76,0.3);
    }

    .fair-info { flex: 1; min-width: 0; }
    .fair-name {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 700;
      color: #111 !important;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fair-location {
      font-size: 13px;
      color: #333 !important;
      margin-bottom: 4px;
    }
    .fair-dates {
      font-size: 12px;
      color: #555 !important;
    }
    .fair-address {
      font-size: 12px;
      color: #555 !important;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fair-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 8px;
    }

    .btn-view {
      font-family: 'Domine', serif;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1.5px solid rgba(201,168,76,0.5);
      background: rgba(201,168,76,0.15);
      color: #111 !important;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-view:hover { background: rgba(201,168,76,0.3); }

    .btn-remove {
      font-family: 'Domine', serif;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1.5px solid rgba(180,30,30,0.3);
      background: rgba(180,30,30,0.08);
      color: #cc0000 !important;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-remove:hover { background: rgba(180,30,30,0.2); }
    .btn-remove:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: #111 !important;
      margin-bottom: 8px;
    }
    .empty-sub {
      font-size: 14px;
      color: #444 !important;
      margin-bottom: 18px;
    }
    .btn-explore {
      display: inline-block;
      font-family: 'Domine', serif;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 10px;
      background: rgba(201,168,76,0.2);
      border: 1.5px solid rgba(201,168,76,0.5);
      color: #111 !important;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-explore:hover { background: rgba(201,168,76,0.35); }

    /* ── COUNT BADGE ── */
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--gold-dark);
      color: var(--gold-light) !important;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      border-radius: 999px;
      padding: 2px 9px;
      margin-left: 8px;
    }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.13) 50%, rgba(0,0,0,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }
    .skeleton-item {
      display: flex;
      gap: 14px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(13,10,4,0.95);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light) !important;
      font-family: 'Domine', serif;
      font-size: 14px;
      padding: 12px 22px;
      border-radius: 12px;
      z-index: 999;
      transition: transform 0.3s ease;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── LOADER ── */
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    #loadingOverlay {
      position: fixed; inset: 0;
      background: rgba(13,10,4,0.92);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999; flex-direction: column; gap: 18px;
    }
    .spinner {
      border: 4px solid rgba(201,168,76,0.2);
      border-top: 4px solid var(--gold);
      border-radius: 50%;
      width: 48px; height: 48px;
      animation: spin 0.85s linear infinite;
    }
    #loadingOverlay p {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 0.06em;
    }

    /* ── FOOTER ── */
    .footer-links {
      text-align: center;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(201,168,76,0.15);
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--gold);
      font-size: 13px;
      text-decoration: none;
      opacity: 0.8;
    }
    .footer-links a:hover { opacity: 1; text-decoration: underline; }

    @media (max-width: 480px) {
      .page { padding: 20px 12px 50px; }
      .fair-thumb, .fair-thumb-placeholder { width: 58px; height: 58px; }
      .fair-name { font-size: 14px; }
      .fair-actions { flex-direction: row; align-items: center; }
    }
  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading your favorites…</p>
  </div>

  <div class="toast" id="toast"></div>

  <nav class="topnav">
    <a class="topnav-logo" href="/index.html">
      <img src="/images/logo.png" alt="FairQuest" />
      <span>FairQuest</span>
    </a>
    <div class="topnav-right" id="menuRight">
      <a href="/fairs/explore.html" class="nav-btn">🎪 Fairs</a>
      <a href="/profile/index.html" class="nav-btn">👤 Profile</a>
    </div>
  </nav>

  <div class="page">

    <div class="page-header">
      <h1>❤️ My Favorite Fairs</h1>
      <p class="subtitle">Fairs you've saved to revisit</p>
    </div>

    <div class="card" id="mainCard">
      <div class="card-title">
        🏰 Saved Fairs
        <span class="count-badge" id="countBadge" style="display:none;"></span>
      </div>

      <!-- Skeleton loading -->
      <div id="skeletonList">
        <div class="skeleton-item">
          <div class="skeleton" style="width:72px;height:72px;border-radius:10px;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;">
            <div class="skeleton" style="height:16px;width:60%;"></div>
            <div class="skeleton" style="height:13px;width:40%;"></div>
            <div class="skeleton" style="height:12px;width:50%;"></div>
          </div>
        </div>
        <div class="skeleton-item">
          <div class="skeleton" style="width:72px;height:72px;border-radius:10px;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;">
            <div class="skeleton" style="height:16px;width:55%;"></div>
            <div class="skeleton" style="height:13px;width:35%;"></div>
            <div class="skeleton" style="height:12px;width:45%;"></div>
          </div>
        </div>
        <div class="skeleton-item">
          <div class="skeleton" style="width:72px;height:72px;border-radius:10px;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;">
            <div class="skeleton" style="height:16px;width:65%;"></div>
            <div class="skeleton" style="height:13px;width:42%;"></div>
            <div class="skeleton" style="height:12px;width:48%;"></div>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🏰</div>
        <div class="empty-title">No Favorites Yet</div>
        <div class="empty-sub">Browse fairs and tap the ❤️ to save them here.</div>
        <a href="/fairs/explore.html" class="btn-explore">🧭 Explore Fairs</a>
      </div>

      <!-- Fair list -->
      <div id="fairList"></div>
    </div>

    <div class="footer-links">
      <a href="/profile/index.html">← Back to Profile</a>
      <a href="/fairs/explore.html">Explore Fairs</a>
      <a href="/how_to/help_center.html">Help</a>
    </div>

  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://awtbjuiqgtdydsqzimul.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
    );

    function hideLoader() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function formatDate(d) {
      if (!d) return '?';
      const date = new Date(d);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function buildFairItem(fair) {
      const item = document.createElement('div');
      item.className = 'fair-item';
      item.dataset.fairId = fair.fair_id;

      const thumbHtml = fair.image_url
        ? `<img class="fair-thumb" src="${fair.image_url}" alt="${fair.fair_name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
           <div class="fair-thumb-placeholder" style="display:none;">🎪</div>`
        : `<div class="fair-thumb-placeholder">🎪</div>`;

      const location = [fair.city, fair.state].filter(Boolean).join(', ');
      const startFmt = formatDate(fair.start_date);
      const endFmt   = formatDate(fair.end_date);
      const datesStr = (fair.start_date || fair.end_date) ? `${startFmt} → ${endFmt}` : 'Dates TBD';
      const address  = fair.address || 'Address not available';

      item.innerHTML = `
        ${thumbHtml}
        <div class="fair-info">
          <div class="fair-name">${fair.fair_name || 'Unknown Fair'}</div>
          <div class="fair-location">📍 ${location || 'Location TBD'}</div>
          <div class="fair-dates">📅 ${datesStr}</div>
          <div class="fair-address">🏠 ${address}</div>
        </div>
        <div class="fair-actions">
          <a class="btn-view" href="/fairs/fair_detail.html?id=${fair.fair_id}">View Fair</a>
          <button class="btn-remove" data-fair-id="${fair.fair_id}" onclick="removeFavorite(event, '${fair.fair_id}')">
            🗑 Remove
          </button>
        </div>
      `;

      // clicking the card body (not buttons) navigates to fair
      item.addEventListener('click', (e) => {
        if (e.target.closest('.btn-remove') || e.target.closest('.btn-view')) return;
        window.location.href = `/fairs/fair_detail.html?id=${fair.fair_id}`;
      });

      return item;
    }

    async function loadFavorites() {
      try {
        const { data: sessionData } = await supabaseClient.auth.getSession();
        if (!sessionData?.session?.user) {
          window.location.href = '/user_login.html?redirect=/favorites/index.html';
          return;
        }

        const { data, error } = await supabaseClient.rpc('app_get_my_favorite_fairs');

        document.getElementById('skeletonList').style.display = 'none';

        if (error) throw error;

        const list = document.getElementById('fairList');
        const empty = document.getElementById('emptyState');
        const badge = document.getElementById('countBadge');

        if (!data || data.length === 0) {
          empty.style.display = 'block';
          hideLoader();
          return;
        }

        badge.textContent = data.length;
        badge.style.display = 'inline-flex';

        data.forEach(fair => {
          list.appendChild(buildFairItem(fair));
        });

        hideLoader();

      } catch (err) {
        console.error('loadFavorites error:', err);
        document.getElementById('skeletonList').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        hideLoader();
        showToast('⚠️ Failed to load favorites');
      }
    }

    async function removeFavorite(event, fairId) {
      event.stopPropagation();
      const btn = event.currentTarget;
      btn.disabled = true;
      btn.textContent = '…';

      try {
        const { error } = await supabaseClient.rpc('app_remove_favorite', {
          p_entity_type: 'fair',
          p_entity_id: fairId.toString()
        });

        if (error) throw error;

        // Remove the card from the DOM
        const item = document.querySelector(`.fair-item[data-fair-id="${fairId}"]`);
        if (item) {
          item.style.transition = 'opacity 0.3s, transform 0.3s';
          item.style.opacity = '0';
          item.style.transform = 'translateX(20px)';
          setTimeout(() => item.remove(), 300);
        }

        // Update count badge
        const list = document.getElementById('fairList');
        const remaining = list.querySelectorAll('.fair-item').length - 1;
        const badge = document.getElementById('countBadge');

        if (remaining <= 0) {
          badge.style.display = 'none';
          setTimeout(() => {
            document.getElementById('emptyState').style.display = 'block';
          }, 350);
        } else {
          badge.textContent = remaining;
        }

        showToast('✅ Removed from favorites');

      } catch (err) {
        console.error('removeFavorite error:', err);
        btn.disabled = false;
        btn.textContent = '🗑 Remove';
        showToast('⚠️ Could not remove favorite');
      }
    }

    // Update top nav based on auth state
    async function updateMenuBar() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      const menuRight = document.getElementById('menuRight');
      const isLoggedIn = sessionData?.session?.user != null;

      if (!isLoggedIn) {
        menuRight.innerHTML = `
          <a href="/fairs/explore.html" class="nav-btn">🎪 Fairs</a>
          <a href="/user_login.html" class="nav-btn">Sign In</a>
        `;
      } else {
        menuRight.innerHTML = `
          <a href="/fairs/explore.html" class="nav-btn">🎪 Fairs</a>
          <a href="/profile/index.html" class="nav-btn">👤 Profile</a>
          <a href="#" class="nav-btn" onclick="logout()">Logout</a>
        `;
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = '/index.html';
    }

    updateMenuBar();
    loadFavorites();
  </script>
</body>
</html>
