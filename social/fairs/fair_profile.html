<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fair Profile | FairQuest</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Domine:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/fq_theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #f1df99;
      --gold-dark:   #8a6a1a;
      --parchment:   rgba(241, 223, 153, 0.93);
      --ink:         #1e1208;
      --bg:          #0d0a04;
      --card-radius: 16px;
    }

    body {
      font-family: 'Domine', serif;
      background: var(--bg);
      color: var(--gold-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,60,10,0.15) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    .topnav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(13,10,4,0.95);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 56px;
    }
    .topnav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .topnav-logo img { width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(201,168,76,0.3); }
    .topnav-logo span { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold-light); letter-spacing: 0.05em; }
    .topnav-right { display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      font-family: 'Domine', serif; font-size: 13px; padding: 7px 14px;
      border-radius: 8px; border: 1px solid rgba(201,168,76,0.3);
      background: transparent; color: var(--gold); cursor: pointer;
      text-decoration: none; transition: background 0.2s, border-color 0.2s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .nav-btn:hover { background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.55); color: var(--gold-light); }

    /* PAGE */
    .page {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 28px 16px 60px;
    }

    /* PAGE HEADER */
    .page-header {
      text-align: center; margin-bottom: 28px;
      animation: fadeDown 0.5s ease both;
    }
    .page-header h1 {
      font-family: 'Cinzel', serif; font-size: clamp(22px, 6vw, 34px);
      font-weight: 700; color: var(--gold-light); letter-spacing: 0.04em; line-height: 1.2;
    }
    .page-header .subtitle { font-size: 14px; color: var(--gold); margin-top: 6px; opacity: 0.85; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp 0.45s ease both; }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }
    .card:nth-child(5) { animation-delay: 0.33s; }

    /* CARDS */
    .card {
      background: var(--parchment);
      border-radius: var(--card-radius); padding: 22px 20px; margin-bottom: 18px;
      box-shadow: 0 2px 0 rgba(201,168,76,0.35), 0 8px 28px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(201,168,76,0.4); color: #111;
    }
    .card, .card * { color: #111 !important; }

    .card-title {
      font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: #111 !important;
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .card-title::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.12); }

    /* FAIR HERO */
    .fair-hero-card {
      background: var(--parchment);
      border-radius: var(--card-radius); overflow: hidden; margin-bottom: 18px;
      box-shadow: 0 2px 0 rgba(201,168,76,0.35), 0 8px 28px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
      border: 1px solid rgba(201,168,76,0.4);
      animation: fadeUp 0.45s ease both;
    }
    .fair-banner-wrap {
      position: relative; width: 100%; height: 160px;
      background: linear-gradient(135deg, #1a1208, #2a1e0a); overflow: hidden;
    }
    .fair-banner-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.8; }
    .fair-profile-row {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; flex-wrap: wrap;
    }
    .fair-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--gold);
      box-shadow: 0 0 0 4px rgba(201,168,76,0.2), 0 4px 14px rgba(0,0,0,0.4);
      display: block; background: #1a1208; flex-shrink: 0;
    }
    .fair-info { flex: 1; min-width: 0; }
    .fair-name-title {
      font-family: 'Cinzel', serif; font-size: clamp(17px, 4.5vw, 22px);
      font-weight: 700; color: #111 !important; line-height: 1.2; margin-bottom: 4px;
    }
    .fair-location { font-size: 13px; color: #444 !important; margin-bottom: 8px; }
    .fair-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .tier-badge {
      display: inline-block; padding: 3px 12px; border-radius: 999px;
      font-size: 11px; font-weight: 700; font-family: 'Cinzel', serif;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .tier-badge.gold   { background: #d4af37; color: #3b1f00; }
    .tier-badge.silver { background: #c8d8e8; color: #1a3a5c; }
    .tier-badge.standard { background: rgba(201,168,76,0.2); color: #5c3a1e; border: 1px solid rgba(201,168,76,0.4); }
    .verified-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(46,125,50,0.15); border: 1px solid rgba(46,125,50,0.3);
      color: #1b5e20 !important; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }

    /* INFO ITEMS */
    .info-item {
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    }
    .info-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #555 !important; margin-bottom: 4px; }
    .info-val { font-size: 14px; color: #111 !important; word-break: break-word; line-height: 1.5; }
    .info-val a { color: #1a56a0 !important; }

    /* STATS */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 0;
    }
    .stat-box {
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.15);
      border-radius: 12px; padding: 12px 10px; text-align: center;
    }
    .stat-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .stat-val { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: #111 !important; line-height: 1; }
    .stat-label { font-size: 11px; color: #111 !important; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* WEEKENDS */
    .weekend-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; gap: 8px; flex-wrap: wrap;
    }
    .weekend-num { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; color: #555 !important; text-transform: uppercase; }
    .weekend-dates { font-size: 14px; color: #111 !important; font-weight: 700; }

    /* APPLY BUTTON */
    .apply-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px; background: #2e7d32; border: none;
      border-radius: 12px; cursor: pointer; font-family: 'Domine', serif;
      font-size: 15px; font-weight: 700; color: #fff !important;
      transition: background 0.15s, transform 0.1s; min-height: 52px; text-decoration: none;
    }
    .apply-btn:hover { background: #1b5e20; transform: translateY(-1px); }

    /* FAVORITE BUTTON */
    .fav-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px; background: rgba(255,255,255,0.85); border: 1.5px solid rgba(0,0,0,0.18);
      border-radius: 12px; cursor: pointer; font-family: 'Domine', serif;
      font-size: 15px; font-weight: 700; color: #111 !important;
      transition: background 0.15s; min-height: 52px; margin-top: 10px;
    }
    .fav-btn:hover { background: rgba(255,255,255,1); }
    .fav-btn.active { background: rgba(180,30,30,0.12); border-color: rgba(180,30,30,0.3); color: #cc0000 !important; }

    /* COMING SOON */
    .coming-soon {
      text-align: center; padding: 60px 20px;
    }
    .coming-soon h2 { font-family: 'Cinzel', serif; font-size: clamp(20px, 5vw, 28px); color: var(--gold-light); margin-bottom: 12px; }
    .coming-soon p { font-size: 14px; color: var(--gold); opacity: 0.8; }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.08) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 8px; height: 16px; margin: 6px 0;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* LOADER */
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingOverlay {
      position: fixed; inset: 0; background: rgba(13,10,4,0.92);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999; flex-direction: column; gap: 18px;
    }
    .spinner {
      border: 4px solid rgba(201,168,76,0.2); border-top: 4px solid var(--gold);
      border-radius: 50%; width: 48px; height: 48px; animation: spin 0.85s linear infinite;
    }
    #loadingOverlay p { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: 0.06em; }

    /* FOOTER */
    .footer-links {
      text-align: center; margin-top: 28px; padding-top: 18px;
      border-top: 1px solid rgba(201,168,76,0.15);
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    }
    .footer-links a { color: var(--gold); font-size: 13px; text-decoration: none; opacity: 0.8; }
    .footer-links a:hover { opacity: 1; text-decoration: underline; }

    /* MOBILE */
    @media (max-width: 480px) {
      .page { padding: 20px 12px 50px; }
      .topnav { padding: 0 12px; }
      .topnav-logo span { font-size: 15px; }
      .topnav-right { gap: 6px; }
      .nav-btn { font-size: 12px; padding: 6px 10px; }
      .fair-banner-wrap { height: 130px; }
      .fair-profile-row { padding: 14px; gap: 12px; }
      .hero-about-section { padding: 0 14px 14px; }
      .fair-avatar { width: 66px; height: 66px; }
      .fair-name-title { font-size: 15px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-val { font-size: 17px; }
      .card { padding: 16px 14px; }
    }

    @media (max-width: 375px) {
      .fair-name-title { font-size: 14px; }
      .stat-val { font-size: 15px; }
    }
.fav-btn-small {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; background: rgba(255,255,255,0.85); border: 1.5px solid rgba(0,0,0,0.18);
      border-radius: 999px; cursor: pointer; font-family: 'Domine', serif;
      font-size: 13px; font-weight: 700; color: #111 !important;
      transition: background 0.15s; white-space: nowrap;
    }
    .fav-btn-small:hover { background: rgba(255,255,255,1); }
    .fav-btn-small.active { background: rgba(180,30,30,0.12); border-color: rgba(180,30,30,0.3); color: #cc0000 !important; }

    .hero-top-row {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    }

    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .about-grid .info-item { margin-bottom: 0; padding: 8px 10px; }
    .about-grid .info-label { margin-bottom: 2px; font-size: 10px; }
    .about-grid .info-val { font-size: 13px; line-height: 1.4; }
    .about-col-left { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .about-col-right .info-item { height: 100%; }

    .weekend-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .weekend-grid .weekend-row { margin-bottom: 0; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }

    @media (max-width: 600px) {
      .about-grid { grid-template-columns: 1fr; }
      .about-col-left { grid-template-columns: 1fr 1fr; }
      .weekend-grid { grid-template-columns: 1fr; }
    }
.hero-about-section {
      padding: 0 20px 18px;
    }
.post-card-item {
      position: relative;
      background: rgba(255,255,255,0.85); border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px; padding: 14px; margin-bottom: 10px;
    }
    .post-menu-btn {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; border-radius: 50%;
      border: none; background: rgba(0,0,0,0.06); color: #444;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .post-menu-btn:hover { background: rgba(0,0,0,0.12); }
    .post-menu-dropdown {
      display: none; position: absolute; top: 38px; right: 8px;
      background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2); min-width: 140px; z-index: 10; overflow: hidden;
    }
    .post-menu-dropdown.show { display: block; }
    .post-menu-dropdown button {
      width: 100%; text-align: left; padding: 10px 14px; border: none; background: none;
      font-family: 'Domine', serif; font-size: 13px; cursor: pointer; color: #111;
    }
    .post-menu-dropdown button:hover { background: rgba(0,0,0,0.05); }
    .post-menu-dropdown button.delete-opt { color: #c0392b; }

    .composer-box textarea {
      width: 100%; border-radius: 10px; border: 1px solid rgba(0,0,0,0.18);
      background: rgba(255,255,255,0.85); color: #111; font-family: 'Domine', serif;
      font-size: 14px; padding: 12px; resize: vertical; box-sizing: border-box;
    }

  </style>
</head>
<body>

  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading fair profile…</p>
  </div>

  <nav class="topnav">
    <a class="topnav-logo" href="/index.html">
      <img src="/images/logo.png" alt="FairQuest" />
      <span>FairQuest</span>
    </a>
    <div class="topnav-right">
      <a href="/fairs/explore.html" class="nav-btn">🎪 Fairs</a>
      <a href="#" class="nav-btn" id="navEditProfile" style="display:none;">✏️ Update Fair Page</a>
      <a href="#" class="nav-btn" id="navDashboard" style="display:none;">📊 Dashboard</a>
      <a href="/profile/index.html" class="nav-btn" id="navProfile" style="display:none;">👤 Profile</a>
    </div>
  </nav>

  <div class="page" id="mainPage">
    <div class="page-header">
      <div class="skeleton" style="width:60%; height:34px; margin:0 auto 8px;"></div>
      <div class="skeleton" style="width:40%; height:14px; margin:0 auto;"></div>
    </div>
  </div>

  <script>
    const sb = window.supabase.createClient(
      'https://awtbjuiqgtdydsqzimul.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
    );

    const params = new URLSearchParams(location.search);
    const fairId = parseInt(params.get('fair_id'), 10);

    function fmt(d) {
      if (!d) return '';
      const [y, m, dd] = d.split('-');
      return `${m}-${dd}-${y.slice(-2)}`;
    }

    async function init() {
      // Check session (optional — public page)
      const { data: { session } } = await sb.auth.getSession();
      if (session) document.getElementById('navProfile').style.display = 'inline-flex';

      if (!fairId) {
        renderNotFound();
        return;
      }

      // Load social profile via RPC (Supabase JS v2 doesn't support .schema().from())
      const { data: spRows, error } = await sb.rpc('get_fair_social_profile', { p_fair_id: fairId });
      const sp = Array.isArray(spRows) ? spRows[0] : spRows;

      if (error || !sp || !sp.is_published) {
        renderComingSoon();
        return;
      }

      // Load fair for verified + tier info
      const { data: fair } = await sb
        .from('renaissance_fairs')
        .select('verified, fair_tier')
        .eq('id', fairId)
        .single();

     const tier = (fair?.fair_tier || 'standard').toLowerCase();
     const isGold = tier === 'gold';

      renderProfile(sp, fair, tier, isGold, session);
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function renderComingSoon() {
      document.getElementById('mainPage').innerHTML = `
        <div class="coming-soon">
          <div style="font-size:48px; margin-bottom:16px;">🏰</div>
          <h2>Profile Coming Soon</h2>
          <p>This fair hasn't published their profile yet. Check back soon!</p>
          <br>
          <a href="/fairs/explore.html" class="nav-btn" style="display:inline-flex; margin-top:8px;">🎪 Explore Fairs</a>
        </div>`;
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function renderNotFound() {
      document.getElementById('mainPage').innerHTML = `
        <div class="coming-soon">
          <div style="font-size:48px; margin-bottom:16px;">🔍</div>
          <h2>Fair Not Found</h2>
          <p>We couldn't find this fair profile.</p>
        </div>`;
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    function renderProfile(sp, fair, tier, isGold, session) {
      const page = document.getElementById('mainPage');
      page.innerHTML = '';

      // PAGE HEADER
      const header = document.createElement('div');
      header.className = 'page-header';
      header.innerHTML = `
        <h1>🏰 ${sp.display_name || 'Fair Profile'}</h1>
        <p class="subtitle">${[sp.city, sp.state].filter(Boolean).join(', ')}</p>`;
      page.appendChild(header);

      // HERO CARD (with inline favorite button)
      const heroCard = document.createElement('div');
      heroCard.className = 'fair-hero-card';
      heroCard.innerHTML = `
        <div class="fair-banner-wrap">
          ${sp.banner_url
            ? `<img class="fair-banner-img" src="${sp.banner_url}" alt="${sp.display_name}" />`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><span style="font-size:40px;">🏰</span></div>`
          }
        </div>
        <div class="fair-profile-row">
          <img class="fair-avatar" src="${sp.profile_image_url || '/images/logo.png'}" alt="Fair" />
          <div class="fair-info">
            <div class="hero-top-row">
              <div>
                <div class="fair-name-title">${sp.display_name || '—'}</div>
                <div class="fair-location">${[sp.city, sp.state].filter(Boolean).join(', ')}</div>
              </div>
              <button class="fav-btn-small" id="favBtn" onclick="toggleFavorite()">❤️ Save</button>
            </div>
            <div class="fair-badges">
              ${fair?.verified ? `<span class="verified-pill">✅ Verified</span>` : ''}
            </div>
          </div>
        </div>
        ${(sp.show_address && sp.address) || (sp.show_hours && sp.hours) || sp.description ? `
          <div class="hero-about-section">
            <div class="about-grid">
              ${sp.show_address && sp.address ? `
                <div class="info-item">
                  <div class="info-label">📍 Address</div>
                  <div class="info-val"><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent([sp.address, sp.city, sp.state].filter(Boolean).join(', '))}" target="_blank" rel="noopener">${[sp.address, sp.city, sp.state].filter(Boolean).join(', ')}</a></div>
                </div>` : `<div></div>`}
              ${sp.show_hours && sp.hours ? `
                <div class="info-item">
                  <div class="info-label">🕒 Hours</div>
                  <div class="info-val">${sp.hours}</div>
                </div>` : `<div></div>`}
            </div>
            ${sp.description ? `
              <div class="info-item" style="margin-top:10px;">
                <div class="info-label">📜 Description</div>
                <div class="info-val">${sp.description}</div>
              </div>` : ''}
          </div>` : ''}`;
      page.appendChild(heroCard);

      // CONTACT CARD
      const contactFields = [];
      if (sp.show_contact_name && sp.contact_name) contactFields.push({ label:'Contact', val: sp.contact_name });
      if (sp.show_contact_email && sp.contact_email) contactFields.push({ label:'Email', val: sp.contact_email });
      if (sp.show_phone && sp.phone_number) contactFields.push({ label:'Phone', val: sp.phone_number });

      if (contactFields.length) {
        const contactCard = document.createElement('div');
        contactCard.className = 'card';
        contactCard.innerHTML = `
          <div class="card-title">📬 Contact</div>
          ${contactFields.map(f => `
            <div class="info-item">
              <div class="info-label">${f.label}</div>
              <div class="info-val">${f.val}</div>
            </div>`).join('')}`;
        page.appendChild(contactCard);
      }

      // WEEKENDS CARD — 2 column grid
      if (sp.show_dates) {
        const wFields = [['start_date','end_date'], ...Array.from({length:4},(_,i)=>[`week${i+2}_start_date`,`week${i+2}_end_date`])];
        const wRows = []; let wNum = 1;
        wFields.forEach(([s,e]) => {
          if (sp[s] && sp[e]) {
            wRows.push(`<div class="weekend-row"><span class="weekend-num">Weekend ${wNum}</span><span class="weekend-dates">${fmt(sp[s])} → ${fmt(sp[e])}</span></div>`);
            wNum++;
          }
        });
        if (wRows.length) {
          const dateCard = document.createElement('div');
          dateCard.className = 'card';
          dateCard.innerHTML = `<div class="card-title">📅 Weekends</div><div class="weekend-grid">${wRows.join('')}</div>`;
          page.appendChild(dateCard);
        }
      }

      // POSTS CARD (with composer for admins)
      const postsCard = document.createElement('div');
      postsCard.className = 'card';
      postsCard.innerHTML = `
        <div class="card-title">📝 Updates</div>
        <div id="composerWrap"></div>
        <div id="postsList"><div class="empty-msg" style="font-size:13px; color:#888; text-align:center; padding:14px 0;">Loading…</div></div>`;
      page.appendChild(postsCard);
      checkIsAdminAndRenderComposer();
      loadFairPosts();

      // FOOTER
      const footer = document.createElement('div');
      footer.className = 'footer-links';
      footer.innerHTML = `
        <a href="/index.html">Home</a>
        <a href="/fairs/explore.html">Fairs</a>
        <a href="/terms.html">Terms</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/contact.html">Contact</a>`;
      page.appendChild(footer);
    }

    async function toggleFavorite() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { location.href = '/user_login.html'; return; }
      const btn = document.getElementById('favBtn');
      const isFav = btn.classList.contains('active');
      try {
        if (isFav) {
          await sb.rpc('app_remove_favorite', { p_entity_type: 'fair', p_entity_id: fairId.toString() });
          btn.classList.remove('active');
          btn.innerHTML = '❤️ Save';
        } else {
          await sb.rpc('app_add_favorite', { p_entity_type: 'fair', p_entity_id: fairId.toString() });
          btn.classList.add('active');
          btn.innerHTML = '💔 Saved';
        }
      } catch(e) { console.error(e); }
    }
async function loadFairPosts() {
      const { data, error } = await sb.rpc('get_fair_posts', { p_fair_id: fairId, p_limit: 10, p_offset: 0 });
      const list = document.getElementById('postsList');
      if (!list) return;

      if (error || !data || !data.length) {
        list.innerHTML = `<div style="font-size:13px; color:#888; text-align:center; padding:14px 0;">No updates yet.</div>`;
        return;
      }

      list.innerHTML = data.map(p => {
        const date = new Date(p.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        const menuHtml = isFairAdmin ? `
          <button class="post-menu-btn" onclick="togglePostMenu('${p.id}')">⋯</button>
          <div class="post-menu-dropdown" id="postMenu-${p.id}">
            <button onclick="startEditPost('${p.id}')">✏️ Edit</button>
            <button class="delete-opt" onclick="confirmDeletePost('${p.id}')">🗑️ Delete</button>
          </div>` : '';

        return `
          <div class="post-card-item">
            ${menuHtml}
            <div style="font-size:11px; color:#666; margin-bottom:6px;">${date}${p.is_edited ? ' · edited' : ''}</div>
            <div class="post-view-${p.id}">
              ${p.content ? `<div style="font-size:14px; color:#111; line-height:1.5; white-space:pre-wrap; margin-bottom:${p.image_url ? '10px' : '0'};">${escapeHtml(p.content)}</div>` : ''}
              ${p.image_url ? `<img src="${p.image_url}" style="width:100%; max-height:320px; object-fit:cover; border-radius:8px; display:block;" />` : ''}
            </div>
            ${isFairAdmin ? `
              <div class="post-edit-${p.id}" style="display:none;">
                <textarea id="editTextarea-${p.id}" rows="3" style="width:100%; border-radius:10px; border:1px solid rgba(0,0,0,0.18); background:rgba(255,255,255,0.85); color:#111; font-family:'Domine',serif; font-size:14px; padding:10px; resize:vertical; box-sizing:border-box; margin-bottom:8px;">${escapeHtml(p.content)}</textarea>
                <div style="display:flex; gap:8px;">
                  <button class="apply-btn" style="width:auto; padding:8px 16px; min-height:auto;" onclick="saveEditPost('${p.id}')">💾 Save</button>
                  <button style="background:none; border:1px solid rgba(0,0,0,0.2); border-radius:8px; padding:8px 16px; font-family:'Domine',serif; font-size:13px; cursor:pointer;" onclick="cancelEditPost('${p.id}')">Cancel</button>
                </div>
                <div id="editMsg-${p.id}" style="font-size:12px; margin-top:6px;"></div>
              </div>` : ''}
          </div>`;
      }).join('');
    }
    let isFairAdmin = false;
    let selectedPostImage = null;

    async function checkIsAdminAndRenderComposer() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { isFairAdmin = false; return; }

      const { data: allowed } = await sb.rpc('check_fair_permission', { p_fair_id: fairId, p_permission: 'edit_fair_info' });
      isFairAdmin = !!allowed;
      if (!isFairAdmin) return;

      document.getElementById('navEditProfile').href = `/social/fairs/fair_profile_edit.html?fair_id=${fairId}`;
      document.getElementById('navEditProfile').style.display = 'inline-flex';
      document.getElementById('navDashboard').href = `/fair_admin/fair_info/fair_dashboard.html?fair_id=${fairId}`;
      document.getElementById('navDashboard').style.display = 'inline-flex';

      document.getElementById('composerWrap').innerHTML = `
        <div class="composer-box" style="margin-bottom:14px;">
          <textarea id="postContent" placeholder="Share an update with visitors…" rows="3"></textarea>
          <div id="postImagePreviewWrap" style="display:none; margin-top:10px; position:relative;">
            <img id="postImagePreview" style="width:100%; max-height:220px; object-fit:cover; border-radius:10px; display:block;" />
            <button type="button" id="removePostImageBtn" style="position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; border:none; background:rgba(0,0,0,0.65); color:#fff; font-size:14px; cursor:pointer;">✕</button>
          </div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-top:10px; flex-wrap:wrap; gap:10px;">
            <input type="file" id="postImageInput" accept="image/*" style="display:none;">
            <button type="button" id="addPostImageBtn" style="background:rgba(26,86,160,0.08); border:1px solid rgba(26,86,160,0.3); color:#1a56a0; border-radius:8px; padding:8px 14px; font-size:12px; cursor:pointer; font-family:'Domine',serif;">🖼️ Add Image</button>
            <button type="button" id="submitPostBtn" class="apply-btn" style="width:auto; padding:9px 20px; min-height:auto;">📬 Post</button>
          </div>
          <div id="postStatusMsg" style="font-size:12px; margin-top:8px; min-height:16px;"></div>
        </div>`;

      wireComposerEvents();
    }

    function resizePostImage(file) {
      const MAX_SIZE = 1200, QUALITY = 0.82;
      return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = e => { img.src = e.target.result; };
        img.onload = () => {
          let width = img.width, height = img.height;
          if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
          else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          canvas.toBlob(blob => {
            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', { type: 'image/jpeg' }));
          }, 'image/jpeg', QUALITY);
        };
        reader.readAsDataURL(file);
      });
    }

    function wireComposerEvents() {
      document.getElementById('addPostImageBtn').addEventListener('click', () => {
        document.getElementById('postImageInput').click();
      });

      document.getElementById('postImageInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedPostImage = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('postImagePreview').src = ev.target.result;
          document.getElementById('postImagePreviewWrap').style.display = 'block';
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('removePostImageBtn').addEventListener('click', () => {
        selectedPostImage = null;
        document.getElementById('postImageInput').value = '';
        document.getElementById('postImagePreviewWrap').style.display = 'none';
        document.getElementById('postImagePreview').src = '';
      });

      document.getElementById('submitPostBtn').addEventListener('click', async () => {
        const content = document.getElementById('postContent').value.trim();
        const statusEl = document.getElementById('postStatusMsg');
        if (!content && !selectedPostImage) {
          statusEl.style.color = '#c0392b';
          statusEl.textContent = 'Write something or add an image first.';
          return;
        }

        const btn = document.getElementById('submitPostBtn');
        btn.disabled = true;
        statusEl.style.color = '#666';
        statusEl.textContent = 'Posting…';

        try {
          let imageUrl = null;
          if (selectedPostImage) {
            const { data: { user } } = await sb.auth.getUser();
            const resized = await resizePostImage(selectedPostImage);
            const fileName = `${crypto.randomUUID()}.jpg`;
            const filePath = `${user.id}/${fileName}`;

            const { error: uploadError } = await sb.storage.from('social-portrait-gallery').upload(filePath, resized);
            if (uploadError) throw uploadError;

            const { data: urlData } = sb.storage.from('social-portrait-gallery').getPublicUrl(filePath);
            imageUrl = urlData?.publicUrl || null;
          }

          const { error } = await sb.rpc('create_social_post', {
            p_content: content,
            p_audience: 'public',
            p_image_url: imageUrl,
            p_vpa_id: null,
            p_fair_id: fairId
          });
          if (error) throw error;

          statusEl.style.color = '#2e7d32';
          statusEl.textContent = '✅ Posted!';
          document.getElementById('postContent').value = '';
          document.getElementById('removePostImageBtn').click();
          setTimeout(() => { statusEl.textContent = ''; }, 2500);
          await loadFairPosts();
        } catch (e) {
          console.error(e);
          statusEl.style.color = '#c0392b';
          statusEl.textContent = '❌ Something went wrong. Please try again.';
        } finally {
          btn.disabled = false;
        }
      });
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function togglePostMenu(postId) {
      document.querySelectorAll('.post-menu-dropdown').forEach(d => {
        if (d.id !== `postMenu-${postId}`) d.classList.remove('show');
      });
      document.getElementById(`postMenu-${postId}`).classList.toggle('show');
    }

    function startEditPost(postId) {
      document.getElementById(`postMenu-${postId}`).classList.remove('show');
      document.querySelector(`.post-view-${postId}`).style.display = 'none';
      document.querySelector(`.post-edit-${postId}`).style.display = 'block';
    }

    function cancelEditPost(postId) {
      document.querySelector(`.post-view-${postId}`).style.display = 'block';
      document.querySelector(`.post-edit-${postId}`).style.display = 'none';
    }

    async function saveEditPost(postId) {
      const textarea = document.getElementById(`editTextarea-${postId}`);
      const msgEl = document.getElementById(`editMsg-${postId}`);
      const content = textarea.value.trim();
      if (!content) {
        msgEl.style.color = '#c0392b';
        msgEl.textContent = 'Post content cannot be empty.';
        return;
      }
      msgEl.style.color = '#666';
      msgEl.textContent = 'Saving…';

      const { error } = await sb.rpc('update_social_post', { p_post_id: postId, p_content: content });
      if (error) {
        msgEl.style.color = '#c0392b';
        msgEl.textContent = '❌ ' + error.message;
        return;
      }
      await loadFairPosts();
    }

    async function confirmDeletePost(postId) {
      document.getElementById(`postMenu-${postId}`).classList.remove('show');
      if (!confirm('Delete this post? This cannot be undone.')) return;
      const { error } = await sb.rpc('delete_post_soft', { p_post_id: postId });
      if (error) { alert('Error deleting post: ' + error.message); return; }
      await loadFairPosts();
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.post-menu-btn') && !e.target.closest('.post-menu-dropdown')) {
        document.querySelectorAll('.post-menu-dropdown').forEach(d => d.classList.remove('show'));
      }
    });
    init();
  </script>
</body>
