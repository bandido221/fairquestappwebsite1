<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portrait Hall | FairQuest Social</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:'Domine',serif;
background:#000;
color:#f0e6d2;
margin:0;
padding:0;
}

.header{
background:#111;
border-bottom:2px solid #bb9457;
padding:14px 18px;
margin-bottom:30px;
font-family:'Cinzel',serif;
font-size:1.5rem;
}

.header-inner{
max-width:1400px;
margin:0 auto;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-actions{
display:flex;
gap:10px;
}

.header-icon-btn{
border:none;
background:#1f2125;
color:#f0e6d2;
border-radius:999px;
padding:10px 14px;
cursor:pointer;
}

.header-subnav{
display:flex;
justify-content:center;
gap:12px;
margin-top:10px;
}

.notifications-page-btn{
background:#bb9457;
border:none;
color:#000;
padding:8px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.social-layout{
display:grid;
grid-template-columns:260px 1fr;
gap:20px;
max-width:1400px;
margin:20px auto;
padding:0 16px;
}

.social-sidebar{
background:rgba(214,197,126,0.88);
border-radius:18px;
padding:18px;
}

.sidebar-title{
font-family:'Cinzel',serif;
font-size:1.5rem;
color:#111;
margin-bottom:14px;
}

.sidebar-btn{
width:100%;
border:none;
border-radius:12px;
background:#111;
color:#f0e6d2;
padding:14px;
cursor:pointer;
margin-bottom:10px;
}

.social-main{
min-width:0;
}

.content-card{
background:rgba(214,197,126,0.88);
border-radius:18px;
padding:18px;
margin-bottom:20px;
color:#111;
}

.section-title{
font-family:'Cinzel',serif;
font-size:1.6rem;
margin-bottom:14px;
}

.gallery-preview{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.gallery-thumb{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.gallery-book{
margin-bottom:25px;
}

.gallery-book-title{
font-family:'Cinzel',serif;
font-size:1.3rem;
margin-bottom:8px;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}
.skeleton-book{
margin-bottom:25px;
}

.skeleton-title{
height:22px;
width:180px;
border-radius:8px;
margin-bottom:10px;
background:linear-gradient(90deg, rgba(17,17,17,0.18) 25%, rgba(187,148,87,0.32) 50%, rgba(17,17,17,0.18) 75%);
background-size:200% 100%;
animation:skeletonShimmer 1.4s infinite linear;
}

.skeleton-preview{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.skeleton-thumb{
width:90px;
height:90px;
border-radius:8px;
background:linear-gradient(90deg, rgba(17,17,17,0.18) 25%, rgba(187,148,87,0.32) 50%, rgba(17,17,17,0.18) 75%);
background-size:200% 100%;
animation:skeletonShimmer 1.4s infinite linear;
}

@keyframes skeletonShimmer{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}
</style>
</head>

<body>

<div class="header">

<div class="header-inner">
<div>FairQuest Social</div>

<div class="header-actions">
<button class="header-icon-btn" onclick="openHome()">🏠</button>
<button class="header-icon-btn" onclick="openNotifications()">🔔</button>
<button class="header-icon-btn" onclick="openFriends()">👥</button>
<button class="header-icon-btn" onclick="openProfile()">👤</button>
</div>
</div>

<div class="header-subnav">
<button class="notifications-page-btn" onclick="openHome()">Home</button>
<button class="notifications-page-btn" onclick="openNotifications()">Notifications</button>
<button class="notifications-page-btn" onclick="openFriends()">Friends</button>
<button class="notifications-page-btn" onclick="openProfile()">Profile</button>
</div>

</div>

<div class="social-layout">

<aside class="social-sidebar">
<h2 class="sidebar-title">Portrait Hall</h2>

<button class="sidebar-btn" onclick="openProfile()">Back to Profile</button>
<button class="sidebar-btn" onclick="openHome()">Home</button>

</aside>

<main class="social-main">

<div class="content-card">
<h2 class="section-title">Private</h2>
<div id="private-books"></div>
</div>

<div class="content-card">
<h2 class="section-title">Friends</h2>
<div id="friends-books"></div>
</div>

<div class="content-card">
<h2 class="section-title">Public</h2>
<div id="public-books"></div>
</div>

</main>
</div>

<div id="imageModal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>

const supabaseClient = window.supabase.createClient(
  'https://awtbjuiqgtdydsqzimul.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
)

function openHome(){location.href='/social/index.html'}
function openNotifications(){location.href='/social/notifications.html'}
function openFriends(){location.href='/social/friends/friends.html'}

async function openProfile(){
const {data}=await supabaseClient.auth.getSession()
if(!data.session){location.href='/user_login.html'}
else location.href='/social/profile/profile.html?user_id='+data.session.user.id
}

function openModal(src){
document.getElementById("modalImg").src=src
document.getElementById("imageModal").style.display="flex"
}

function closeModal(){
document.getElementById("imageModal").style.display="none"
}

function buildPreview(list){
let html=""
list.forEach(img=>{
html+=`<img class="gallery-thumb" src="${img.image_url}" onclick="openModal('${img.image_url}')">`
})
return html
}

function renderBookSkeleton(containerId,count=2){
const container=document.getElementById(containerId)
if(!container) return

let html=""
for(let i=0;i<count;i++){
html+=`
<div class="skeleton-book">
  <div class="skeleton-title"></div>
  <div class="skeleton-preview">
    <div class="skeleton-thumb"></div>
    <div class="skeleton-thumb"></div>
    <div class="skeleton-thumb"></div>
    <div class="skeleton-thumb"></div>
    <div class="skeleton-thumb"></div>
  </div>
</div>
`
}
container.innerHTML=html
}

async function loadPortraits(){

const privateContainer=document.getElementById("private-books")
const friendsContainer=document.getElementById("friends-books")
const publicContainer=document.getElementById("public-books")

renderBookSkeleton("private-books",2)
renderBookSkeleton("friends-books",2)
renderBookSkeleton("public-books",2)

const {data:galleries,error:gErr}=await supabaseClient.rpc('get_my_portrait_galleries')

if(gErr){
console.error(gErr)
privateContainer.innerHTML="<div>No books found.</div>"
friendsContainer.innerHTML="<div>No books found.</div>"
publicContainer.innerHTML="<div>No books found.</div>"
return
}

privateContainer.innerHTML=""
friendsContainer.innerHTML=""
publicContainer.innerHTML=""

for(const g of galleries){

const {data:images,error:iErr}=await supabaseClient.rpc('get_my_portrait_gallery_images',{p_gallery_id:g.id})

if(iErr){
console.error(iErr)
continue
}

const privateImgs = images.filter(i=>i.visibility==="private").slice(0,5)
const friendsImgs = images.filter(i=>i.visibility==="friends").slice(0,5)
const publicImgs = images.filter(i=>i.visibility==="public").slice(0,5)

if(g.privacy==="private"){
privateContainer.insertAdjacentHTML("beforeend",`
<div class="gallery-book">
<div class="gallery-book-title" onclick="location.href='gallery_privacy.html?gallery=${g.id}'">${g.title}</div>
<div class="gallery-preview">${buildPreview(privateImgs)}</div>
</div>
`)
}

if(g.privacy==="friends"){
friendsContainer.insertAdjacentHTML("beforeend",`
<div class="gallery-book">
<div class="gallery-book-title" onclick="location.href='gallery_privacy.html?gallery=${g.id}'">${g.title}</div>
<div class="gallery-preview">${buildPreview(friendsImgs)}</div>
</div>
`)
}

if(g.privacy==="public"){
publicContainer.insertAdjacentHTML("beforeend",`
<div class="gallery-book">
<div class="gallery-book-title" onclick="location.href='gallery_privacy.html?gallery=${g.id}'">${g.title}</div>
<div class="gallery-preview">${buildPreview(publicImgs)}</div>
</div>
`)
}

}

if(!privateContainer.innerHTML.trim()){
privateContainer.innerHTML="<div>No private books yet.</div>"
}

if(!friendsContainer.innerHTML.trim()){
friendsContainer.innerHTML="<div>No friends books yet.</div>"
}

if(!publicContainer.innerHTML.trim()){
publicContainer.innerHTML="<div>No public books yet.</div>"
}

}

loadPortraits()

</script>

</body>
</html>
