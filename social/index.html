<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairQuest Social</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">

<style>

body{
font-family:'Domine',serif;
background:#000;
color:#f0e6d2;
margin:0;
padding:0;
}

.header{
background:#111;
border-bottom:2px solid #bb9457;
padding:14px;
margin-bottom:30px;
text-align:center;
font-family:'Cinzel',serif;
font-size:1.5rem;
}


.feed{
max-width:700px;
margin:auto;
padding:20px;
}

.post{
background:#111;
border:1px solid rgba(255,255,255,0.06);
border-radius:14px;
padding:16px 16px 10px;
margin-bottom:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

.post-author{
font-weight:bold;
margin-bottom:2px;
font-size:0.98rem;
color:#f5f5f5;
}

.post-time{
font-size:0.78rem;
color:#9aa0a6;
margin-bottom:0;
}

.post-content{
margin:12px 0 14px;
font-size:1rem;
line-height:1.5;
white-space:pre-wrap;
word-break:break-word;
color:#f0e6d2;
}

.post-stats{
font-size:0.88rem;
color:#aaa;
display:flex;
justify-content:flex-start;
gap:18px;
padding:0 2px 10px;
border-bottom:1px solid #2a2d31;
margin-bottom:8px;
}

.post-actions{
display:flex;
justify-content:space-between;
gap:8px;
padding-top:2px;
}

.reaction-container{
position:relative;
flex:1;
}

.post-action-btn{
width:100%;
background:none;
border:none;
color:#d8d8d8;
font-family:'Domine',serif;
font-size:0.95rem;
cursor:pointer;
padding:10px 12px;
border-radius:8px;
transition:background 0.15s ease;
}

.post-action-btn:hover{
background:rgba(255,255,255,0.08);
}

.reaction-popup{
position:absolute;
left:0;
bottom:100%;
margin-bottom:8px;
display:flex;
align-items:center;
gap:8px;
padding:8px 10px;
border-radius:999px;
background:#1f2125;
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transform:translateY(8px);
transition:opacity 0.15s ease, transform 0.15s ease;
z-index:20;
white-space:nowrap;
}

.reaction-container:hover .reaction-popup,
.reaction-container:focus-within .reaction-popup{
opacity:1;
pointer-events:auto;
transform:translateY(0);
}

.reaction-popup span{
display:flex;
align-items:center;
justify-content:center;
width:34px;
height:34px;
font-size:1.45rem;
cursor:pointer;
transition:transform 0.12s ease;
}

.reaction-popup span:hover{
transform:scale(1.22);
}



.loading{
text-align:center;
padding:40px;
}
.social-layout{
  display:flex;
  justify-content:center;
  width:100%;
  max-width:1200px;
  margin:20px auto;
  padding:0 12px 20px;
  box-sizing:border-box;
}

.social-center{
  width:100%;
  max-width:600px;
}


.card{
  background: rgba(214,197,126,0.88);
  padding:16px;
  border-radius:10px;
  margin-bottom:20px;
  box-sizing:border-box;
}

.create-post-compact{
  padding:14px 16px;
  cursor:pointer;
}

.create-post-row{
  display:flex;
  align-items:center;
  gap:12px;
}

.composer-avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  object-fit:cover;
  background:#333;
  flex-shrink:0;
}

.composer-input-btn{
  flex:1;
  border:none;
  border-radius:999px;
  background:#2a2d31;
  color:#cfcfcf;
  text-align:left;
  padding:14px 18px;
  font-family:'Domine',serif;
  font-size:1rem;
  cursor:pointer;
  box-sizing:border-box;
}

.composer-icons{
  display:flex;
  align-items:center;
  gap:14px;
  font-size:1.4rem;
}



.post-modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.post-modal{
  width:100%;
  max-width:680px;
  background:#1f2125;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.55);
  padding:0;
  overflow:hidden;
}

.post-modal-header{
  position:relative;
  text-align:center;
  padding:20px 24px 16px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.post-modal-header h2{
  margin:0;
  font-family:'Cinzel',serif;
  color:#f5f5f5;
}

.post-modal-close{
  position:absolute;
  right:18px;
  top:14px;
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:#3a3d42;
  color:#fff;
  font-size:1.4rem;
  cursor:pointer;
}

.post-modal-user{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:18px 20px 10px;
}


.post-modal-user-info{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
  color:#fff;
}

#modal-user-name{
  font-weight:bold;
  font-size:1rem;
}

#post-audience{
  border:none;
  border-radius:8px;
  background:#3a3d42;
  color:#fff;
  padding:7px 10px;
  font-family:'Domine',serif;
}

.post-modal-textarea{
  width:100%;
  min-height:220px;
  resize:none;
  border:none;
  outline:none;
  background:#1f2125;
  color:#f0e6d2;
  padding:12px 20px 20px;
  font-family:'Domine',serif;
  font-size:2rem;
  box-sizing:border-box;
}

.post-modal-tools{
  margin:0 20px 18px;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:#f0e6d2;
}

.post-submit-btn{
  width:calc(100% - 40px);
  margin:0 20px 20px;
  border:none;
  border-radius:12px;
  padding:14px;
  background:#4b4e53;
  color:#ddd;
  font-family:'Domine',serif;
  font-size:1.05rem;
  cursor:pointer;
}

.post-submit-btn:hover{
  background:#5b5f65;
}
.post-header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:8px;
}

.post-avatar{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
background:#333;
}

.post-author-block{
display:flex;
flex-direction:column;
}

.post-author{
font-weight:bold;
}

.post-time{
font-size:0.8rem;
color:#aaa;
}
@media (max-width:600px){

.social-layout{
max-width:100%;
padding:0 8px 20px;
}

.social-center{
max-width:100%;
}

.card{
padding:14px;
}

.post{
padding:18px 16px 14px;
}

.post-content{
font-size:1.25rem;
line-height:1.65;
}

.post-author{
font-size:1.15rem;
}

.post-time{
font-size:0.95rem;
}

.post-action-btn{
font-size:1.1rem;
padding:12px;
}

.composer-input-btn{
font-size:1.15rem;
padding:16px 18px;
}

.post-avatar{
width:44px;
height:44px;
}

}



</style>

</head>

<body>

<div class="header">
FairQuest Social
</div>
<div class="social-layout">

  <div class="social-center">

 <div class="card create-post-compact" id="open-post-modal">
  <div class="create-post-row">
    <img id="composer-profile-image" class="composer-avatar" src="" alt="Profile">
    <button type="button" class="composer-input-btn" id="open-post-modal-btn">
      What’s on your mind?
    </button>
    <div class="composer-icons">
      <span>📷</span>
      <span>🖼️</span>
      <span>😊</span>
    </div>
  </div>
</div>
    <div class="post-modal-overlay" id="post-modal-overlay" style="display:none;">
      <div class="post-modal">
        <div class="post-modal-header">
          <h2>Create post</h2>
          <button type="button" class="post-modal-close" id="close-post-modal-btn">✕</button>
        </div>
<div class="post-modal-user">
  <img id="modal-profile-image" class="composer-avatar" src="" alt="Profile">
  <div class="post-modal-user-info">

            <div id="modal-user-name">User</div>
            <select id="post-audience">
              <option value="public">Public</option>
              <option value="friends">Friends</option>
              <option value="close_friends">Close Friends</option>
              <option value="family">Family</option>
            </select>
          </div>
        </div>

   <textarea id="post-content" class="post-modal-textarea" placeholder="What’s on your mind?"></textarea>

<div class="post-modal-tools">
  <span>Add to your post</span>
  <div class="composer-icons">
    <span>📷</span>
    <span>🖼️</span>
    <span>😊</span>
    <span>📍</span>
    <span>GIF</span>
  </div>
</div>

<button id="create-post-btn" class="post-submit-btn" type="button">Post</button>
 </div>
    </div>

    <div id="feed-container"></div>

  </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = window.supabase.createClient(
'https://awtbjuiqgtdydsqzimul.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
);

async function checkUser(){

const { data } = await supabaseClient.auth.getSession();

if(!data.session){
document.getElementById("feed-container").innerHTML = "";

return false;
}

return true;

}

async function loadFeed(){

const logged = await checkUser();

if(!logged) return;

const { data, error } = await supabaseClient.rpc('get_social_feed');

if(error){
console.error(error);
document.getElementById("feed-container").innerHTML="Error loading feed";

return;
}

renderFeed(data);

}

function renderFeed(posts){

const feed=document.getElementById("feed-container");

if(!posts || posts.length===0){
feed.innerHTML="<div class='loading'>No posts yet</div>";
return;
}

feed.innerHTML="";

posts.forEach(p=>{

const div=document.createElement("div");
div.className="post";

const reactionPopupHtml = reactionTypes.map(r => `
<span data-reaction-id="${r.id}" data-reaction-emoji="${r.emoji}">${r.emoji}</span>
`).join("");

div.innerHTML=`

<div class="post-header">

<img class="post-avatar"
src="${p.author_profile_image_url || 'https://via.placeholder.com/40'}">

<div class="post-author-block">

<div class="post-author">
${p.author_name || 'User'}
</div>

<div class="post-time">
${formatPostDate(p.created_at)}
 · ${formatAudienceIcon(p.audience)} ${formatAudienceLabel(p.audience)}
</div>

</div>

</div>

<div class="post-content">
${p.content || ""}
</div>

<div class="post-stats">
<span>${renderReactionSummary(p.reaction_emojis, p.reaction_count)}</span>
<span>💬 ${p.comment_count || 0}</span>
</div>


<div class="post-actions">

<div class="reaction-container">

<button class="post-action-btn like-btn" type="button">${p.my_reaction_emoji || '👍'} Like</button>

<div class="reaction-popup" data-post-id="${p.id}">
${reactionPopupHtml}
</div>

</div>

<button class="post-action-btn comment-btn" type="button" data-post-id="${p.id}">💬 Comment</button>

</div>

<div class="post-comment-preview" id="comment-preview-${p.id}" style="margin-top:10px;"></div>

<div class="post-comments" id="comments-${p.id}" style="display:none;">
  <div class="post-comments-list"></div>

  <div class="post-comment-form" style="margin-top:12px; display:flex; gap:8px;">
    <input
      type="text"
      class="comment-input"
      data-post-id="${p.id}"
      placeholder="Write a comment..."
      style="flex:1; padding:10px 12px; border-radius:10px; border:none; outline:none; font-family:'Domine',serif;"
    >
    <button
      type="button"
      class="comment-send-btn"
      data-post-id="${p.id}"
      style="padding:10px 14px; border:none; border-radius:10px; background:#bb9457; color:#000; font-weight:bold; cursor:pointer;"
    >
      Post
    </button>
  </div>
</div>

`;

feed.appendChild(div);
loadCommentPreview(p.id);

});

}

async function loadCurrentUserProfile(){

const logged = await checkUser();

if(!logged) return;

const { data, error } = await supabaseClient.rpc('get_profile_page_data');

if(error){
console.error(error);
return;
}

const profile = data?.profile || {};
const username = profile.username || "User";
const profileImage = profile.profile_image_url || "https://via.placeholder.com/60x60?text=U";

document.getElementById("modal-user-name").textContent = username;
document.getElementById("open-post-modal-btn").textContent = `What’s on your mind, ${username}?`;
document.getElementById("composer-profile-image").src = profileImage;
document.getElementById("modal-profile-image").src = profileImage;

}

let reactionTypes = [];

async function loadReactionTypes(){

const { data, error } = await supabaseClient.rpc('get_reaction_types');

if(error){
console.error(error);
reactionTypes = [];
return;
}

reactionTypes = data || [];
}
async function loadCommentPreview(postId){

const box = document.getElementById(`comment-preview-${postId}`);

if(!box) return;

const { data, error } = await supabaseClient.rpc('get_post_comments',{
p_post_id: postId
});

if(error){
console.error(error);
return;
}

if(!data || data.length === 0){
box.innerHTML = "";
return;
}

const preview = data.slice(0,2);

box.innerHTML = "";

preview.forEach(c=>{

const div = document.createElement("div");

div.style.marginTop = "6px";
div.style.fontSize = "0.9rem";
div.style.color = "#ddd";

div.innerHTML = `
<span style="font-weight:bold;">${c.author_name || 'User'}</span>
${c.content}
`;

box.appendChild(div);

});

if(data.length > 2){

const more = document.createElement("div");

more.style.marginTop = "6px";
more.style.fontSize = "0.85rem";
more.style.color = "#aaa";
more.style.cursor = "pointer";

more.innerText = `View all ${data.length} comments`;

more.onclick = function(){
document.querySelector(`.comment-btn[data-post-id="${postId}"]`).click();
};

box.appendChild(more);

}

}
function formatAudienceLabel(audience){

if(audience === "close_friends") return "Close Friends";
if(audience === "family") return "Family";
if(audience === "friends") return "Friends";

return "Public";
}


function formatAudienceIcon(audience){

if(audience === "close_friends") return "⭐";
if(audience === "family") return "👪";
if(audience === "friends") return "👥";

return "🌍";
}

function formatPostDate(dateString){

const d = new Date(dateString);

const mm = String(d.getMonth() + 1).padStart(2,'0');
const dd = String(d.getDate()).padStart(2,'0');
const yy = String(d.getFullYear()).slice(-2);

return `${mm}/${dd}/${yy}`;
}

function renderReactionSummary(reactionEmojis, reactionCount){

const total = reactionCount || 0;

if(total < 1){
return `👍 0`;
}

const emojis = Array.isArray(reactionEmojis) ? reactionEmojis.slice(0,3) : [];
const extraEmojis = emojis.filter(e => e !== "👍");
const emojiLine = ["👍", ...extraEmojis].slice(0,3).join(" ");

return `${emojiLine} ${total}`;
}




function openPostModal(){
document.getElementById("post-modal-overlay").style.display = "flex";
}


function closePostModal(){
document.getElementById("post-modal-overlay").style.display = "none";
}

async function createPost(){

const logged = await checkUser();

if(!logged) return;

const textarea = document.getElementById("post-content");
const audience = document.getElementById("post-audience").value;
const content = textarea.value.trim();

if(!content) return;

const { error } = await supabaseClient.rpc('create_social_post', {
p_content: content,
p_audience: audience
});

if(error){
console.error(error);
alert("Error creating post");
return;
}

textarea.value = "";
document.getElementById("post-audience").value = "public";
closePostModal();
loadFeed();

}

document.getElementById("open-post-modal").addEventListener("click", openPostModal);
document.getElementById("open-post-modal-btn").addEventListener("click", function(e){
e.stopPropagation();
openPostModal();
});
document.getElementById("close-post-modal-btn").addEventListener("click", closePostModal);
document.getElementById("post-modal-overlay").addEventListener("click", function(e){
if(e.target.id === "post-modal-overlay"){
closePostModal();
}
});
document.getElementById("create-post-btn").addEventListener("click", createPost);

async function initSocialPage(){
await loadReactionTypes();
await loadCurrentUserProfile();
await loadFeed();
}

initSocialPage();

document.addEventListener("click",function(e){

const likeBtn = e.target.closest(".like-btn");

if(likeBtn){

const container = likeBtn.closest(".reaction-container");

document.querySelectorAll(".reaction-container").forEach(c=>{
if(c!==container) c.classList.remove("show-reactions");
});
document.addEventListener("click", async function(e){

const reaction = e.target.closest(".reaction-popup span");

if(!reaction) return;

const reactionTypeId = reaction.dataset.reactionId;
const popup = reaction.closest(".reaction-popup");
const postId = popup.dataset.postId;

const { error } = await supabaseClient.rpc('set_post_reaction',{
p_post_id: postId,
p_reaction_type_id: reactionTypeId
});

if(error){
console.error(error);
alert("Error saving reaction");
return;
}

loadFeed();

});

container.classList.toggle("show-reactions");

e.stopPropagation();
return;
}

if(!e.target.closest(".reaction-popup")){
document.querySelectorAll(".reaction-container").forEach(c=>{
c.classList.remove("show-reactions");
});
}

});

document.addEventListener("click", async function(e){

const commentBtn = e.target.closest(".comment-btn");

if(!commentBtn) return;

const postId = commentBtn.dataset.postId;
const commentsBox = document.getElementById(`comments-${postId}`);

if(!commentsBox) return;

if(commentsBox.style.display === "none"){
commentsBox.style.display = "block";
await loadComments(postId);
}else{
commentsBox.style.display = "none";
}

});


async function loadComments(postId){

const list = document.querySelector(`#comments-${postId} .post-comments-list`);

if(!list) return;

const { data, error } = await supabaseClient.rpc('get_post_comments',{
p_post_id: postId
});

if(error){
console.error(error);
return;
}

if(!data || data.length === 0){
list.innerHTML = `<div style="color:#aaa; font-size:0.9rem;">No comments yet</div>`;
return;
}

list.innerHTML = "";

data.forEach(c=>{

const div = document.createElement("div");

div.style.marginTop = "10px";
div.style.padding = "8px 10px";
div.style.background = "#1f2125";
div.style.borderRadius = "10px";

div.innerHTML = `
<div style="display:flex; gap:8px; align-items:center;">
<img src="${c.author_profile_image_url || 'https://via.placeholder.com/32'}"
style="width:32px;height:32px;border-radius:50%;object-fit:cover;">
<div style="font-weight:bold;">${c.author_name || 'User'}</div>
</div>

<div style="margin-top:6px;">
${c.content}
</div>
`;

list.appendChild(div);

});

}
document.addEventListener("click", async function(e){

const sendBtn = e.target.closest(".comment-send-btn");

if(!sendBtn) return;

const postId = sendBtn.dataset.postId;
const input = document.querySelector(`.comment-input[data-post-id="${postId}"]`);

if(!input) return;

const content = input.value.trim();

if(!content) return;

const { error } = await supabaseClient.rpc('create_post_comment',{
p_post_id: postId,
p_content: content,
p_parent_comment_id: null
});

if(error){
console.error(error);
alert("Error saving comment");
return;
}

input.value = "";
await loadComments(postId);
await loadFeed();

});

</script>

</body>
</html>
