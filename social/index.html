<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>FairQuest Social</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">

<style>

body{
font-family:'Domine',serif;
background:#000;
color:#f0e6d2;
margin:0;
padding:0;
}

.header{
background:#111;
border-bottom:2px solid #bb9457;
padding:14px 18px;
margin-bottom:30px;
font-family:'Cinzel',serif;
font-size:1.5rem;
}

.header-inner{
max-width:1200px;
margin:0 auto;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.header-title{
text-align:center;
flex:1;
}

.header-actions{
display:flex;
align-items:center;
gap:10px;
}

.header-icon-btn{
position:relative;
border:none;
background:#1f2125;
color:#f0e6d2;
border-radius:999px;
padding:10px 14px;
cursor:pointer;
font-family:'Domine',serif;
font-size:1rem;
}

.header-icon-btn:hover{
background:#2a2d31;
}

.notif-badge{
position:absolute;
top:-6px;
right:-4px;
min-width:20px;
height:20px;
padding:0 6px;
border-radius:999px;
background:#c62828;
color:#fff;
font-size:0.75rem;
line-height:20px;
text-align:center;
font-family:Arial,sans-serif;
font-weight:bold;
box-sizing:border-box;
}


.feed{
max-width:700px;
margin:auto;
padding:20px;
}

.post{
background:#111;
border:1px solid rgba(255,255,255,0.06);
border-radius:14px;
padding:16px 16px 10px;
margin-bottom:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

.post-author{
font-weight:bold;
margin-bottom:2px;
font-size:0.98rem;
color:#f5f5f5;
}

.post-time{
font-size:0.78rem;
color:#9aa0a6;
margin-bottom:0;
}

.post-content{
margin:12px 0 14px;
font-size:1rem;
line-height:1.5;
white-space:pre-wrap;
word-break:break-word;
color:#f0e6d2;
}

.post-stats{
font-size:0.88rem;
color:#aaa;
display:flex;
justify-content:flex-start;
gap:18px;
padding:0 2px 10px;
border-bottom:1px solid #2a2d31;
margin-bottom:8px;
}

.post-actions{
display:flex;
justify-content:space-between;
gap:8px;
padding-top:2px;
}

.reaction-container{
position:relative;
flex:1;
}

.post-action-btn{
width:100%;
background:none;
border:none;
color:#d8d8d8;
font-family:'Domine',serif;
font-size:0.95rem;
cursor:pointer;
padding:10px 12px;
border-radius:8px;
transition:background 0.15s ease;
}

.post-action-btn:hover{
background:rgba(255,255,255,0.08);
}

.reaction-popup{
position:absolute;
left:0;
bottom:100%;
margin-bottom:8px;
display:flex;
align-items:center;
gap:8px;
padding:8px 10px;
border-radius:999px;
background:#1f2125;
border:1px solid rgba(255,255,255,0.12);
box-shadow:0 8px 20px rgba(0,0,0,0.4);
opacity:0;
pointer-events:none;
transform:translateY(8px);
transition:opacity 0.15s ease, transform 0.15s ease;
z-index:20;
white-space:nowrap;
}

.reaction-container:hover .reaction-popup,
.reaction-container:focus-within .reaction-popup,
.reaction-container.show-reactions .reaction-popup{
opacity:1;
pointer-events:auto;
transform:translateY(0);
}

.reaction-popup span{
display:flex;
align-items:center;
justify-content:center;
width:34px;
height:34px;
font-size:1.45rem;
cursor:pointer;
transition:transform 0.12s ease;
}

.reaction-popup span:hover{
transform:scale(1.22);
}



.loading{
text-align:center;
padding:40px;
}
.social-layout{
  display:flex;
  justify-content:center;
  width:100%;
  max-width:1200px;
  margin:20px auto;
  padding:0 12px 20px;

}

.social-center{
  width:100%;
  max-width:600px;
}


.card{

  margin-bottom:20px;
  box-sizing:border-box;
}

.create-post-compact{
  padding:14px 16px;

}

.create-post-row{
  display:flex;
  align-items:center;
  gap:12px;
}

.composer-avatar{

  height:48px;
  border-radius:50%;
  object-fit:cover;
  background:#333;

.composer-input-btn{

.composer-icons{

}



.post-modal-overlay{

.post-modal{

}

.post-modal-header h2{

.post-modal-close{

.post-modal-user{

.post-modal-user-info{

#modal-user-name{

  padding:7px 10px;
  font-family:'Domine',serif;
}

.post-modal-textarea{

  resize:none;
  border:none;
  outline:none;
  background:#1f2125;
  color:#f0e6d2;
  padding:12px 20px 20px;

  font-size:2rem;

}

.post-modal-tools{
  margin:0 20px 18px;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:#f0e6d2;
}

.post-submit-btn{
  width:calc(100% - 40px);
  margin:0 20px 20px;
  border:none;
  border-radius:12px;
  padding:14px;
  background:#4b4e53;
  color:#ddd;
  font-family:'Domine',serif;
  font-size:1.05rem;
  cursor:pointer;
}

.post-submit-btn:hover{

}

display:flex;

gap:10px;
margin-bottom:8px;
}

.post-avatar{
width:40px;
height:40px;

object-fit:cover;

}

.post-author-block{
display:flex;
flex-direction:column;
}

.post-author{
font-weight:bold;
}

.post-time{

}
.comment-item{

.comment-item.reply-item{

.comment-avatar{

.comment-author{

.comment-content{

.comment-actions{

margin-top:8px;

.comment-action-btn{

.comment-reaction-container:hover .comment-reaction-popup,

.comment-reaction-popup span{

.reply-box{

<body>

<div class="header">

 <div class="card create-post-compact" id="open-post-modal">

 </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = window.supabase.createClient(
'https://awtbjuiqgtdydsqzimul.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
);
let currentUserId = null;
let notificationsChannel = null;
let audioUnlocked = false;
let lastNotificationEventAt = null;

const notificationAudio = new Audio("/social/notification.mp3");
notificationAudio.preload = "auto";

function unlockNotificationAudio(){
if(audioUnlocked) return;
notificationAudio.play().then(() => {
notificationAudio.pause();
notificationAudio.currentTime = 0;
audioUnlocked = true;
}).catch(() => {});
}

document.addEventListener("click", unlockNotificationAudio, { once:true });
document.addEventListener("keydown", unlockNotificationAudio, { once:true });
document.addEventListener("touchstart", unlockNotificationAudio, { once:true });

async function getCurrentSession(){
const { data } = await supabaseClient.auth.getSession();
return data.session || null;
}

async function checkUser(){
const session = await getCurrentSession();
if(!session){
document.getElementById("feed-container").innerHTML = "";
currentUserId = null;
return false;
}
currentUserId = session.user.id;
return true;
}

function shouldPlayOpenPageNotificationSound(payload){
if(document.visibilityState !== "visible") return false;
if(!payload || !payload.new) return false;
if(payload.new.is_read === true) return false;
if(!payload.new.last_event_at) return true;
if(!lastNotificationEventAt) return true;
return new Date(payload.new.last_event_at).getTime() > new Date(lastNotificationEventAt).getTime();
}

async function playNotificationSoundIfAllowed(payload){
if(!audioUnlocked) return;
if(!shouldPlayOpenPageNotificationSound(payload)) return;
try{
notificationAudio.currentTime = 0;
await notificationAudio.play();
}catch(_e){}
}

async function handleRealtimeNotification(payload){
if(payload?.new?.last_event_at){
lastNotificationEventAt = payload.new.last_event_at;
}
await loadUnreadNotificationCount();
await playNotificationSoundIfAllowed(payload);
}

async function startNotificationRealtime(){
const logged = await checkUser();
if(!logged || !currentUserId) return;

if(notificationsChannel){
await supabaseClient.removeChannel(notificationsChannel);
notificationsChannel = null;
}

notificationsChannel = supabaseClient
.channel(`social-notifications-${currentUserId}`)
.on(
'postgres_changes',
{
event: '*',
schema: 'social',
table: 'notif_user_notification',
filter: `recipient_user_id=eq.${currentUserId}`
},
async (payload) => {
await handleRealtimeNotification(payload);
}
)
.subscribe();
}
function openNotificationsPage(){
window.location.href = "/social/notifications.html";
}
function openFriends(){
  window.location.href = "/social/friends/friends.html";
}
async function loadUnreadNotificationCount(){
const logged = await checkUser();
if(!logged) return;

const { data, error } = await supabaseClient.rpc('get_my_unread_notification_count');

if(error){
console.error(error);
return;
}

const badge = document.getElementById("notifications-badge");
const count = Number(data || 0);

if(!badge) return;

if(count > 0){
badge.style.display = "inline-block";
badge.textContent = count > 99 ? "99+" : String(count);
}else{
badge.style.display = "none";
badge.textContent = "0";
}
}
async function loadFeed(){
const logged = await checkUser();
if(!logged) return;
const { data, error } = await supabaseClient.rpc('get_social_feed');
if(error){
console.error(error);
document.getElementById("feed-container").innerHTML="Error loading feed";
return;
}
renderFeed(data);
}

function renderFeed(posts){
const feed=document.getElementById("feed-container");
if(!posts || posts.length===0){
feed.innerHTML="<div class='loading'>No posts yet</div>";
return;
}
feed.innerHTML="";
posts.forEach(p=>{
const div=document.createElement("div");
div.className="post";
const reactionPopupHtml = reactionTypes.map(r => `
<span data-reaction-id="${r.id}" data-reaction-emoji="${r.emoji}">${r.emoji}</span>
`).join("");
div.innerHTML=`
<div class="post-header">
<img class="post-avatar"
src="${p.author_profile_image_url || 'https://via.placeholder.com/40'}">
<div class="post-author-block">
<div class="post-author">
${p.author_name || 'User'}
</div>
<div class="post-time">
${formatPostDate(p.created_at)}
 · ${formatAudienceIcon(p.audience)} ${formatAudienceLabel(p.audience)}
</div>
</div>
</div>
<div class="post-content">
${p.content || ""}
</div>
<div class="post-stats">
<span>${renderReactionSummary(p.reaction_emojis, p.reaction_count)}</span>
<span>💬 ${p.comment_count || 0}</span>
</div>
<div class="post-actions">
<div class="reaction-container">
<button class="post-action-btn like-btn" type="button">${p.my_reaction_emoji || '👍'} Like</button>
<div class="reaction-popup" data-post-id="${p.id}">
${reactionPopupHtml}
</div>
</div>
<button class="post-action-btn comment-btn" type="button" data-post-id="${p.id}">💬 Comment</button>
</div>
<div class="post-comment-preview" id="comment-preview-${p.id}" style="margin-top:10px;"></div>
<div class="post-comments" id="comments-${p.id}" style="display:none;">
  <div class="post-comments-list"></div>

  <div class="post-comment-form" style="margin-top:12px; display:flex; gap:8px;">
    <input
      type="text"
      class="comment-input"
      data-post-id="${p.id}"
      placeholder="Write a comment..."
      style="flex:1; padding:10px 12px; border-radius:10px; border:none; outline:none; font-family:'Domine',serif;"
    >
    <button
      type="button"
      class="comment-send-btn"
      data-post-id="${p.id}"
      style="padding:10px 14px; border:none; border-radius:10px; background:#bb9457; color:#000; font-weight:bold; cursor:pointer;"
    >
      Post
    </button>
  </div>
</div>
`;
feed.appendChild(div);
loadCommentPreview(p.id);
});
}
async function loadCurrentUserProfile(){
const logged = await checkUser();
if(!logged) return;
const { data, error } = await supabaseClient.rpc('get_profile_page_data');
if(error){
console.error(error);
return;
}
const profile = data?.profile || {};
const username = profile.username || "User";
const profileImage = profile.profile_image_url || "https://via.placeholder.com/60x60?text=U";
document.getElementById("modal-user-name").textContent = username;
document.getElementById("open-post-modal-btn").textContent = `What’s on your mind, ${username}?`;
document.getElementById("composer-profile-image").src = profileImage;
document.getElementById("modal-profile-image").src = profileImage;
}

let reactionTypes = [];
async function loadReactionTypes(){
const { data, error } = await supabaseClient.rpc('get_reaction_types');
if(error){
console.error(error);
reactionTypes = [];
return;
}
reactionTypes = data || [];
}
async function loadCommentPreview(postId){
const box = document.getElementById(`comment-preview-${postId}`);
if(!box) return;
const { data, error } = await supabaseClient.rpc('get_post_comments',{
p_post_id: postId
});
if(error){
console.error(error);
return;
}
if(!data || data.length === 0){
box.innerHTML = "";
return;
}
const topLevelComments = data.filter(c => !c.parent_comment_id);
const preview = topLevelComments.slice(0,2);
box.innerHTML = "";
preview.forEach(c=>{
const div = document.createElement("div");
div.style.marginTop = "6px";
div.style.fontSize = "0.9rem";
div.style.color = "#ddd";
div.innerHTML = `
<span style="font-weight:bold;">${c.author_name || 'User'}</span>
${c.content}
`;
box.appendChild(div);
});
if(topLevelComments.length > 2){
const more = document.createElement("div");
more.style.marginTop = "6px";
more.style.fontSize = "0.85rem";
more.style.color = "#aaa";
more.style.cursor = "pointer";
more.innerText = `View all ${topLevelComments.length} comments`;
more.onclick = function(){
document.querySelector(`.comment-btn[data-post-id="${postId}"]`).click();
};
box.appendChild(more);
}
}

function formatAudienceLabel(audience){
if(audience === "close_friends") return "Close Friends";
if(audience === "family") return "Family";
if(audience === "friends") return "Friends";
return "Public";
}
function formatAudienceIcon(audience){
if(audience === "close_friends") return "⭐";
if(audience === "family") return "👪";
if(audience === "friends") return "👥";
return "🌍";
}
function formatPostDate(dateString){
const d = new Date(dateString);
const mm = String(d.getMonth() + 1).padStart(2,'0');
const dd = String(d.getDate()).padStart(2,'0');
const yy = String(d.getFullYear()).slice(-2);
return `${mm}/${dd}/${yy}`;
}
function renderReactionSummary(reactionEmojis, reactionCount){
const total = reactionCount || 0;
if(total < 1){
return `👍 0`;
}
const emojis = Array.isArray(reactionEmojis) ? reactionEmojis.slice(0,3) : [];
const extraEmojis = emojis.filter(e => e !== "👍");
const emojiLine = ["👍", ...extraEmojis].slice(0,3).join(" ");
return `${emojiLine} ${total}`;
}
function openPostModal(){
document.getElementById("post-modal-overlay").style.display = "flex";
}
function closePostModal(){
document.getElementById("post-modal-overlay").style.display = "none";
}
async function createPost(){
const logged = await checkUser();
if(!logged) return;

const textarea = document.getElementById("post-content");
const audience = document.getElementById("post-audience").value;
const content = textarea.value.trim();

if(!content) return;

const { error } = await supabaseClient.rpc('create_social_post', {
p_content: content,
p_audience: audience
});

if(error){
console.error(error);
alert("Error creating post");
return;
}

textarea.value = "";
document.getElementById("post-audience").value = "public";
closePostModal();
await loadUnreadNotificationCount();
await loadFeed();
}

document.getElementById("open-post-modal").addEventListener("click", openPostModal);
document.getElementById("open-post-modal-btn").addEventListener("click", function(e){
e.stopPropagation();
openPostModal();
});
document.getElementById("close-post-modal-btn").addEventListener("click", closePostModal);
document.getElementById("post-modal-overlay").addEventListener("click", function(e){
if(e.target.id === "post-modal-overlay"){
closePostModal();
}
});
document.getElementById("create-post-btn").addEventListener("click", createPost);

async function initSocialPage(){
await loadReactionTypes();
await loadCurrentUserProfile();
await loadUnreadNotificationCount();
await loadFeed();
await startNotificationRealtime();
}

initSocialPage();

document.addEventListener("click", async function(e){
const reaction = e.target.closest(".reaction-popup span");

if(reaction){
const reactionTypeId = reaction.dataset.reactionId;
const popup = reaction.closest(".reaction-popup");
const postId = popup.dataset.postId;

const { error } = await supabaseClient.rpc('set_post_reaction',{
p_post_id: postId,
p_reaction_type_id: reactionTypeId
});

if(error){
console.error(error);
alert("Error saving reaction");
return;
}

await loadUnreadNotificationCount();
await loadFeed();
return;
}

const likeBtn = e.target.closest(".like-btn");

if(likeBtn){

document.addEventListener("click", async function(e){
const commentBtn = e.target.closest(".comment-btn");
if(!commentBtn) return;

const postId = commentBtn.dataset.postId;
const commentsBox = document.getElementById(`comments-${postId}`);
if(!commentsBox) return;

if(commentsBox.style.display === "none"){
commentsBox.style.display = "block";
await loadComments(postId);
await loadUnreadNotificationCount();
}else{
commentsBox.style.display = "none";
}
});

async function loadComments(postId){
const list = document.querySelector(`#comments-${postId} .post-comments-list`);
if(!list) return;
const { data, error } = await supabaseClient.rpc('get_post_comments',{
p_post_id: postId
});
if(error){
console.error(error);
return;
}
if(!data || data.length === 0){
list.innerHTML = `<div style="color:#aaa; font-size:0.9rem;">No comments yet</div>`;
return;
}
list.innerHTML = "";
const topLevelComments = data.filter(c => !c.parent_comment_id);
const repliesByParent = {};
data
.filter(c => c.parent_comment_id)
.forEach(c => {
if(!repliesByParent[c.parent_comment_id]){
repliesByParent[c.parent_comment_id] = [];
}
repliesByParent[c.parent_comment_id].push(c);
});

const commentReactionPopupHtml = reactionTypes.map(r => `
<span data-reaction-id="${r.id}" data-reaction-emoji="${r.emoji}">${r.emoji}</span>
`).join("");
function buildCommentHtml(c, isReply = false){
return `
<div class="comment-item ${isReply ? 'reply-item' : ''}" data-comment-id="${c.id}">
  <div class="comment-header">
    <img
      class="comment-avatar"
      src="${c.author_profile_image_url || 'https://via.placeholder.com/32'}"
      alt="Profile"
    >
    <div class="comment-author">${c.author_name || 'User'}</div>
  </div>
  <div class="comment-content">${c.content || ''}</div>
  <div class="comment-actions">
    <span>${renderReactionSummary(c.reaction_emojis, c.reaction_count)}</span>
    <div class="comment-reaction-container">
      <button
        type="button"
        class="comment-action-btn comment-like-btn"
        data-comment-id="${c.id}"
      >${c.my_reaction || '👍'} Like</button>
      <div class="comment-reaction-popup" data-comment-id="${c.id}">
        ${commentReactionPopupHtml}
      </div>
    </div>
    <button
      type="button"
      class="comment-action-btn reply-toggle-btn"
      data-comment-id="${c.id}"
      data-post-id="${postId}"
    >Reply</button>
  </div>
  <div
    class="reply-box"
    id="reply-box-${c.id}"
    style="display:none;"
  >
    <input
      type="text"
      class="reply-input"
      data-comment-id="${c.id}"
      data-post-id="${postId}"
      placeholder="Write a reply..."
    >
    <button
      type="button"
      class="reply-send-btn"
      data-comment-id="${c.id}"
      data-post-id="${postId}"
    >Reply</button>
  </div>
</div>
`;
}
topLevelComments.forEach(c => {
const wrapper = document.createElement("div");
wrapper.innerHTML = buildCommentHtml(c, false);
const replies = repliesByParent[c.id] || [];
replies.forEach(reply => {
wrapper.innerHTML += buildCommentHtml(reply, true);
});

list.appendChild(wrapper);
});

}
