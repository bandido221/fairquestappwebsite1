
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairQuest Social</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --gold:        #c9a84c;
    --gold-light:  #f1df99;
    --gold-dark:   #8a6a1a;
    --parchment:   rgba(241, 223, 153, 0.93);
    --parchment-2: rgba(214, 197, 126, 0.90);
    --ink:         #1e1208;
    --bg:          #0d0a04;
    --card-radius: 16px;
  }

  body {
    font-family: 'Domine', serif;
    background: var(--bg);
    color: var(--gold-light);
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,130,40,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(100,60,10,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    background: rgba(13, 10, 4, 0.95);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 18px;
    margin-bottom: 30px;
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 200;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-title {
    text-align: center;
    flex: 1;
    color: var(--gold-light);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-icon-btn {
    position: relative;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.08);
    color: var(--gold-light);
    border-radius: 999px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: 'Domine', serif;
    font-size: 1rem;
    transition: background 0.2s, border-color 0.2s;
  }

  .header-icon-btn:hover {
    background: rgba(201,168,76,0.18);
    border-color: rgba(201,168,76,0.6);
  }

  .notif-badge {
    position: absolute;
    top: -6px;
    right: -4px;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 999px;
    background: #c62828;
    color: #fff;
    font-size: 0.75rem;
    line-height: 20px;
    text-align: center;
    font-family: Arial, sans-serif;
    font-weight: bold;
    box-sizing: border-box;
  }

  /* ── SUBNAV ── */
  .header-subnav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .notifications-page-btn {
    background: transparent;
    border: 1.5px solid rgba(201,168,76,0.4);
    color: var(--gold);
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'Domine', serif;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }

  .notifications-page-btn:hover {
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.7);
    color: var(--gold-light);
  }

  /* ── LAYOUT ── */
  .social-layout {
    display: flex;
    justify-content: center;
    width: 100%;
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 12px 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
  }

  .social-center {
    width: 100%;
    max-width: 600px;
  }

  /* ── CARD (create post) ── */
  .card {
    background: var(--parchment);
    padding: 16px;
    border-radius: var(--card-radius);
    margin-bottom: 20px;
    box-sizing: border-box;
    border: 1px solid rgba(201,168,76,0.4);
    box-shadow:
      0 2px 0 rgba(201,168,76,0.35),
      0 8px 28px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .card, .card * { color: #111 !important; }

  .create-post-compact {
    padding: 14px 16px;
    cursor: pointer;
  }

  .create-post-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .composer-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    flex-shrink: 0;
  }

  .composer-input-btn {
    flex: 1;
    border: 1.5px solid rgba(201,168,76,0.4);
    border-radius: 999px;
    background: rgba(13,10,4,0.7);
    color: var(--gold) !important;
    text-align: left;
    padding: 14px 18px;
    font-family: 'Domine', serif;
    font-size: 1rem;
    cursor: pointer;
    box-sizing: border-box;
  }

  .composer-icons {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.4rem;
  }

  .tool-icon-btn {
    border: none;
    background: transparent;
    color: var(--gold-light) !important;
    font-family: 'Domine', serif;
    font-size: 1.4rem;
    line-height: 1;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .tool-icon-btn:hover {
    background: rgba(201,168,76,0.12);
    transform: translateY(-2px) scale(1.08);
  }

  /* ── FEED / POSTS ── */
  .feed {
    max-width: 700px;
    margin: auto;
    padding: 20px;
  }

 .post {
    background: rgba(40, 30, 8, 0.97);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: var(--card-radius);
    padding: 16px 16px 10px;
    margin-bottom: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(201,168,76,0.1);
  }

  .pinned-post {
    border: 1px solid rgba(201,168,76,0.5);
    background: rgba(26, 21, 8, 0.95);
  }

  .pinned-post .post-author-block::before {
    content: "📌 Pinned";
    display: block;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 2px;
  }

  .post-author {
    font-weight: bold;
    margin-bottom: 2px;
    font-size: 0.98rem;
    color: var(--gold-light);
  }

  .post-time {
    font-size: 0.78rem;
    color: #9aa0a6;
    margin-bottom: 0;
  }

  .post-content {
    margin: 12px 0 14px;
    font-size: 1rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--gold-light);
  }

  .post-stats {
    font-size: 0.88rem;
    color: var(--gold);
    display: flex;
    justify-content: flex-start;
    gap: 18px;
    padding: 0 2px 10px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    margin-bottom: 8px;
  }

  .post-actions {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding-top: 2px;
  }

  .post-action-btn {
    width: 100%;
    background: none;
    border: none;
    color: var(--gold);
    font-family: 'Domine', serif;
    font-size: 0.95rem;
    cursor: pointer;
    padding: 10px 12px;
    border-radius: 8px;
    transition: background 0.15s ease;
  }

  .post-action-btn:hover {
    background: rgba(201,168,76,0.1);
  }

  /* ── REACTION POPUP ── */
  .reaction-container { position: relative; flex: 1; }

  .reaction-popup {
    position: absolute;
    left: 0;
    bottom: 100%;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(20,15,5,0.97);
    border: 1px solid rgba(201,168,76,0.3);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    z-index: 20;
    white-space: nowrap;
  }

  .reaction-container:hover .reaction-popup,
  .reaction-container:focus-within .reaction-popup,
  .reaction-container.show-reactions .reaction-popup {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .reaction-popup span {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    font-size: 1.45rem;
    cursor: pointer;
    transition: transform 0.12s ease;
  }

  .reaction-popup span:hover { transform: scale(1.22); }

  /* ── POST HEADER ── */
  .post-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .post-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1;
  }

  .post-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    flex-shrink: 0;
  }

  .post-top-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: var(--gold);
    font-size: 1.35rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .post-top-btn:hover { background: rgba(201,168,76,0.1); }

  .post-menu {
    position: absolute;
    top: 40px;
    right: 0;
    min-width: 220px;
    background: rgba(20,15,5,0.98);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 14px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.6);
    padding: 8px;
    display: none;
    z-index: 50;
  }

  .post-menu.show { display: block; }

  .post-menu-btn {
    width: 100%;
    border: none;
    background: transparent;
    color: var(--gold-light);
    text-align: left;
    padding: 12px 14px;
    border-radius: 10px;
    font-family: 'Domine', serif;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .post-menu-btn:hover { background: rgba(201,168,76,0.1); }

  .post-menu-divider {
    height: 1px;
    background: rgba(201,168,76,0.15);
    margin: 6px 0;
  }

  .post-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    border: 1px solid rgba(201,168,76,0.3);
  }

  .post-author-block { display: flex; flex-direction: column; }

  /* ── COMMENTS ── */
  .comment-item {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(20,15,5,0.85);
    border-radius: 12px;
    border: 1px solid rgba(201,168,76,0.15);
  }

  .comment-item.reply-item {
    margin-left: 42px;
    margin-top: 8px;
    background: rgba(13,10,4,0.9);
  }

  .comment-header {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .comment-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    background: #333;
    border: 1px solid rgba(201,168,76,0.2);
  }

  .comment-author {
    font-weight: bold;
    color: var(--gold-light);
  }

  .comment-content {
    margin-top: 6px;
    color: var(--gold-light);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .comment-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--gold);
    flex-wrap: wrap;
  }

  .comment-action-btn {
    background: none;
    border: none;
    color: var(--gold);
    font-family: 'Domine', serif;
    font-size: 0.88rem;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
  }

  .comment-action-btn:hover { background: rgba(201,168,76,0.1); }

  .comment-reaction-container {
    position: relative;
    display: inline-block;
  }

  .comment-reaction-popup {
    position: absolute;
    left: 0;
    bottom: 100%;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(20,15,5,0.97);
    border: 1px solid rgba(201,168,76,0.3);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    z-index: 30;
    white-space: nowrap;
  }

  .comment-reaction-container:hover .comment-reaction-popup,
  .comment-reaction-container:focus-within .comment-reaction-popup,
  .comment-reaction-container.show-reactions .comment-reaction-popup {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .comment-reaction-popup span {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    font-size: 1.45rem;
    cursor: pointer;
    transition: transform 0.12s ease;
  }

  .comment-reaction-popup span:hover { transform: scale(1.22); }

  .reply-box {
    margin-top: 10px;
    margin-left: 42px;
    display: flex;
    gap: 8px;
  }

  .reply-input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(201,168,76,0.3);
    outline: none;
    font-family: 'Domine', serif;
    background: rgba(13,10,4,0.8);
    color: var(--gold-light);
  }

  .reply-send-btn {
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: var(--gold);
    color: #111;
    font-weight: bold;
    cursor: pointer;
    font-family: 'Domine', serif;
  }

  /* ── POST MODAL ── */
  .post-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    z-index: 9999;
    padding: 24px 16px;
    overflow-y: auto;
    box-sizing: border-box;
  }

  .post-modal {
    width: min(100%, 610px);
    background: rgba(20,15,5,0.98);
    border-radius: 18px;
    border: 1px solid rgba(201,168,76,0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    margin: 0 auto;
  }

  .post-modal .composer-avatar { width: 40px; height: 40px; }

  .post-modal-header {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 56px;
    padding: 0 60px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .post-modal-header h2 {
    display: block;
    margin: 0;
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 700;
  }

  .post-modal-close {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    background: rgba(201,168,76,0.1);
    color: var(--gold-light);
    font-size: 1.2rem;
    cursor: pointer;
  }

  .post-modal-body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .post-modal-user {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .post-modal-user-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .post-modal-user-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    color: var(--gold-light);
  }

  #modal-user-name {
    font-weight: 700;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--gold-light);
  }

  #post-audience, #post-as-vpa {
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 7px;
    background: rgba(201,168,76,0.1);
    color: var(--gold-light);
    padding: 6px 10px;
    font-family: 'Domine', serif;
    font-size: 0.88rem;
  }

  .post-modal-textarea {
    width: 100%;
    min-height: 150px;
    height: 150px;
    resize: none;
    border: none;
    outline: none;
    background: rgba(20,15,5,0.98);
    color: var(--gold-light);
    padding: 0;
    font-family: 'Domine', serif;
    font-size: 0.98rem;
    line-height: 1.35;
    box-sizing: border-box;
  }

  .post-modal-textarea::placeholder { color: rgba(201,168,76,0.4); }

  .post-modal.has-image .post-modal-textarea {
    min-height: 74px;
    height: 74px;
  }

  .post-image-preview-wrap {
    display: none;
    width: 100%;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    background: rgba(13,10,4,0.8);
    position: relative;
    overflow: hidden;
  }

  .post-image-preview-scroller {
    width: 100%;
    max-height: 240px;
    overflow: auto;
  }

  .post-image-preview {
    width: 100%;
    height: auto;
    object-fit: contain;
    border-radius: 0;
    display: block;
  }

  .post-image-remove {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(20,15,5,0.9);
    color: var(--gold-light);
    font-size: 1.15rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
  }

  .post-modal-tools {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    background: rgba(13,10,4,0.6);
  }

  .post-modal-tools-label {
    color: var(--gold);
    font-family: 'Domine', serif;
    font-size: 0.92rem;
    font-weight: 600;
  }

  .post-submit-btn {
    width: 100%;
    margin: 0;
    border: 1.5px solid rgba(201,168,76,0.4);
    border-radius: 8px;
    padding: 11px;
    background: rgba(201,168,76,0.15);
    color: var(--gold-light);
    font-family: 'Domine', serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .post-submit-btn:hover { background: rgba(201,168,76,0.25); }

  /* ── OTHER MODALS ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
    box-sizing: border-box;
  }

  .create-post-card {
    width: min(100%, 520px);
    background: rgba(20,15,5,0.98);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    padding: 20px;
    position: relative;
    box-sizing: border-box;
    color: var(--gold-light);
  }

  .close-modal {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    background: rgba(201,168,76,0.1);
    color: var(--gold-light);
    font-size: 1.2rem;
    cursor: pointer;
  }

  .publish-btn {
    border: none;
    border-radius: 8px;
    padding: 11px 16px;
    background: var(--gold);
    color: #111;
    font-family: 'Domine', serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--gold);
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .social-layout { max-width: 100%; padding: 0 8px 20px; }
    .social-center { max-width: 100%; }
    .card { padding: 14px; }
    .post { padding: 18px 16px 14px; }
    .post-content { font-size: 1.1rem; line-height: 1.65; }
    .post-author { font-size: 1.05rem; }
    .post-time { font-size: 0.9rem; }
    .post-action-btn { font-size: 1rem; padding: 10px; }
    .composer-input-btn { font-size: 1rem; padding: 14px 16px; }
    .post-avatar { width: 44px; height: 44px; }
    .comment-item.reply-item { margin-left: 18px; }
    .reply-box { margin-left: 18px; }
    .post-modal-overlay { padding: 12px 10px; }
    .post-modal { width: 100%; border-radius: 14px; }
    .post-modal-header { min-height: 52px; padding: 0 54px; }
    .post-modal-body { padding: 12px; gap: 10px; }
    .post-modal-textarea { min-height: 112px; height: 112px; }

return;
}

marker = document.createElement("div");
marker.id = "feed-load-marker";
marker.className = "loading";
marker.textContent = isFeedLoading ? "Loading..." : "Scroll for more";
feed.appendChild(marker);
}

async function getOrCreatePostBookId(audience){

const config = getDefaultBookConfig(privacy);

g &&
g.privacy === privacy &&
(
(privacy === "private" && g.is_main === true) ||
String(g.title || "").trim().toLowerCase() === config.title.toLowerCase()
)
);

if(match?.id){

galleryId: match.id,
privacy
};
}

if(privacy === "private"){

if(mainError){
console.error(mainError);
throw new Error("Could not create main book");

if(mainGallery?.id){

privacy
};
}
}

const { data:newGallery, error:createGalleryError } = await supabaseClient.rpc('create_portrait_gallery', {
p_title: config.title,
p_description: config.description,

});

if(createGalleryError){

throw new Error("Could not create book");
}

return {
galleryId: newGallery.id,
privacy
};
}

async function resizeImageFile(file){

const MAX_SIZE = 1200;
const QUALITY = 0.82;

return new Promise((resolve) => {

const img = new Image();
const reader = new FileReader();

reader.onload = function(e){
img.src = e.target.result;
};

img.onload = function(){

let width = img.width;
let height = img.height;

if(width > height){
if(width > MAX_SIZE){
height *= MAX_SIZE / width;
width = MAX_SIZE;
}
}else{
if(height > MAX_SIZE){
width *= MAX_SIZE / height;
height = MAX_SIZE;
}
}

const canvas = document.createElement("canvas");
canvas.width = width;
canvas.height = height;

const ctx = canvas.getContext("2d");
ctx.drawImage(img, 0, 0, width, height);

canvas.toBlob((blob) => {
const resizedFile = new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', {
type: "image/jpeg",
lastModified: Date.now()
});

resolve(resizedFile);
}, "image/jpeg", QUALITY);

};

reader.readAsDataURL(file);
});
}

async function loadMyVPAccountsForComposer(){
  const logged = await checkUser();
  if(!logged) return;

  const { data, error } = await supabaseClient
    .from('vendor_performer_applications')
    .select('id, name, application_type, approval_status')
    .eq('user_id', currentUserId)
    .eq('approval_status', 'approved')
    .order('id', { ascending: true });

  if(error || !data || data.length === 0) return;

  myVpAccountsForPost = data;

  const select = document.getElementById('post-as-vpa');
  if(!select) return;

  // clear and rebuild options
  select.innerHTML = '<option value="">👤 Post as Myself</option>';

  data.forEach(app => {
    const icon = app.application_type === true ? '🎭' : '🛒';
    const opt = document.createElement('option');
    opt.value = app.id;
    opt.textContent = `${icon} Post as ${app.name}`;
    select.appendChild(opt);
  });

// show the selector
  select.style.display = 'inline-block';

  // swap composer identity when VP is selected
  select.addEventListener('change', async function(){
    const selectedVpaId = select.value;
    const composerAvatar = document.getElementById('composer-profile-image');
    const modalAvatar    = document.getElementById('modal-profile-image');
    const modalName      = document.getElementById('modal-user-name');

    if(!selectedVpaId){
      // back to personal identity
      const { data } = await supabaseClient.rpc('get_profile_page_data');
      const profile = data?.profile || {};
      const img = profile.profile_image_url || 'https://via.placeholder.com/60x60?text=U';
      const name = profile.username || 'User';
      composerAvatar.src = img;
      modalAvatar.src    = img;
      modalName.textContent = name;
    } else {
      // switch to VP identity
      const vp = myVpAccountsForPost.find(a => String(a.id) === String(selectedVpaId));
      if(!vp) return;

      // get vp social profile for avatar
      const { data: vpProf } = await supabaseClient
        .rpc('get_vp_social_profile', { p_vpa_id: parseInt(selectedVpaId) });

      const avatar = vpProf?.avatar_url || 'https://via.placeholder.com/60x60?text=VP';
      const name   = vpProf?.display_name || vp.name;

      composerAvatar.src    = avatar;
      modalAvatar.src       = avatar;
      modalName.textContent = name;
    }
  });
}

if(likeBtn){
const container = likeBtn.closest(".reaction-container");
document.querySelectorAll(".reaction-container").forEach(c=>{
if(c!==container) c.classList.remove("show-reactions");
});
container.classList.toggle("show-reactions");
e.stopPropagation();
return;
}

if(!e.target.closest(".reaction-popup")){
document.querySelectorAll(".reaction-container").forEach(c=>{
c.classList.remove("show-reactions");
});
}
});

document.addEventListener("click", async function(e){
const commentBtn = e.target.closest(".comment-btn");
if(!commentBtn) return;

const postId = commentBtn.dataset.postId;
const commentsBox = document.getElementById(`comments-${postId}`);
if(!commentsBox) return;

if(commentsBox.style.display === "none"){
commentsBox.style.display = "block";
await loadComments(postId);
await loadUnreadNotificationCount();
}else{
commentsBox.style.display = "none";
}
});

async function loadComments(postId){
const list = document.querySelector(`#comments-${postId} .post-comments-list`);
if(!list) return;
const { data, error } = await supabaseClient.rpc('get_post_comments',{
p_post_id: postId
});
if(error){
console.error(error);
return;
}
if(!data || data.length === 0){
list.innerHTML = `<div style="color:#aaa; font-size:0.9rem;">No comments yet</div>`;
return;
}
list.innerHTML = "";
const topLevelComments = data
  .filter(c => !c.parent_comment_id)
  .sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));

if(!visibleTopLevelCommentsByPost[postId]){
visibleTopLevelCommentsByPost[postId] = TOP_LEVEL_COMMENTS_PAGE_SIZE;
}

const visibleCount = visibleTopLevelCommentsByPost[postId];
const visibleComments = topLevelComments.slice(0, visibleCount);
const repliesByParent = {};
data
.filter(c => c.parent_comment_id)
.forEach(c => {
if(!repliesByParent[c.parent_comment_id]){
repliesByParent[c.parent_comment_id] = [];
}
repliesByParent[c.parent_comment_id].push(c);
});

const commentReactionPopupHtml = reactionTypes.map(r => `
<span data-reaction-id="${r.id}" data-reaction-emoji="${r.emoji}">${r.emoji}</span>
`).join("");
function escapeHtml(value){
return String(value || "")
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;")
  .replace(/'/g, "&#39;");
}

function buildCommentHtml(c, level = 0){
const isOwner = c.author_id === currentUserId;
const isDeleted = c.status === 'deleted';

return `
<div class="comment-item ${level > 0 ? 'reply-item' : ''}" data-comment-id="${c.id}">
  <div class="comment-header" style="justify-content:space-between;">
    <div style="display:flex; gap:8px; align-items:center;">
      <img
        class="comment-avatar"
        src="${c.author_profile_image_url || 'https://via.placeholder.com/32'}"
        alt="Profile"
      >
      <div class="comment-author">
        <a href="/social/profile/profile.html?user_id=${encodeURIComponent(c.author_id)}" style="color:#f5f5f5; text-decoration:none;">
          ${c.author_name || 'User'}
        </a>
      </div>
    </div>

    <div class="comment-menu-wrap" style="position:relative;">
      <button
        type="button"
        class="comment-action-btn comment-menu-toggle-btn"
        data-comment-id="${c.id}"
        style="font-size:1.1rem; padding:2px 8px;"
      >⋯</button>

      <div
        class="post-menu comment-menu"
        id="comment-menu-${c.id}"
        style="top:28px; right:0; min-width:180px;"
      >
        ${
          isOwner && !isDeleted
            ? `
              <button type="button" class="post-menu-btn comment-menu-action-btn" data-action="edit-comment" data-comment-id="${c.id}" data-post-id="${c.post_id}">Edit comment</button>
              <button type="button" class="post-menu-btn comment-menu-action-btn" data-action="delete-comment" data-comment-id="${c.id}" data-post-id="${c.post_id}">Delete comment</button>
            `
            : `
              <button type="button" class="post-menu-btn comment-report-btn" data-comment-id="${c.id}">Report comment</button>
            `
        }
      </div>
    </div>
  </div>

  <div class="comment-content comment-body-text" data-comment-raw="${escapeHtml(c.content || '')}">
    ${c.is_edited && !isDeleted ? `<div style="font-size:12px;color:#aaa;margin-bottom:4px;">edited</div>` : ""}
    ${escapeHtml(c.content || '')}
  </div>

  <div class="comment-actions">
    <span>${renderReactionSummary(c.reaction_emojis, c.reaction_count)}</span>
    <div class="comment-reaction-container">
      <button
        type="button"
        class="comment-action-btn comment-like-btn"
        data-comment-id="${c.id}"
      >${c.my_reaction || '👍'} Like</button>
      <div class="comment-reaction-popup" data-comment-id="${c.id}">
        ${commentReactionPopupHtml}
      </div>
    </div>
${level < 2 && !isDeleted ? `
<button
  type="button"
  class="comment-action-btn reply-toggle-btn"
  data-comment-id="${c.id}"
  data-post-id="${postId}"
>Reply</button>
` : ""}
  </div>

  ${!isDeleted ? `
  <div
    class="reply-box"
    id="reply-box-${c.id}"
    style="display:none;"
  >
    <input
      type="text"
      class="reply-input"
      data-comment-id="${c.id}"
      data-post-id="${postId}"
      placeholder="Write a reply..."
    >
    <button
      type="button"
      class="reply-send-btn"
      data-comment-id="${c.id}"
      data-post-id="${postId}"
    >Reply</button>
  </div>
  ` : ""}
</div>
`;
}
visibleComments.forEach(c => {
const wrapper = document.createElement("div");
wrapper.innerHTML = buildCommentHtml(c, 0);

const replies = repliesByParent[c.id] || [];
const parentCommentEl = wrapper.firstElementChild;

if(replies.length > 0 && parentCommentEl){

const isExpanded = expandedRepliesByComment[c.id] === true;

const toggleBtn = document.createElement("div");
toggleBtn.style.marginTop = "6px";
toggleBtn.style.marginLeft = "42px";
toggleBtn.style.fontSize = "0.85rem";
toggleBtn.style.color = "#bb9457";
toggleBtn.style.cursor = "pointer";
toggleBtn.innerText = isExpanded
  ? "Hide replies"
  : `View ${replies.length} repl${replies.length === 1 ? "y" : "ies"}`;

toggleBtn.onclick = async function(){
expandedRepliesByComment[c.id] = !isExpanded;
await refreshPostCommentsInPlace(postId);
};

parentCommentEl.appendChild(toggleBtn);

if(isExpanded){
replies.forEach(reply => {
const temp = document.createElement("div");
temp.innerHTML = buildCommentHtml(reply, 1);
if(temp.firstElementChild){
wrapper.appendChild(temp.firstElementChild);
}
});
}
}

list.appendChild(wrapper);
});
if(topLevelComments.length > visibleCount){
const moreBtn = document.createElement("div");
moreBtn.style.marginTop = "10px";
moreBtn.style.fontSize = "0.9rem";
moreBtn.style.color = "#bb9457";
moreBtn.style.cursor = "pointer";
moreBtn.innerText = "View more comments";

moreBtn.onclick = async function(){
visibleTopLevelCommentsByPost[postId] += TOP_LEVEL_COMMENTS_PAGE_SIZE;
await refreshPostCommentsInPlace(postId);
};

list.appendChild(moreBtn);
}
document.querySelectorAll(".comment-menu-toggle-btn").forEach(btn=>{
btn.onclick = function(e){
e.stopPropagation();
const commentId = btn.getAttribute("data-comment-id");
const menu = document.getElementById(`comment-menu-${commentId}`);
if(!menu) return;

const isOpen = menu.classList.contains("show");
document.querySelectorAll(".comment-menu.show").forEach(m=>m.classList.remove("show"));

if(!isOpen){
menu.classList.add("show");
}
};
});

document.querySelectorAll(".comment-menu-action-btn").forEach(btn=>{
btn.onclick = async function(e){
e.stopPropagation();

const action = btn.getAttribute("data-action");
const commentId = btn.getAttribute("data-comment-id");
const postId = btn.getAttribute("data-post-id");

await handleCommentMenuAction(action, commentId, postId);
};
});

}
function showToast(message){
let toast = document.createElement("div");
toast.innerText = message;

toast.style.position = "fixed";
toast.style.bottom = "20px";
toast.style.left = "50%";
toast.style.transform = "translateX(-50%)";
toast.style.background = "#111";
toast.style.color = "#f0e6d2";
toast.style.padding = "10px 16px";
toast.style.borderRadius = "10px";
toast.style.border = "1px solid #bb9457";
toast.style.fontSize = "0.9rem";
toast.style.zIndex = "9999";
toast.style.opacity = "0";
toast.style.transition = "opacity 0.2s ease";

document.body.appendChild(toast);

setTimeout(()=> toast.style.opacity = "1", 10);

setTimeout(()=>{
toast.style.opacity = "0";
setTimeout(()=> toast.remove(), 200);
}, 2000);
}
async function refreshPostCommentsInPlace(postId){
const postEl = document.querySelector(`.post[data-post-id="${postId}"]`);
const commentsBox = document.getElementById(`comments-${postId}`);
const previousTop = postEl ? postEl.getBoundingClientRect().top : null;

await loadComments(postId);
await loadCommentPreview(postId);

if(commentsBox){
commentsBox.style.display = "block";
}

if(postEl && previousTop !== null){
const newTop = postEl.getBoundingClientRect().top;
window.scrollBy(0, newTop - previousTop);
}
}
document.addEventListener("click", async function(e){
const sendBtn = e.target.closest(".comment-send-btn");
if(!sendBtn) return;
const postId = sendBtn.dataset.postId;
const input = document.querySelector(`.comment-input[data-post-id="${postId}"]`);
if(!input) return;
const content = input.value.trim();
if(!content) return;

const previousScrollY = window.scrollY;

const { error } = await supabaseClient.rpc('create_post_comment',{
p_post_id: postId,
p_content: content,
p_parent_comment_id: null
});

if(error){
console.error(error);
alert("Error saving comment");
return;
}

input.value = "";
showToast("Comment posted");
await refreshPostCommentsInPlace(postId);
await loadUnreadNotificationCount();
window.scrollTo(0, previousScrollY);

});

document.addEventListener("click", async function(e){

const reportBtn = e.target.closest(".comment-report-btn");
if(reportBtn){
const commentId = reportBtn.dataset.commentId;
const reason = prompt("Why are you reporting this comment?");
if(!reason) return;

const { error } = await supabaseClient.rpc('report_post_comment', {
  p_comment_id: commentId,
  p_reason: reason
});

if(error){
console.error(error);
alert("Error reporting comment");
return;
}

alert("Comment reported");
document.querySelectorAll(".comment-menu.show").forEach(menu => {
menu.classList.remove("show");
});
return;
}

const reaction = e.target.closest(".comment-reaction-popup span");
if(reaction){
const reactionTypeId = reaction.dataset.reactionId;
const popup = reaction.closest(".comment-reaction-popup");
const commentId = popup.dataset.commentId;
const { error } = await supabaseClient.rpc('set_comment_reaction',{
p_comment_id: commentId,
p_reaction_type_id: reactionTypeId
});

if(error){
console.error(error);
alert("Error saving reaction");
return;
}

const postBox = popup.closest(".post-comments");
if(postBox){
const postId = postBox.id.replace("comments-","");
await loadComments(postId);
await loadUnreadNotificationCount();
}

return;
}
const likeBtn = e.target.closest(".comment-like-btn");
if(likeBtn){
const container = likeBtn.closest(".comment-reaction-container");
document.querySelectorAll(".comment-reaction-container").forEach(c=>{
if(c!==container) c.classList.remove("show-reactions");
});

container.classList.toggle("show-reactions");
e.stopPropagation();
return;
}
});

document.addEventListener("click", function(e){

if(!e.target.closest(".comment-menu-wrap")){
document.querySelectorAll(".comment-menu.show").forEach(menu => {
menu.classList.remove("show");
});
}

const btn = e.target.closest(".reply-toggle-btn");
if(!btn) return;
const commentId = btn.dataset.commentId;
const box = document.getElementById(`reply-box-${commentId}`);
if(!box) return;
box.style.display = "flex";
});

document.addEventListener("click", async function(e){
const btn = e.target.closest(".reply-send-btn");
if(!btn) return;
const commentId = btn.dataset.commentId;
const postId = btn.dataset.postId;
const input = document.querySelector(`.reply-input[data-comment-id="${commentId}"]`);
if(!input) return;
const content = input.value.trim();
if(!content) return;
const { data: allComments } = await supabaseClient.rpc('get_post_comments',{
p_post_id: postId
});

const parent = allComments.find(c => c.id === commentId);

if(parent && parent.parent_comment_id){
const parentOfParent = allComments.find(c => c.id === parent.parent_comment_id);

if(parentOfParent && parentOfParent.parent_comment_id){
alert("No more replies allowed");
return;
}
}

const { error } = await supabaseClient.rpc('create_post_comment',{
p_post_id: postId,
p_content: content,
p_parent_comment_id: commentId
});

if(error){
console.error(error);
alert("Error saving reply");
return;
}

input.value = "";
showToast("Reply posted");
await refreshPostCommentsInPlace(postId);
await loadUnreadNotificationCount();
});
</script>

</body>
</html>
