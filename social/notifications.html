<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications | FairQuest Social</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">

<style>
body{
font-family:'Domine',serif;
background:#000;
color:#f0e6d2;
margin:0;
padding:0;
}

.header{
background:#111;
border-bottom:2px solid #bb9457;
padding:14px 18px;
margin-bottom:30px;
font-family:'Cinzel',serif;
font-size:1.5rem;
}

.header-inner{
max-width:1200px;
margin:0 auto;
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.header-title{
text-align:center;
flex:1;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icon-btn{
  position:relative;
  border:none;
  background:#1f2125;
  color:#f0e6d2;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  font-family:'Domine',serif;
  font-size:1rem;
}

.header-icon-btn:hover{
  background:#2a2d31;
}

.header-subnav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-top:10px;
  flex-wrap:wrap;
}

.notifications-page-btn{
  background:#bb9457;
  border:none;
  color:#000;
  padding:8px 18px;
  border-radius:8px;
  font-family:'Domine',serif;
  font-weight:bold;
  cursor:pointer;
}

.notifications-page-btn:hover{
  background:#cfa75e;
}

.social-layout{
display:flex;
justify-content:center;
width:100%;
max-width:1200px;
margin:20px auto;
padding:0 12px 20px;
box-sizing:border-box;
}

.social-center{
width:100%;
max-width:700px;
}

.card{
background:rgba(214,197,126,0.88);
padding:16px;
border-radius:10px;
margin-bottom:20px;
box-sizing:border-box;
color:#111;
}

.page-title{
font-family:'Cinzel',serif;
font-size:1.6rem;
margin:0 0 8px 0;
text-align:center;
}

.page-subtitle{
text-align:center;
margin:0;
color:#2b2b2b;
}

.actions-row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}

.action-btn{
background:#111;
color:#f0e6d2;
border:none;
border-radius:8px;
padding:10px 16px;
font-family:'Domine',serif;
cursor:pointer;
}

.action-btn:hover{
background:#222;
}

.notifications-list{
display:flex;
flex-direction:column;
gap:14px;
}

.notification-item{
background:#111;
border:1px solid rgba(255,255,255,0.06);
border-radius:14px;
padding:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.35);
}

.notification-item.unread{
border:1px solid #bb9457;
box-shadow:0 0 0 1px rgba(187,148,87,0.35), 0 4px 10px rgba(0,0,0,0.35);
}

.notification-top{
display:flex;
align-items:flex-start;
gap:12px;
}

.notification-avatar{
width:46px;
height:46px;
border-radius:50%;
object-fit:cover;
background:#333;
flex-shrink:0;
}

.notification-body{
flex:1;
min-width:0;
}

.notification-message{
font-size:1rem;
line-height:1.45;
color:#f5f5f5;
word-break:break-word;
}

.notification-meta{
margin-top:6px;
font-size:0.85rem;
color:#aaa;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.notification-emojis{
font-size:1rem;
}

.unread-dot{
width:10px;
height:10px;
border-radius:50%;
background:#bb9457;
flex-shrink:0;
margin-top:6px;
}

.notification-actions{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.notification-btn{
border:none;
border-radius:8px;
padding:8px 12px;
font-family:'Domine',serif;
cursor:pointer;
background:#1f2125;
color:#f0e6d2;
}

.notification-btn:hover{
background:#2a2d31;
}

.notification-btn.secondary{
background:#353840;
}

.notification-btn.secondary:hover{
background:#454a55;
}

.loading{
text-align:center;
padding:40px;
color:#f0e6d2;
}

.empty-state{
text-align:center;
padding:28px 16px;
background:#111;
border-radius:14px;
}

@media (max-width:600px){
.social-layout{
max-width:100%;
padding:0 8px 20px;
}

.card{
padding:14px;
}

.page-title{
font-size:1.35rem;
}

.notification-item{
padding:14px;
}

.notification-message{
font-size:1.08rem;
line-height:1.55;
}

.notification-meta{
font-size:0.95rem;
}

.action-btn,
.notification-btn,
.header-btn{
font-size:1rem;
padding:10px 14px;
}
}
</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">FairQuest Social</div>

    <div class="header-actions">
      <button type="button" class="header-icon-btn" onclick="openSocialHome()">🏠</button>
      <button type="button" class="header-icon-btn" onclick="openNotificationsPage()">🔔</button>
      <button type="button" class="header-icon-btn" onclick="openFriends()">👥</button>
      <button type="button" class="header-icon-btn" onclick="openMyProfile()">👤</button>
    </div>
  </div>

  <div class="header-subnav">
    <button type="button" class="notifications-page-btn" onclick="openSocialHome()">🏠 Home</button>
    <button type="button" class="notifications-page-btn" onclick="openNotificationsPage()">Notifications</button>
    <button type="button" class="notifications-page-btn" onclick="openFriends()">👥 Friends</button>
    <button type="button" class="notifications-page-btn" onclick="openMyProfile()">👤 Profile</button>
  </div>
</div>
<div class="social-layout">
  <div class="social-center">

    <div class="card">
      <h1 class="page-title">Notifications</h1>
      <p class="page-subtitle">See what is happening on your posts, comments, and followed activity.</p>

      <div class="actions-row">
        <button type="button" class="action-btn" id="mark-all-read-btn">Mark all as read</button>
        <button type="button" class="action-btn" onclick="goBackToSocial()">Back to Social</button>
      </div>
    </div>

    <div id="notifications-container" class="notifications-list">
      <div class="loading">Loading notifications...</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseClient = window.supabase.createClient(
'https://awtbjuiqgtdydsqzimul.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
);
let currentUserId = null;
let notificationsChannel = null;
let audioUnlocked = false;
let lastNotificationEventAt = null;

const notificationAudio = new Audio("/social/notification.mp3");
notificationAudio.preload = "auto";

function unlockNotificationAudio(){
if(audioUnlocked) return;
notificationAudio.play().then(() => {
notificationAudio.pause();
notificationAudio.currentTime = 0;
audioUnlocked = true;
}).catch(() => {});
}

document.addEventListener("click", unlockNotificationAudio, { once:true });
document.addEventListener("keydown", unlockNotificationAudio, { once:true });
document.addEventListener("touchstart", unlockNotificationAudio, { once:true });

async function getCurrentSession(){
  const { data } = await supabaseClient.auth.getSession();
  return data.session || null;
}

async function checkUser(){
  const session = await getCurrentSession();

  if(!session){
    window.location.href = "/user_login.html?redirect=/social/notifications.html";
    currentUserId = null;
    return false;
  }

  currentUserId = session.user.id;
  return true;
}

async function loadUnreadNotificationCount(){
  const logged = await checkUser();
  if(!logged) return 0;

  const { data, error } = await supabaseClient.rpc('get_my_unread_notification_count');

  if(error){
    console.error(error);
    return 0;
  }

  return Number(data || 0);
}

function shouldPlayOpenPageNotificationSound(payload){
if(document.visibilityState !== "visible") return false;
if(!payload || !payload.new) return false;
if(payload.new.is_read === true) return false;
if(!payload.new.last_event_at) return true;
if(!lastNotificationEventAt) return true;
return new Date(payload.new.last_event_at).getTime() > new Date(lastNotificationEventAt).getTime();
}

async function playNotificationSoundIfAllowed(payload){
if(!audioUnlocked) return;
if(!shouldPlayOpenPageNotificationSound(payload)) return;
try{
notificationAudio.currentTime = 0;
await notificationAudio.play();
}catch(_e){}
}

async function handleRealtimeNotification(payload){
if(payload?.new?.last_event_at){
lastNotificationEventAt = payload.new.last_event_at;
}
await loadNotifications();
await playNotificationSoundIfAllowed(payload);
}

async function startNotificationRealtime(){
const logged = await checkUser();
if(!logged || !currentUserId) return;

if(notificationsChannel){
await supabaseClient.removeChannel(notificationsChannel);
notificationsChannel = null;
}

notificationsChannel = supabaseClient
.channel(`social-notifications-page-${currentUserId}`)
.on(
'postgres_changes',
{
event: '*',
schema: 'social',
table: 'notif_user_notification',
filter: `recipient_user_id=eq.${currentUserId}`
},
async (payload) => {
await handleRealtimeNotification(payload);
}
)
.subscribe();
}
function openSocialHome(){
  window.location.href = "/social/index.html";
}

function openNotificationsPage(){
  window.location.href = "/social/notifications.html";
}

function openFriends(){
  window.location.href = "/social/friends/friends.html";
}

async function openMyProfile(){
  const { data } = await supabaseClient.auth.getSession();

  if(!data.session){
    window.location.href = "/user_login.html?redirect=/social/profile/profile.html";
    return;
  }

  const userId = data.session.user.id;
  window.location.href = "/social/profile/profile.html?user_id=" + userId;
}

function formatPostDate(dateString){
  const d = new Date(dateString);
  const mm = String(d.getMonth() + 1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  const hh = d.getHours();
  const min = String(d.getMinutes()).padStart(2,'0');
  const hour12 = hh % 12 || 12;
  const ampm = hh >= 12 ? 'PM' : 'AM';
  return `${mm}/${dd}/${yy} ${hour12}:${min} ${ampm}`;
}

function renderActorEmojis(emojis){
  if(!Array.isArray(emojis) || emojis.length === 0) return '';
  return emojis.slice(0,4).join(' ');
}

function buildNotificationHtml(n){
  return `
    <div class="notification-item ${n.is_read ? '' : 'unread'}" data-notification-id="${n.id}">
      <div class="notification-top">
        <img
          class="notification-avatar"
          src="${n.last_actor_profile_image_url || 'https://via.placeholder.com/46'}"
          alt="Profile"
        >

        <div class="notification-body">
          <div class="notification-message">${n.message_text || 'New notification'}</div>

          <div class="notification-meta">
            <span>${formatPostDate(n.last_event_at)}</span>
            ${Array.isArray(n.actor_emojis) && n.actor_emojis.length ? `<span class="notification-emojis">${renderActorEmojis(n.actor_emojis)}</span>` : ''}
            <span>${n.event_count || 0} event${Number(n.event_count) === 1 ? '' : 's'}</span>
            ${n.is_post_muted ? `<span>🔕 Muted</span>` : ''}
            ${n.is_read ? `<span>Read</span>` : `<span>Unread</span>`}
          </div>

          <div class="notification-actions">
            ${n.is_read ? '' : `<button type="button" class="notification-btn mark-read-btn" data-notification-id="${n.id}">Mark read</button>`}
            ${n.post_id ? `
              <button
                type="button"
                class="notification-btn mute-toggle-btn"
                data-post-id="${n.post_id}"
                data-muted="${n.is_post_muted ? 'true' : 'false'}"
              >
                ${n.is_post_muted ? 'Unmute post' : 'Mute post'}
              </button>
            ` : ''}
            <button
              type="button"
              class="notification-btn secondary"
              onclick="goBackToSocial()"
            >
              Open Social
            </button>
          </div>
        </div>

        ${n.is_read ? '' : `<div class="unread-dot"></div>`}
      </div>
    </div>
  `;
}

async function loadNotifications(){
  const logged = await checkUser();
  if(!logged) return;

  const container = document.getElementById("notifications-container");
  container.innerHTML = `<div class="loading">Loading notifications...</div>`;

  const { data, error } = await supabaseClient.rpc('get_my_notifications_page');

  if(error){
    console.error(error);
    container.innerHTML = `<div class="empty-state">Error loading notifications</div>`;
    return;
  }

  if(!data || data.length === 0){
    container.innerHTML = `<div class="empty-state">No notifications yet</div>`;
    return;
  }

  container.innerHTML = data.map(buildNotificationHtml).join("");
}

async function markNotificationRead(notificationId){
  const { error } = await supabaseClient.rpc('mark_notification_read', {
    p_notification_id: notificationId
  });

  if(error){
    console.error(error);
    alert("Error marking notification as read");
    return;
  }

  await loadNotifications();
}

async function markAllNotificationsRead(){
  const { error } = await supabaseClient.rpc('mark_all_notifications_read');

  if(error){
    console.error(error);
    alert("Error marking all notifications as read");
    return;
  }

  await loadNotifications();
}

async function mutePost(postId){
  const { error } = await supabaseClient.rpc('mute_post_notifications', {
    p_post_id: postId
  });

  if(error){
    console.error(error);
    alert("Error muting post notifications");
    return;
  }

  await loadNotifications();
}

async function unmutePost(postId){
  const { error } = await supabaseClient.rpc('unmute_post_notifications', {
    p_post_id: postId
  });

  if(error){
    console.error(error);
    alert("Error unmuting post notifications");
    return;
  }

  await loadNotifications();
}

document.getElementById("mark-all-read-btn").addEventListener("click", async function(){
  await markAllNotificationsRead();
});

document.addEventListener("click", async function(e){
  const markReadBtn = e.target.closest(".mark-read-btn");
  if(markReadBtn){
    await markNotificationRead(markReadBtn.dataset.notificationId);
    return;
  }

  const muteToggleBtn = e.target.closest(".mute-toggle-btn");
  if(muteToggleBtn){
    const postId = muteToggleBtn.dataset.postId;
    const isMuted = muteToggleBtn.dataset.muted === "true";

    if(isMuted){
      await unmutePost(postId);
    }else{
      await mutePost(postId);
    }
  }
});
window.addEventListener("focus", async function(){
await loadUnreadNotificationCount();
});

setInterval(async function(){
await loadUnreadNotificationCount();
}, 30000);

async function initNotificationsPage(){
  const logged = await checkUser();
  if(!logged) return;

  await markAllNotificationsRead();
  await loadNotifications();
  await startNotificationRealtime();
}

initNotificationsPage();

</script>

</body>
</html>
