<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile | FairQuest Social</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:'Domine',serif;
  background:#000;
  color:#f0e6d2;
  margin:0;
  padding:0;
}

.header{
  background:#111;
  border-bottom:2px solid #bb9457;
  padding:14px 18px;
  margin-bottom:30px;
  font-family:'Cinzel',serif;
  font-size:1.5rem;
}

.header-inner{
  max-width:1200px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.header-title{
  text-align:center;
  flex:1;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-btn{
  border:none;
  background:#1f2125;
  color:#f0e6d2;
  border-radius:999px;
  padding:10px 14px;
  cursor:pointer;
  font-family:'Domine',serif;
  font-size:1rem;
}

.header-btn:hover{
  background:#2a2d31;
}

.page-wrap{
  width:100%;
  max-width:1000px;
  margin:20px auto;
  padding:0 12px 24px;
  box-sizing:border-box;
}

.card{
  background:rgba(214,197,126,0.88);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:18px;
  margin-bottom:20px;
  color:#111;
}

.page-title{
  font-family:'Cinzel',serif;
  font-size:2rem;
  margin:0 0 10px 0;
  color:#111;
  text-align:center;
}

.page-subtitle{
  margin:0 0 18px 0;
  color:#2b2b2b;
  text-align:center;
}

.profile-image-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  margin:0 0 24px 0;
}

.profile-preview-shell{
  position:relative;
  width:100%;
  max-width:700px;
  height:260px;
  border-radius:18px;
  overflow:visible;
  margin-bottom:38px;
}

.cover-image-preview{
  width:100%;
  height:100%;
  border-radius:18px;
  object-fit:cover;
  background:#222;
  border:3px solid #111;
  display:block;
}

.profile-image{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  background:#222;
  border:4px solid rgba(214,197,126,0.98);
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
}

.profile-image.overlay{
  position:absolute;
  left:24px;
  bottom:-34px;
}

.image-btn-row{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

.image-btn{
  border:none;
  border-radius:999px;
  background:#111;
  color:#f0e6d2;
  padding:10px 18px;
  font-family:'Domine',serif;
  font-size:1rem;
  cursor:pointer;
}

.image-btn:hover{
  background:#222;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:14px;
}

.field-box{
  display:flex;
  flex-direction:column;
  gap:8px;
  background:#111;
  color:#f0e6d2;
  border-radius:14px;
  padding:14px;
  min-width:0;
}

.field-box.full{
  grid-column:1 / -1;
}

.field-label{
  font-size:0.9rem;
  color:#d6c57e;
}

input,
textarea,
select{
  width:100%;
  border:none;
  outline:none;
  border-radius:10px;
  padding:12px 14px;
  font-family:'Domine',serif;
  font-size:1rem;
  box-sizing:border-box;
  background:#f6edd0;
  color:#111;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.toggle-row{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.toggle-row input[type="checkbox"]{
  width:auto;
  transform:scale(1.2);
}

.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}

.action-btn{
  background:#111;
  color:#f0e6d2;
  border:none;
  border-radius:999px;
  padding:12px 20px;
  font-family:'Domine',serif;
  cursor:pointer;
  font-size:1rem;
}

.action-btn:hover{
  background:#222;
}

.action-btn.primary{
  background:#bb9457;
  color:#000;
  font-weight:bold;
}

.action-btn.primary:hover{
  background:#cfa75e;
}

.status-box{
  display:none;
  margin-top:16px;
  border-radius:12px;
  padding:12px 14px;
  font-size:0.95rem;
}

.status-box.error{
  display:block;
  background:#7a2020;
  color:#fff;
}

.status-box.success{
  display:block;
  background:#1f5f2a;
  color:#fff;
}

.loading{
  text-align:center;
  padding:30px;
  color:#111;
}

@media (max-width:760px){
  .page-wrap{
    padding:0 8px 20px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .card{
    padding:14px;
  }

  .page-title{
    font-size:1.6rem;
  }

  .header-btn,
  .action-btn,
  input,
  textarea,
  select{
    font-size:1rem;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <button type="button" class="header-btn" onclick="goBackToProfile()">← Profile</button>
    <div class="header-title">FairQuest Social</div>
    <div class="header-actions">
      <button type="button" class="header-btn" onclick="loadProfileEdit()">↻ Refresh</button>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="card">
    <h1 class="page-title">Edit Profile</h1>
    <p class="page-subtitle">Update your profile information.</p>

    <div id="loading-box" class="loading">Loading profile...</div>

    <div id="form-wrap" style="display:none;">
      <div class="profile-image-wrap">
        <div class="profile-preview-shell">
          <img id="cover-image-preview" class="cover-image-preview" src="https://via.placeholder.com/1200x260?text=Cover+Image" alt="Cover">
          <img id="profile-image-preview" class="profile-image overlay" src="https://via.placeholder.com/140?text=User" alt="Profile">
        </div>

        <input type="file" id="profile-image-file" accept="image/*" style="display:none;">
        <input type="file" id="cover-image-file" accept="image/*" style="display:none;">

        <div class="image-btn-row">
          <button type="button" class="image-btn" id="choose-image-btn">Choose Profile Image</button>
          <button type="button" class="image-btn" id="choose-cover-image-btn">Choose Cover Image</button>
        </div>
      </div>

      <div class="form-grid">
        <div class="field-box">
          <div class="field-label">Display Name</div>
          <input type="text" id="display_name" maxlength="150">
        </div>

        <div class="field-box">
          <div class="field-label">Website URL</div>
          <input type="text" id="website_url" maxlength="500">
        </div>

        <div class="field-box full">
          <div class="field-label">Bio</div>
          <textarea id="bio" maxlength="2000"></textarea>
        </div>

        <div class="field-box">
          <div class="field-label">Location</div>
          <input type="text" id="location" maxlength="255">
        </div>

        <div class="field-box">
          <div class="field-label">Location Source</div>
          <select id="location_source">
            <option value="">—</option>
            <option value="manual">manual</option>
            <option value="gps">gps</option>
          </select>
        </div>

        <div class="field-box">
          <div class="field-label">City</div>
          <input type="text" id="city" maxlength="100">
        </div>

        <div class="field-box">
          <div class="field-label">State</div>
          <input type="text" id="state" maxlength="100">
        </div>

        <div class="field-box full">
          <div class="field-label">Profile Privacy</div>
          <div class="toggle-row">
            <input type="checkbox" id="allow_profile_public">
            <label for="allow_profile_public">Allow profile public</label>
          </div>
        </div>
      </div>

      <div id="status-box" class="status-box"></div>

      <div class="actions">
        <button type="button" class="action-btn" onclick="goBackToProfile()">Cancel</button>
        <button type="button" class="action-btn primary" id="save-btn" onclick="saveProfileEdit()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  'https://awtbjuiqgtdydsqzimul.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
);
let currentUserId = null;
let selectedImageFile = null;
let selectedCoverImageFile = null;
let uploadedProfileImageUrl = null;
let uploadedCoverImageUrl = null;

async function getCurrentSession(){
  const { data } = await supabaseClient.auth.getSession();
  return data.session || null;
}

async function checkUser(){
  const session = await getCurrentSession();

  if(!session){
    window.location.href = '/user_login.html?redirect=/social/profile/profileedit.html';
    currentUserId = null;
    return false;
  }

  currentUserId = session.user.id;
  return true;
}

function showStatus(message, type){
  const box = document.getElementById('status-box');
  box.className = `status-box ${type}`;
  box.textContent = message;
}

function clearStatus(){
  const box = document.getElementById('status-box');
  box.className = 'status-box';
  box.textContent = '';
  box.style.display = 'none';
}

function goBackToProfile(){
  window.history.back();
}

function wireImagePicker(){
  const profileFileInput = document.getElementById('profile-image-file');
  const coverFileInput = document.getElementById('cover-image-file');
  const chooseProfileBtn = document.getElementById('choose-image-btn');
  const chooseCoverBtn = document.getElementById('choose-cover-image-btn');
  const profilePreview = document.getElementById('profile-image-preview');
  const coverPreview = document.getElementById('cover-image-preview');

  chooseProfileBtn.addEventListener('click', function(){
    profileFileInput.click();
  });

  chooseCoverBtn.addEventListener('click', function(){
    coverFileInput.click();
  });

  profileFileInput.addEventListener('change', function(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;

    if(!file.type.startsWith('image/')){
      showStatus('Please choose an image file.', 'error');
      profileFileInput.value = '';
      selectedImageFile = null;
      return;
    }

    if(file.size > 5 * 1024 * 1024){
      showStatus('Image must be 5 MB or smaller.', 'error');
      profileFileInput.value = '';
      selectedImageFile = null;
      return;
    }

    selectedImageFile = file;
    uploadedProfileImageUrl = null;

    const reader = new FileReader();
    reader.onload = function(event){
      const result = event.target.result || '';
      profilePreview.src = result;
    };
    reader.readAsDataURL(file);
  });

  coverFileInput.addEventListener('change', function(e){
    const file = e.target.files && e.target.files[0];
    if(!file) return;

    if(!file.type.startsWith('image/')){
      showStatus('Please choose an image file.', 'error');
      coverFileInput.value = '';
      selectedCoverImageFile = null;
      return;
    }

    if(file.size > 8 * 1024 * 1024){
      showStatus('Cover image must be 8 MB or smaller.', 'error');
      coverFileInput.value = '';
      selectedCoverImageFile = null;
      return;
    }

    selectedCoverImageFile = file;
    uploadedCoverImageUrl = null;

    const reader = new FileReader();
    reader.onload = function(event){
      const result = event.target.result || '';
      coverPreview.src = result;
    };
    reader.readAsDataURL(file);
  });
}

async function compressImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = function(e){
      img.src = e.target.result;
    };

    reader.onerror = reject;

    img.onload = function(){
      const MAX_SIZE = 600;

      let width = img.width;
      let height = img.height;

      if(width > height){
        if(width > MAX_SIZE){
          height = height * (MAX_SIZE / width);
          width = MAX_SIZE;
        }
      }else{
        if(height > MAX_SIZE){
          width = width * (MAX_SIZE / height);
          height = MAX_SIZE;
        }
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      canvas.toBlob(
        function(blob){
          resolve(blob);
        },
        'image/jpeg',
        0.75
      );
    };

    reader.readAsDataURL(file);
  });
}

async function uploadProfileImageToStorage(){
  if(!selectedImageFile){
    return uploadedProfileImageUrl;
  }

  const logged = await checkUser();
  if(!logged || !currentUserId){
    throw new Error('User not logged in');
  }

  const filePath = `${currentUserId}/avatar-${Date.now()}.jpg`;
  const compressedImage = await compressImage(selectedImageFile);

  if(!compressedImage){
    throw new Error('Compressed image was empty');
  }

  const originalSizeKb = Math.round(selectedImageFile.size / 1024);
  const compressedSizeKb = Math.round(compressedImage.size / 1024);

  showStatus(`Profile image: ${originalSizeKb} KB → ${compressedSizeKb} KB`, 'success');

  const { error: uploadError } = await supabaseClient
    .storage
    .from('social-profile-images')
    .upload(filePath, compressedImage, {
      cacheControl: '3600',
      upsert: true,
      contentType: 'image/jpeg'
    });

  if(uploadError){
    throw uploadError;
  }

  const { data } = supabaseClient
    .storage
    .from('social-profile-images')
    .getPublicUrl(filePath);

  uploadedProfileImageUrl = data?.publicUrl || null;
  return uploadedProfileImageUrl;
}

async function uploadCoverImageToStorage(){
  if(!selectedCoverImageFile){
    return uploadedCoverImageUrl;
  }

  const logged = await checkUser();
  if(!logged || !currentUserId){
    throw new Error('User not logged in');
  }

  const filePath = `${currentUserId}/cover-${Date.now()}.jpg`;
  const compressedImage = await compressImage(selectedCoverImageFile);

  if(!compressedImage){
    throw new Error('Compressed image was empty');
  }

  const { error: uploadError } = await supabaseClient
    .storage
    .from('social-profile-images')
    .upload(filePath, compressedImage, {
      cacheControl: '3600',
      upsert: true,
      contentType: 'image/jpeg'
    });

  if(uploadError){
    throw uploadError;
  }

  const { data } = supabaseClient
    .storage
    .from('social-profile-images')
    .getPublicUrl(filePath);

  uploadedCoverImageUrl = data?.publicUrl || null;
  return uploadedCoverImageUrl;
}

async function loadProfileEdit(){
  clearStatus();
  document.getElementById('loading-box').style.display = 'block';
  document.getElementById('form-wrap').style.display = 'none';

  const logged = await checkUser();
  if(!logged) return;

  const { data, error } = await supabaseClient.rpc('get_my_profile_edit_data');

  if(error){
    console.error(error);
    showStatus(error.message || 'Error loading profile.', 'error');
    document.getElementById('loading-box').style.display = 'none';
    return;
  }

  const row = data || {};

  document.getElementById('display_name').value = row.display_name || '';
  document.getElementById('bio').value = row.bio || '';
  document.getElementById('location').value = row.location || '';
  document.getElementById('website_url').value = row.website_url || '';
  document.getElementById('city').value = row.city || '';
  document.getElementById('state').value = row.state || '';
  document.getElementById('location_source').value = row.location_source || '';
  document.getElementById('allow_profile_public').checked = row.allow_profile_public === true;

  uploadedProfileImageUrl = row.profile_image_url || null;
  uploadedCoverImageUrl = row.cover_image_url || null;

  document.getElementById('profile-image-preview').src = uploadedProfileImageUrl || 'https://via.placeholder.com/140?text=User';
  document.getElementById('cover-image-preview').src = uploadedCoverImageUrl || 'https://via.placeholder.com/1200x260?text=Cover+Image';

  document.getElementById('loading-box').style.display = 'none';
  document.getElementById('form-wrap').style.display = 'block';
}

async function saveProfileEdit(){
  clearStatus();

  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  try{
    const profileImageUrl = await uploadProfileImageToStorage();
    const coverImageUrl = await uploadCoverImageToStorage();

    const payload = {
      p_display_name: document.getElementById('display_name').value.trim() || null,
      p_bio: document.getElementById('bio').value.trim() || null,
      p_profile_image_url: profileImageUrl || null,
      p_cover_image_url: coverImageUrl || null,
      p_location: document.getElementById('location').value.trim() || null,
      p_website_url: document.getElementById('website_url').value.trim() || null,
      p_allow_profile_public: document.getElementById('allow_profile_public').checked,
      p_city: document.getElementById('city').value.trim() || null,
      p_state: document.getElementById('state').value.trim() || null,
      p_location_source: document.getElementById('location_source').value || null
    };

    const { error } = await supabaseClient.rpc('save_my_profile_edit', payload);

    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';

    if(error){
      console.error(error);
      showStatus(error.message || 'Error saving profile.', 'error');
      return;
    }

    showStatus('Profile updated successfully.', 'success');

    setTimeout(function(){
      window.location.href = '/social/profile/profile.html';
    }, 600);
  }catch(error){
    console.error(error);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';
    showStatus(error.message || 'Error uploading image.', 'error');
  }
}

wireImagePicker();
loadProfileEdit();
</script>

</body>
</html>
