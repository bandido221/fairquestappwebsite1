<style>
 body {
  font-family: 'Domine', serif;
  background: #0d0a04;
  color: #f1df99;
  margin: 0;
  padding: 20px;
  text-align: center;

    h1, h2, h3 {
      font-family: 'Cinzel', serif;
      margin-top: 0;
    }

    .top-banner,
    .logo {
      display: block;
      margin: 0 auto 20px auto;

    .container {
  max-width: 900px;

  background: rgba(241, 223, 153, 0.93);
  color: #111;

  border-radius: 16px;
  box-shadow:
    0 2px 0 rgba(201,168,76,0.35),

   .container h1 {

    button {

      border-radius: 10px;

  .info {

  border-radius: 14px;

}

    .info-grid {

   .info-item {

}

    .top-photo {

 .label {

}
.value {

    }

    .fair-cards-wrap {

.fair-card-date {

     .sub-actions {

window.currentUserIsGoldTier = false;
    function getYearFromDate(dateValue) {
      if (!dateValue) return '';
      return new Date(dateValue).getFullYear();
    }
function handleAddNewPerformerAccount() {
  const isGold = window.currentUserIsGoldTier === true;

  if (!isGold) {
    alert(
      "Additional performer accounts are available for Gold Tier members.\n\n" +
      "If you need to create another performer name or business profile, please upgrade to Gold Tier to unlock this feature."
    );
    return;
  }

  window.location.href = "application.html";
}
    async function initDashboard() {
      const { data: { session } } = await window.supabaseClient.auth.getSession();

      if (session?.user?.id) {
        loadDashboard(session.user.id);
      } else {
        window.supabaseClient.auth.onAuthStateChange((event, session) => {
          if (session?.user?.id) {
            loadDashboard(session.user.id);
          } else {
            document.getElementById('dashboardContent').innerHTML =
              '<p>Please sign in to continue.</p>';
          }
        });
      }
    }

    async function loadDashboard(userId) {
  const container = document.getElementById('dashboardContent');
  container.innerHTML = '';

  const { data: apps, error } = await window.supabaseClient
    .from('vendor_performer_applications')
    .select('*')
    .eq('user_id', userId)
    .eq('application_type', true)
    .order('id', { ascending: false });

  window.currentUserIsGoldTier = (apps || []).some(app =>
    app.approval_status === 'approved' &&
    (app.tier || '').toLowerCase() === 'gold'
  );

      if (error) {
        container.innerHTML = `<p>Error loading dashboard. Please try again.</p>`;
        return;
      }

      if (!apps.length) {
        container.innerHTML = `<div class="info"><p>You haven’t submitted any performer applications yet.</p></div>`;
        return;
      }

      for (let i = 0; i < apps.length; i++) {
        const perf = apps[i];

        const { data: fairs = [] } = await window.supabaseClient
          .from('vendor_application_fairs')
          .select('start_date,end_date,renaissance_fairs(name)')
          .eq('application_id', perf.id);

        const { data: manual = [] } = await window.supabaseClient
          .from('suggested_fairs')
          .select('fair_name,start_date,end_date')
          .eq('application_id', perf.id)
          .eq('application_type', 'performer');

        const isGoldApproved =
          perf.approval_status === 'approved' &&
          (perf.tier || '').toLowerCase() === 'gold';

        let fairHtml = '';
        if (fairs.length || manual.length) {
          fairHtml += `<div class="fair-cards-wrap">`;
          fairHtml += `<div class="fair-cards-title">Your Fairs</div>`;
          fairHtml += `<div class="fair-cards-list">`;

          const shownFairs = new Set();
          const fairInfoButtonLabel = isGoldApproved
            ? 'View Fair Info'
            : 'View Fair Info Gold Preview';

          fairs.forEach(f => {
            const fairName = (f.renaissance_fairs?.name || 'Unnamed Fair').trim();
            const fairYear = getYearFromDate(f.start_date);
            const uniqueKey = `known:${fairName}:${fairYear}`;
            if (shownFairs.has(uniqueKey)) return;
            shownFairs.add(uniqueKey);

            const fairInfoUrl = isGoldApproved
              ? `performer_fair_information_preview.html?vpa_id=${perf.id}&fair_name=${encodeURIComponent(fairName)}&season_year=${encodeURIComponent(fairYear || '')}`
              : `/vendor_performer/fair_info_gold_card_preview.html?vpa_id=${perf.id}&fair_name=${encodeURIComponent(fairName)}&season_year=${encodeURIComponent(fairYear || '')}`;

            fairHtml += `
              <div class="fair-card">
                <div class="fair-card-top">
                  <div>
                    <div class="fair-card-name">${fairName}</div>
                    <div class="fair-card-date">${fairYear || ''}</div>
                  </div>
                  <button class="start-app"
                    onclick="window.location.href='${fairInfoUrl}'">
                    ${fairInfoButtonLabel}
                  </button>
                </div>
              </div>
            `;
          });

          manual.forEach(m => {
            const fairName = (m.fair_name || 'Unnamed Fair').trim();
            const fairYear = getYearFromDate(m.start_date);
            const uniqueKey = `manual:${fairName}:${fairYear}`;
            if (shownFairs.has(uniqueKey)) return;
            shownFairs.add(uniqueKey);

            const fairInfoUrl = isGoldApproved
              ? `performer_fair_information_preview.html?vpa_id=${perf.id}&fair_name=${encodeURIComponent(fairName)}&season_year=${encodeURIComponent(fairYear || '')}`
              : `/vendor_performer/fair_info_gold_card_preview.html?vpa_id=${perf.id}&fair_name=${encodeURIComponent(fairName)}&season_year=${encodeURIComponent(fairYear || '')}`;

            fairHtml += `
              <div class="fair-card">
                <div class="fair-card-top">
                  <div>
                    <div class="fair-card-name">${fairName}</div>
                    <div class="fair-card-date">${fairYear || ''}</div>
                  </div>
                  <button class="start-app"
                    onclick="window.location.href='${fairInfoUrl}'">
                    ${fairInfoButtonLabel}
                  </button>
                </div>
              </div>
            `;
          });

          fairHtml += `</div></div>`;
        } else {
          fairHtml = `
            <div class="fair-cards-wrap">
              <div class="fair-cards-title">Your Fairs</div>
              <div class="fair-cards-list">
                <div class="fair-card">
                  <div class="fair-card-name">No fairs listed yet</div>
                </div>
              </div>
            </div>
          `;
        }

        const box = document.createElement('div');
        box.className = 'info';
        const safeName = (perf.name || 'Unnamed Performer').replace(/'/g, "\\'");

        let statusBadge = '';
        if (perf.approval_status === 'approved') {
          statusBadge = `<span class="badge badge-approved">Approved</span>`;
        } else if (perf.approval_status === 'rejected' || perf.approval_status === 'declined') {
          statusBadge = `<span class="badge badge-declined">Declined</span>`;
        } else {
          statusBadge = `<span class="badge badge-pending">Pending Review</span>`;
        }



        const fairAppsHtml = await buildFairApplicationsSection(perf.id, userId);

        box.innerHTML = `
          <div class="summary-title">Application Summary</div>

          <div class="info-grid">
            ${perf.photo_url ? `
            <div class="info-item full-width top-photo">
              <div class="label">Photo</div>
              <div class="value"><img src="${perf.photo_url}" alt="Performer Photo" /></div>
            </div>
            ` : ''}

            <div class="info-item">
              <div class="label">Application #</div>
              <div class="value">${i + 1}</div>
            </div>

            <div class="info-item">
              <div class="label">Name</div>
              <div class="value">${perf.name || ''}</div>
            </div>

            <div class="info-item">
              <div class="label">Type</div>
              <div class="value">${perf.vendor_type || ''}</div>
            </div>

            <div class="info-item">
              <div class="label">Contact Name</div>
              <div class="value">${perf.contact_name || ''}</div>
            </div>

            <div class="info-item">
              <div class="label">Contact Email</div>
              <div class="value">${perf.contact_email || ''}</div>
            </div>

            <div class="info-item">
              <div class="label">Description</div>
              <div class="value">${perf.description || ''}</div>
            </div>

            ${perf.website ? `
            <div class="info-item full-width">
              <div class="label">Website</div>
              <div class="value"><a href="${perf.website}" target="_blank">${perf.website}</a></div>
            </div>
            ` : ''}
          </div>

            <div class="status-row">
            ${statusBadge}
          </div>

          ${fairHtml}

       <div class="sub-actions">
  <button class="update-app" onclick="startUpdate(${perf.id})">Update Profile</button>
  <button class="delete-app" onclick="goToMainPage(${perf.id})">Main Page</button>
  <button class="delete-app" onclick="deleteApplication(${perf.id}, '${safeName}')">Delete</button>
</div>

<div class="sub-actions" style="margin-top:14px;">
  <button class="start-app"
    onclick="window.location.href='fair_applications.html?vpa_id=${perf.id}'">
    Fair Applications
  </button>
</div>

          ${fairAppsHtml}

          ${
           ['gold','silver'].includes((perf.tier || '').toLowerCase()) && perf.approval_status === 'approved'
            ? `
            <div class="gold-tier-card">
              <div class="gold-tier-title">${(perf.tier||'').toLowerCase() === 'gold' ? 'Gold' : 'Silver'} Tier Tools</div>
              <div class="gold-tier-note">These features are available for approved ${(perf.tier||'').toLowerCase() === 'gold' ? 'Gold' : 'Silver'} tier performers.</div>

              <div class="sub-actions">
                <button class="start-app"
                  onclick="window.location.href='/vendor_performer/vp_fair_vault.html?vpa_id=${perf.id}&type=performer'">
                  📁 My Vault
                </button>

                ${(perf.tier||'').toLowerCase() === 'gold' ? `
                <button class="start-app"
                  onclick="window.location.href='/vendor_performer/performer/vp_performer_detail_wizard.html?vpa_id=${perf.id}'">
                  Create Online Page
                </button>

                <button class="start-app"
                  onclick="window.location.href='fair_applications.html?vpa_id=${perf.id}'">
                  Fair Applications
                </button>
                ` : ''}
              </div>
            </div>
            `
            : ''
          }
        `;

        container.appendChild(box);
      }
    }

    function goToMainPage(vpaId) {
      if (!vpaId) return;
      window.location.href = `/vendor_performer/performer/vp_performer_main_page.html?vpa_id=${encodeURIComponent(vpaId)}`;
    }

    async function deleteApplication(appId, appName) {
      if (!confirm(`Are you sure you want to delete your application “${appName}”?`)) {
        return;
      }

      let { error: fairError } = await window.supabaseClient
        .from('vendor_application_fairs')
        .delete()
        .eq('application_id', appId);

      if (fairError) {
        alert(`❌ Failed to delete linked fairs: ${fairError.message}`);
        return;
      }

      let { error: sugError } = await window.supabaseClient
        .from('suggested_fairs')
        .delete()
        .eq('application_id', appId)
        .eq('application_type', 'performer');

      if (sugError) {
        alert(`❌ Failed to delete manual suggestions: ${sugError.message}`);
        return;
      }

      let { error: appError } = await window.supabaseClient
        .from('vendor_performer_applications')
        .delete()
        .eq('id', appId);

      if (appError) {
        alert(`❌ Failed to delete application: ${appError.message}`);
        return;
      }

      const notifRes = await window.supabaseClient
        .from('admin_notifications')
        .insert([{
          application_id: appId,
          message: `Performer application "${appName}" was deleted by the user.`,
          category: 'application_deleted'
        }]);

      if (notifRes.error) {
        console.warn('⚠️ Failed to notify admin:', notifRes.error);
      }

      alert('✅ Your application has been deleted and the admin has been notified.');

      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (session?.user?.id) {
        await loadDashboard(session.user.id);
      }
    }

    async function startUpdate(id) {
      localStorage.removeItem('performerProfile');

      const { data, error } = await window.supabaseClient
        .from('vendor_performer_applications')
        .select('*')
        .eq('id', id)
        .single();

      if (error) {
        alert('❌ Could not load this application.');
        return;
      }

      localStorage.setItem('performerProfile', JSON.stringify(data));
      window.location.href = 'update_application.html';
    }

    async function logout() {
      await window.supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    async function buildFairApplicationsSection(vpaId, userId) {
  const { data: submissions } = await window.supabaseClient
    .from('fair_man_app_submission')
    .select(`
      id, status, submitted_at,
      fair_id, vendor_performer_application_id,
      renaissance_fairs!inner(id, name, city, state)
    `)
    .eq('user_id', userId)
    .eq('vendor_performer_application_id', vpaId)
    .order('submitted_at', { ascending: false });

  if (!submissions || !submissions.length) return '';

  const rows = submissions.map(sub => {
    const fair = sub.renaissance_fairs;
    const cityState = [fair?.city, fair?.state].filter(Boolean).join(', ');

    const statusBadge = {
      pending:   `<span class="badge badge-pending">Draft</span>`,
      in_review: `<span class="badge badge-pending">In Review</span>`,
      approved:  `<span class="badge badge-approved">Approved</span>`,
      rejected:  `<span class="badge badge-declined">Declined</span>`,
      closed:    `<span class="badge badge-declined">Closed</span>`,
    }[sub.status] || `<span class="badge badge-pending">${sub.status}</span>`;

    const actionBtn = sub.status === 'approved'
      ? `<button class="start-app" style="min-width:0;padding:10px 14px;font-size:14px;"
           onclick="window.location.href='performer_fair_information_preview.html?vpa_id=${vpaId}&fair_name=${encodeURIComponent(fair?.name)}'">
           View Fair Info
         </button>`
      : `<button class="delete-app" style="min-width:0;padding:10px 14px;font-size:14px;opacity:0.6;cursor:not-allowed;" disabled>
           Pending Review
         </button>`;

    return `
      <div class="fair-card">
        <div class="fair-card-top">
          <div>
            <div class="fair-card-name">${fair?.name || 'Fair'}</div>
            <div class="fair-card-date">${cityState}</div>
            <div style="margin-top:6px;">${statusBadge}</div>
          </div>
          ${actionBtn}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="fair-cards-wrap" style="margin-top:14px;">
      <div class="fair-cards-title">Fairs With Online Applications</div>
      <div class="fair-cards-list">${rows}</div>
    </div>
  `;
}

window.addEventListener('DOMContentLoaded', initDashboard);
