function setSaveNewPhotoEnabled(on){
  const btn = document.getElementById('saveNewPhotoBtn');
  if(!btn) return;
  btn.disabled = !on;
  btn.style.opacity = on ? '1' : '.6';
}

function clearPendingPhoto(){
  pendingPhotoBlob = null;

  if(pendingPhotoObjectUrl){
    URL.revokeObjectURL(pendingPhotoObjectUrl);
    pendingPhotoObjectUrl = null;
  }

  const wrap = document.getElementById('newPhotoWrap');
  const img = document.getElementById('new_photo_img');
  if(img) img.removeAttribute('src');
  if(wrap) wrap.style.display = 'none';

  setSaveNewPhotoEnabled(false);

  const input = document.getElementById('photoUpload');
  if(input) input.value = '';
}
async function compressImageToJpeg(file, maxDim = 1200, quality = 0.82){
  const img = new Image();
  const objectUrl = URL.createObjectURL(file);

  try{
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = () => reject(new Error('Could not read image.'));
      img.src = objectUrl;
    });

    let { width, height } = img;
    if(!width || !height) throw new Error('Invalid image size.');

    // scale down (preserve aspect)
    const scale = Math.min(1, maxDim / Math.max(width, height));
    const w = Math.max(1, Math.round(width * scale));
    const h = Math.max(1, Math.round(height * scale));

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext('2d', { alpha: false });
    // draw with a white background so transparent PNGs don’t turn black
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);

    const blob = await new Promise((resolve) => {
      canvas.toBlob((b) => resolve(b), 'image/jpeg', quality);
    });

    if(!blob) throw new Error('Compression failed.');

    return blob;
  } finally {
    URL.revokeObjectURL(objectUrl);
  }
}

async function stageNewPhotoFromPicker(){
  const input = document.getElementById('photoUpload');
  const file = input?.files?.[0];
  if(!file){
    clearPendingPhoto();
    return;
  }

  setPhotoUploadMsg('<span class="muted">Preparing preview…</span>');
  setSaveNewPhotoEnabled(false);

  let compressed;
  try{
    compressed = await compressImageToJpeg(file, 1200, 0.82);
  }catch(err){
    setPhotoUploadMsg('');
    clearPendingPhoto();
    alert('Compression error: ' + err.message);
    return;
  }

  pendingPhotoBlob = compressed;

  if(pendingPhotoObjectUrl){
    URL.revokeObjectURL(pendingPhotoObjectUrl);
    pendingPhotoObjectUrl = null;
  }
  pendingPhotoObjectUrl = URL.createObjectURL(compressed);

  const wrap = document.getElementById('newPhotoWrap');
  const img = document.getElementById('new_photo_img');
  if(img) img.src = pendingPhotoObjectUrl;
  if(wrap) wrap.style.display = 'block';

  setPhotoUploadMsg('<span class="muted">Preview ready. Click “Save New Image” to replace.</span>');
  setSaveNewPhotoEnabled(true);
}

async function saveNewPhoto(){
  if(!pendingPhotoBlob){
    alert('Please choose a new image first.');
    return;
  }

  setPhotoUploadMsg('<span class="muted">Uploading…</span>');
  setSaveNewPhotoEnabled(false);

  try{
    const formData = new FormData();
    formData.append('file', pendingPhotoBlob, `performer_${crypto.randomUUID()}.jpg`);
    formData.append('upload_preset', 'vendor_upload');

    const resp = await fetch('https://api.cloudinary.com/v1_1/dft7xclvh/image/upload', {
      method: 'POST',
      body: formData
    });

    const result = await resp.json();

    if(!result?.secure_url){
      setPhotoUploadMsg('');
      setSaveNewPhotoEnabled(true);
      alert('Upload failed:\n' + JSON.stringify(result, null, 2));
      return;
    }

    const publicUrl = result.secure_url;

    setPhotoUploadMsg('<span class="muted">Saving…</span>');
    const { error } = await sb
      .from('vendor_performer_applications')
      .update({ photo_url: publicUrl })
      .eq('id', Number(vpaId));

    if(error){
      setPhotoUploadMsg('');
      setSaveNewPhotoEnabled(true);
      alert('Supabase update failed: ' + error.message);
      return;
    }

    setCurrentPhotoPreview(publicUrl);

    setPhotoUploadMsg('<span class="ok">Saved.</span>');
    clearPendingPhoto();
    setTimeout(() => location.reload(), 600);
  }catch(err){
    setPhotoUploadMsg('');
    setSaveNewPhotoEnabled(true);
    alert('Unexpected upload error: ' + err.message);
  }
}

function isAddressNull(a){
  const s = (a?.street_address || '').trim();
  const c = (a?.city || '').trim();
  const st = (a?.state || '').trim();
  const z = (a?.zip_code || '').trim();
  return !s && !c && !st && !z;
}

function formatAddress(a){
  const parts = [];
  if(a?.street_address) parts.push(a.street_address);
  const line2 = [a?.city, a?.state, a?.zip_code].filter(Boolean).join(', ').replace(', ,', ',');
  if(line2.trim()) parts.push(line2);
  return parts.join('<br>');
}

function wireAddressUI(){
  const cb = document.getElementById('show_full_address');
  const info = document.getElementById('addressInfo');
  const fields = document.getElementById('addressFields');
  const wizardAddr = document.getElementById('wizardAddress');
  const saveBtn = document.getElementById('saveAddressBtn');

    wizardAddr.innerHTML =
      `<span style="color:#7f1d1d;">Address not set.</span>`;
    fields.style.display = 'block';
    saveBtn.style.display = 'inline-block';
  } else {
    wizardAddr.innerHTML =
      `<strong>${formatAddress(vpaRow)}</strong>`;
    fields.style.display = 'none';
    saveBtn.style.display = 'none';
  }

  function refresh(){
    if(addrMissing){
      info.innerHTML = `<span style="opacity:.85;">Address required for public display. Please enter below.</span>`;
      fields.style.display = 'block';
      saveBtn.style.display = 'inline-block';
      return;
    }

    fields.style.display = 'none';
    saveBtn.style.display = 'none';

    if(cb.checked){
      info.innerHTML = `<span style="opacity:.85;">Address will be shown on public page.</span>`;
    } else {
      info.innerHTML = `<span style="opacity:.85;">Address hidden on public page.</span>`;
    }
  }

  cb.addEventListener('change', refresh);
  refresh();
}
