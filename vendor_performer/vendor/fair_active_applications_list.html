<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Fairs With Applications | FairQuest</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Domine&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/fq_theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family:'Domine',serif;
      background:#000;
      color:#f0e6d2;
      text-align:center;
      padding:16px;
      margin:0;
      font-size:19px;
      line-height:1.5;
    }
    .container{
      max-width:1040px;
      margin:16px auto;
      background:rgba(214,197,126,0.88);
      color:#3b1f1f;
      padding:24px;
      border-radius:16px;
      box-shadow:0 4px 10px rgba(0,0,0,0.3);
      text-align:left;
    }
    h1{
      font-family:'Cinzel',serif;
      margin:0 0 14px 0;
      line-height:1.2;
      font-size:clamp(28px,5vw,48px);
      text-align:center;
    }
    .top-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .btn{
      display:inline-block;
      background:#2f2f2f;
      color:#f0e6d2;
      text-decoration:none;
      padding:14px 18px;
      border-radius:10px;
      min-height:50px;
      box-sizing:border-box;
      font-size:18px;
      border:none;
      cursor:pointer;
      font-family:'Domine',serif;
    }
    .btn:hover{
      background:#222;
    }
    .info-card{
      background:rgba(255,255,255,0.55);
      padding:18px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,0.12);
      margin-bottom:18px;
    }
    .list-grid{
      display:grid;
      gap:16px;
    }
    .fair-card{
      background:rgba(255,255,255,0.55);
      padding:18px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,0.12);
    }
    .fair-link{
      color:#3b1f1f;
      text-decoration:none;
      font-weight:bold;
      font-size:22px;
      line-height:1.3;
      display:inline-block;
      margin-bottom:8px;
    }
    .fair-link:hover{
      text-decoration:underline;
    }
    .fair-meta{
      font-size:18px;
      color:#3b1f1f;
      opacity:0.95;
    }
    .empty-box{
      background:rgba(255,255,255,0.55);
      padding:18px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,0.12);
      font-size:18px;
    }

    @media (max-width: 768px){
      body{
        padding:10px;
        font-size:18px;
      }
      .container{
        max-width:100%;
        padding:18px;
        border-radius:14px;
        margin:10px auto;
      }
      .top-actions{
        flex-direction:column;
      }
      .btn{
        width:100%;
      }
      .fair-link,
      .fair-meta,
      .empty-box{
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vendor Fairs With Applications</h1>

    <div class="top-actions">
      <a class="btn" href="/vendor_performer/vendor/fair_applications.html">⬅ Back to Fair Applications</a>
    </div>

    <div class="info-card" id="countBox">Loading fairs...</div>
    <div class="list-grid" id="fairList"></div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://awtbjuiqgtdydsqzimul.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3dGJqdWlxZ3RkeWRzcXppbXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE0OTY4MDgsImV4cCI6MjA1NzA3MjgwOH0.ES0B3O_M0dHaMHMutpkXvThMVMwIUxPqL1cvM1J2kUQ'
    );

    const SEARCH_FORM_TYPE = 'vendor';

    async function loadActiveVendorFairs() {
      const listEl = document.getElementById('fairList');
      const countBox = document.getElementById('countBox');

      const { data, error } = await supabaseClient
        .from('fair_man_app_fair_form_active')
        .select(`
          fair_id,
          form_type,
          renaissance_fairs!inner(
            id,
            name,
            city,
            state
          )
        `)
        .eq('form_type', SEARCH_FORM_TYPE)
        .order('fair_id', { ascending: true });

      if (error) {
        countBox.textContent = 'We could not load fairs with vendor applications right now.';
        listEl.innerHTML = `<div class="empty-box">Error loading fairs.</div>`;
        return;
      }

      if (!data || !data.length) {
        countBox.textContent = 'At this time, we do not have any fairs accepting vendor applications.';
        listEl.innerHTML = `<div class="empty-box">No vendor fairs with active applications found.</div>`;
        return;
      }

      countBox.textContent = `At this time, we have ${data.length} fairs accepting vendor applications.`;

      listEl.innerHTML = data.map(row => {
        const fair = Array.isArray(row.renaissance_fairs)
          ? row.renaissance_fairs[0]
          : row.renaissance_fairs;

        const cityState = [fair?.city, fair?.state].filter(Boolean).join(', ');

        return `
          <div class="fair-card">
            <a class="fair-link" href="/fairs/fair_detail.html?id=${encodeURIComponent(String(fair.id))}">
              ${fair?.name ?? 'Fair'}
            </a>
            <div class="fair-meta">${cityState || 'Location not available'}</div>
          </div>
        `;
      }).join('');
    }

    loadActiveVendorFairs();
  </script>
</body>
</html>
